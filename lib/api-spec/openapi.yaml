openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 3.0.0
  description: VulnRap.com API — Vulnerability Report Validation Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Report submission and analysis
  - name: feedback
    description: User feedback
  - name: stats
    description: Platform statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a vulnerability report for analysis
      description: Upload a vulnerability report file for similarity checking and sloppiness scoring
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf). Either file or rawText must be provided.
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report. Either file, rawText, or reportUrl must be provided.
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                contentMode:
                  type: string
                  enum: [full, similarity_only]
                  default: full
                  description: Privacy mode — full shares content, similarity_only stores only hashes
                showInFeed:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Whether to show this report in the public recent reports feed
                skipLlm:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip LLM analysis — use only local heuristic/statistical scoring. Sent as string in multipart form data. Forced to "true" server-side when skipRedaction is "true".
                skipRedaction:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip PII auto-redaction. When enabled, LLM analysis is automatically disabled to prevent unredacted data from reaching external services. Sent as string in multipart form data.
              required:
                - contentMode
      responses:
        "201":
          description: Report submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report analysis results
      description: Retrieve the full analysis for a previously submitted report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a previously submitted report
      description: Permanently deletes a report and all associated data. Requires the delete token returned at submission time.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteReportBody"
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportResponse"
        "403":
          description: Invalid delete token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/verify:
    get:
      operationId: getVerification
      tags: [reports]
      summary: Get verification badge data for a report
      description: Returns a lightweight verification summary for embedding in bug reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationBadge"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/compare/{matchId}:
    get:
      operationId: compareReports
      tags: [reports]
      summary: Compare two reports side by side
      description: Returns redacted text snippets of both reports for side-by-side similarity comparison
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportComparison"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/triage-report:
    get:
      operationId: getTriageReport
      tags: [reports]
      summary: Get exportable markdown triage report
      description: Returns a formatted markdown summary with score, verification results, evidence, recommendation, and challenge questions — ready to paste into Jira/ServiceNow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Triage report markdown
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/check:
    post:
      operationId: checkReport
      tags: [reports]
      summary: Check a report against the database without storing it
      description: For report receivers -- analyze a report for similarity and sloppiness without adding it to the database
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf)
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                skipLlm:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip LLM analysis — use only local heuristic/statistical scoring. Sent as string in multipart form data. Forced to "true" server-side when skipRedaction is "true".
                skipRedaction:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip PII auto-redaction. When enabled, LLM analysis is automatically disabled to prevent unredacted data from reaching external services. Sent as string in multipart form data.
              required: []
      responses:
        "200":
          description: Check results (not stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/lookup/{hash}:
    get:
      operationId: lookupByHash
      tags: [reports]
      summary: Look up a report by content hash
      description: Check if a report with the given SHA-256 content hash has been seen before
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            pattern: "^[a-fA-F0-9]{64}$"
            maxLength: 64
      responses:
        "200":
          description: Hash lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashLookupResult"

  /reports/feed:
    get:
      operationId: getReportFeed
      tags: [reports]
      summary: Get recent public reports
      description: Returns recent reports that submitters opted to show in the public feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: tier
          in: query
          required: false
          schema:
            type: string
          description: Filter by slop tier name (exact match)
        - name: avriFamily
          in: query
          required: false
          schema:
            type: string
            enum:
              - MEMORY_CORRUPTION
              - INJECTION
              - WEB_CLIENT
              - AUTHN_AUTHZ
              - CRYPTO
              - DESERIALIZATION
              - RACE_CONCURRENCY
              - REQUEST_SMUGGLING
              - FLAT
          description: Filter by cached AVRI rubric family id (exact match against reports.avri_family).
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, score_asc, score_desc]
            default: newest
      responses:
        "200":
          description: Recent public reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportFeed"

  /feedback/challenge:
    get:
      operationId: getFeedbackChallenge
      tags: [feedback]
      summary: Get a proof-of-work challenge for feedback submission
      description: Returns a SHA-256 proof-of-work challenge that must be solved before submitting feedback. This prevents automated spam.
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackChallenge"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback about the tool
      description: Allows users to share whether the tool was helpful and suggest improvements. Requires a solved proof-of-work challenge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackWithChallenge"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Challenge verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/analytics:
    get:
      operationId: getFeedbackAnalytics
      tags: [feedback]
      summary: Get aggregated feedback analytics
      description: Returns summary stats, rating distribution, daily trends, score-vs-feedback correlation, outlier reports, and recent feedback entries
      responses:
        "200":
          description: Feedback analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackAnalytics"

  /feedback/calibration:
    get:
      operationId: getCalibrationReport
      tags: [feedback]
      summary: Get calibration report with tuning suggestions
      description: Analyzes feedback data against scoring results to suggest weight and threshold adjustments. Uses volume gating to ensure suggestions are based on sufficient data.
      responses:
        "200":
          description: Calibration report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationReport"

  /feedback/calibration/avri-drift:
    get:
      operationId: getAvriDriftReport
      tags: [feedback]
      summary: Get rolling AVRI calibration drift report
      description: |
        Rolling weekly view of the AVRI composite for production reports,
        bucketed by triage outcome (T1-equivalent vs T3-equivalent). Surfaces
        per-family means and drift flags (rubric collapse and per-family
        weight drift) so reviewers can spot when the AVRI rubric needs
        re-tuning.
      parameters:
        - in: query
          name: weeks
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 26
          description: How many weeks of history to scan (default 8, capped at 26).
      responses:
        "200":
          description: AVRI drift report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftReport"

  /feedback/calibration/avri-drift/notifications:
    get:
      operationId: getAvriDriftNotifications
      tags: [feedback]
      summary: List the persisted AVRI drift notification dedup state
      description: |
        Task #196 — Returns the per-flag dedup records that have already been
        dispatched via `POST /feedback/calibration/avri-drift/notify` (or the
        in-process auto-trigger). Each entry would silently suppress its
        corresponding flag on the next dispatch run unless re-armed via
        `/feedback/calibration/avri-drift/notifications/rearm`. The endpoint
        is auth-gated (strict) because the records include the original flag
        `detail` string.
      responses:
        "200":
          description: Persisted dedup state snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftNotificationsList"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/avri-drift/notifications/rearm:
    post:
      operationId: rearmAvriDriftNotifications
      tags: [feedback]
      summary: Re-arm one or more previously-notified AVRI drift flags
      description: |
        Task #196 — Removes one or more entries from the AVRI drift
        notification dedup state by `key` so the next dispatch run treats
        the matching flags as never-seen and re-fires the webhook. Useful
        for the "acknowledged-but-not-fixed by the fix-by date" workflow,
        where reviewers want a flag re-paged after the fix window lapses
        without hand-editing `data/avri-drift-notifications.json`.

        Unknown keys are reported back via `notFound` (mirroring the
        per-phrase removal pattern); the request returns 200 when at least
        one entry was re-armed and 404 only when nothing matched.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvriDriftRearmBody"
      responses:
        "200":
          description: At least one entry was re-armed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftRearmResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No entries matched any of the supplied keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftRearmResponse"

  /feedback/calibration/config:
    get:
      operationId: getScoringConfig
      tags: [feedback]
      summary: Get current and historical scoring configurations
      description: Returns the active scoring config version and full version history.
      responses:
        "200":
          description: Scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigResponse"

  /feedback/calibration/auth-status:
    get:
      operationId: getCalibrationAuthStatus
      tags: [feedback]
      summary: Probe whether the reviewer token is configured/valid
      description: |
        Task #117 — Returns boolean signals describing whether the API server
        requires a reviewer token for calibration mutations and whether the
        caller's request would be accepted by `requireCalibrationAuth`. This
        endpoint is intentionally NOT auth-gated so the dashboard can render
        a "Reviewer token: configured / missing / invalid" indicator BEFORE
        the reviewer triggers a mutation that 401s. The configured token is
        never echoed in the response — only boolean signals.
      responses:
        "200":
          description: Auth status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationAuthStatus"

  /feedback/calibration/apply:
    post:
      operationId: applyCalibration
      tags: [feedback]
      summary: Apply calibration changes to scoring config
      description: Creates a new scoring configuration version with the specified changes. All subsequent reports will be scored with the new config.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyCalibrationBody"
      responses:
        "201":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyCalibrationResponse"
        "400":
          description: Invalid changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases:
    get:
      operationId: getHandwavyPhrases
      tags: [feedback]
      summary: List the curated FLAT hand-wavy marker phrases
      description: |
        Returns the active list of FLAT-family hand-wavy marker phrases used by
        AVRI Engine 2 to apply the slop haircut. Reviewers can extend this list
        through POST/DELETE without an engineer redeploying the service.
      responses:
        "200":
          description: Active hand-wavy phrase list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhrasesList"
    post:
      operationId: addHandwavyPhrase
      tags: [feedback]
      summary: Append a new FLAT hand-wavy marker phrase
      description: |
        Appends a phrase to the curated FLAT hand-wavy marker list. Phrases are
        normalized to lowercase + collapsed whitespace before storage. Subsequent
        triages pick the new phrase up immediately — no redeploy required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseBody"
      responses:
        "200":
          description: Phrase already present (no change)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "201":
          description: Phrase appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid phrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: editHandwavyPhrase
      tags: [feedback]
      summary: Edit a curated FLAT hand-wavy marker phrase in place
      description: |
        Updates the `category`, `rationale`, and/or the phrase string itself
        of an existing curated marker without losing the original add audit
        context. Each edit appends a `HandwavyEditEntry` to the marker's
        `edits` log recording who made the change, when, and the
        before/after for any field that actually changed.

        Task #247 — when `newPhrase` is provided AND its normalized form
        (lowercase + collapsed whitespace) differs from the existing
        phrase, the marker's row identity is rewritten in place to the new
        phrase. The marker keeps its original `addedBy`/`addedAt`/
        `rationale` and the rename is recorded as a `phrase` before/after
        change on the appended audit entry. Renaming to a normalized form
        already used by another active phrase is rejected so the active
        list stays a set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseEditBody"
      responses:
        "200":
          description: Edit applied (or no-op if updates matched the existing values)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid request body or update values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Phrase not in the list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeHandwavyPhrase
      tags: [feedback]
      summary: Remove one or many FLAT hand-wavy marker phrases
      description: |
        Removes a phrase (matched after lowercase + whitespace normalization)
        from the curated FLAT hand-wavy marker list. Task #135 — accepts
        either a single phrase (`{phrase}`) or a batch (`{phrases: [...]}`)
        in one round-trip; the batch path appends one history entry that
        lists every removed phrase instead of N separate entries.

        Task #145 — when the batch body has `dryRun: true`, the server
        returns a preview (corpus impact + per-phrase outcomes) and does
        NOT mutate the active list, history, or cache.

        Task #155 — the single-phrase body also accepts `dryRun: true`
        and returns the same corpus + production removal-impact summary
        (with `batch: false`) so the in-UI Trash flow can warn reviewers
        before a one-click removal lands.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBody"
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveBody"
      responses:
        "200":
          description: |
            Phrase removed (single path), batch processed and at least one
            phrase was removed (batch path; see `batch: true` and `results`),
            single-phrase dry-run preview (`dryRun: true`, `batch: false`),
            OR batch dry-run preview (`dryRun: true`, `batch: true`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseSingleRemoveDryRunResponse"
        "400":
          description: Invalid phrase / batch body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Phrase not in the list (single path) OR batch matched zero phrases
            (batch path returns the same `results` shape as 200).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResponse"

  /feedback/calibration/handwavy-phrases/removal-batches:
    get:
      operationId: listHandwavyPhraseRemovalBatches
      tags: [feedback]
      summary: List recent FLAT hand-wavy phrase BATCH removal entries (picker-friendly summary)
      description: |
        Task #160 — Slim summary of the most recent batch removal entries from
        the hand-wavy phrase removal-history log, intended for the
        reinstate-batch CLI's interactive picker. Single-phrase removal
        entries are omitted because they're not reinstatable through the
        /reinstate-batch endpoint. Newest entries are returned first; default
        page size is 10, capped at 50 via the `limit` query parameter.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of batch entries to return (newest first). Defaults to 10, capped at 50.
      responses:
        "200":
          description: Recent batch removal summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchesList"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/removal-batches/{removedAt}:
    get:
      operationId: getHandwavyPhraseRemovalBatch
      tags: [feedback]
      summary: Fetch the FULL inner phrase list for a single batch removal entry
      description: |
        Task #176 — Sibling detail endpoint for the picker list above. Returns
        every inner phrase from one batch removal entry (not just the
        5-phrase sample the list endpoint surfaces) plus the per-phrase
        audit metadata (category, original adder, per-phrase reinstated
        flag). The reinstate-batch CLI calls this to render a "preview"
        step between the picker / `--removed-at` flag and the final
        confirmation prompt; Task #244 wires the same endpoint into the
        web reviewer's picker so reviewers see every phrase before
        confirming.

        Single-phrase removal entries return 404 with `reason: "not-a-batch"`
        — they are not reinstatable through /reinstate-batch and the caller
        should fall back to /reinstate.
      parameters:
        - in: path
          name: removedAt
          required: true
          schema:
            type: string
            format: date-time
          description: ISO 8601 timestamp of the parent batch removal entry. Must be URL-encoded by the caller.
      responses:
        "200":
          description: Full inner phrase list with per-phrase audit metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchDetail"
        "400":
          description: Missing or empty removedAt path parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            No removal-history entry matches the supplied removedAt
            (`reason: "history-not-found"`) or the matched entry is a
            single-phrase removal that's not addressable through this
            endpoint (`reason: "not-a-batch"`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchDetailError"

  /feedback/calibration/handwavy-phrases/undo:
    post:
      operationId: undoHandwavyPhrase
      tags: [feedback]
      summary: Undo a brand-new add of a FLAT hand-wavy marker phrase
      description: |
        Task #130 — mirror of /reinstate. A reviewer who just added a phrase
        can press Undo within a short server-side window (default 5 minutes)
        and the marker is removed. The resulting history row is tagged
        `undone: true` so the audit trail clearly records "added then undone"
        rather than producing an unrelated manual-removal entry. The active
        marker is matched by `phrase` + `addedAt`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseUndoBody"
      responses:
        "200":
          description: Phrase undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching active marker (or curated default)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: addedAt mismatch or undo window expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/undo-batch:
    post:
      operationId: undoHandwavyPhrasesBatch
      tags: [feedback]
      summary: Undo every still-in-window FLAT hand-wavy phrase add in one round-trip
      description: |
        Task #233 — bulk wrapper around POST /feedback/calibration/handwavy-phrases/undo.
        The reviewer's UI tracks every reviewer-added phrase that is still
        inside its per-marker undo window (default 5 minutes) and pressing
        "Undo last N adds" sends every `(phrase, addedAt)` pair in one
        round-trip. The server walks each entry through the per-marker
        undo path so each successful undo still appends its own
        `undone: true` history row — the audit contract is NOT collapsed
        into a single batch row, so per-phrase provenance is preserved
        for downstream tooling. Per-entry failures (`not-found`,
        `addedAt-mismatch`, `window-expired`, `no-addedAt`) are reported
        in the per-phrase `results` array instead of failing the whole
        call so a reviewer who fires the button right as one entry's
        window elapses still gets the rest rolled back.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseUndoBatchBody"
      responses:
        "200":
          description: Batch processed (see `undoneCount` and per-phrase `results`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseUndoBatchResponse"
        "400":
          description: Invalid body (missing / malformed `entries`, oversized batch, or non-string `reviewer`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/reinstate-batch:
    post:
      operationId: reinstateHandwavyPhrasesBatch
      tags: [feedback]
      summary: Reinstate every not-yet-reinstated phrase from a single batch removal entry
      description: |
        Task #144 — single-round-trip reinstate of every inner phrase from one
        Task #135 batch removal entry. The reviewer supplies the parent
        entry's `removedAt`; the server reinstates each remaining inner
        phrase, records the current reviewer on each one, and flips the
        aggregate `reinstated` flag once everything is back. Inner phrases
        that have already been reinstated (partial undo earlier) or that
        have been re-added to the active list separately are skipped with a
        reason instead of failing the whole call. Per-phrase reinstate via
        the existing /reinstate endpoint still works for partial undos.

        Task #159 — when `dryRun: true` is sent in the body, the server
        returns the same `results` / `reinstatedCount` / `skipped` shape
        (with `dryRun: true` and `batch: true` flags) without mutating
        the active marker list or appending to the removal-history log.
        Reviewers can preview exactly which inner phrases would be
        reinstated and which would be skipped before pressing yes.
        Mirrors the dry-run pattern used by the bulk-remove endpoint:
        both the mutating and dry-run paths return HTTP 200 and callers
        discriminate on the `dryRun` flag in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseReinstateBatchBody"
      responses:
        "200":
          description: |
            Batch processed (mutating path; see `reinstatedCount` and
            `results`) OR dry-run preview when `dryRun: true` was sent
            (`dryRun: true` and `batch: true` flags, no state was mutated).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HandwavyPhraseReinstateBatchResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseReinstateBatchDryRunResponse"
        "400":
          description: Invalid body (missing or non-string `removedAt`/`reviewer`, or non-boolean `dryRun`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching removal-history entry for that removedAt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The matched history entry exists but is a single-phrase removal (use /reinstate instead).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/reinstate:
    post:
      operationId: reinstateHandwavyPhrase
      tags: [feedback]
      summary: Reinstate a previously removed FLAT hand-wavy marker phrase from history
      description: |
        Task #121 — re-adds a phrase straight from the removal-history log so a
        reviewer doesn't have to retype it (and its rationale) into the add
        form. The history entry is matched by `phrase` + `removedAt`. The
        marker is added with the original category and rationale; the CURRENT
        reviewer is recorded as `addedBy` and a fresh `addedAt` timestamp is
        used so the audit trail still shows who reinstated and when. The
        history row is then flagged `reinstated: true` so the same row cannot
        be reinstated twice.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseReinstateBody"
      responses:
        "201":
          description: Phrase reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching history entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already reinstated or already in the active list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/revert-edit:
    post:
      operationId: revertHandwavyPhraseEdit
      tags: [feedback]
      summary: Revert a single edit on a curated FLAT hand-wavy marker phrase
      description: |
        Task #132 — undoes a single entry from a curated phrase's `edits` log
        in one click. The reviewer supplies the phrase and the `editedAt`
        timestamp of the edit they want to undo; the server restores
        whatever fields that entry recorded a change to (category and/or
        rationale) back to their `from` values, leaving any field the entry
        did NOT change alone. The audit log stays append-only — the revert
        appears as a fresh `HandwavyEditEntry` with the inverse before/after
        pair, attributed to the reviewer who pressed the button. A no-op
        revert (current values already match the target) returns
        `edited: false` and does not append a new entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseRevertEditBody"
      responses:
        "200":
          description: Revert applied (or no-op when current values already match)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Phrase or matching edit entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

