        - tierBreakdown
        - topSignals
        - topCweFamilies
        - volumeTimeSeries

    CweCatalogEntry:
      type: object
      description: Single CWE entry in the public catalog (Task #663).
      properties:
        cweId:
          type: string
          description: Canonical CWE identifier (e.g. "CWE-79").
        name:
          type: string
          description: Friendly name (e.g. "Cross-Site Scripting (XSS)").
        family:
          type: string
          description: AVRI rubric family id this CWE belongs to (INJECTION, MEMORY_CORRUPTION, ...). FLAT for unclassified.
        familyName:
          type: string
          description: Human-readable family name (matches the AVRI rubric displayName).
        aliases:
          type: array
          description: Alternate phrasings the engine recognizes for this CWE.
          items:
            type: string
        expectedTerms:
          type: array
          description: Vocabulary the engine expects to see in a high-quality report for this CWE.
          items:
            type: string
        mitreUrl:
          type: string
          description: Link to the canonical MITRE CWE definition page.
        highQualityReport:
          type: string
          description: Short narrative — what makes a report for this CWE score well, derived from the family rubric.
        reproductionExpectation:
          type: string
          description: Reproduction expectation inherited from the AVRI family rubric.
        rejectionRate:
          type: number
          description: Historical rejection-rate multiplier from the fingerprint library (HIGH_REJECTION_CWES override when present).
        reportCount:
          type: integer
          description: Number of corpus reports where the engine inferred this CWE via soft-citation.
        avgCompositeScore:
          type: number
          nullable: true
          description: Average vulnrap_composite_score across reports where this CWE was inferred. Null when there are no such reports.
        reportsLink:
          type: string
          description: Deep link into the public reports feed pre-filtered to this CWE's family.
      required:
        - cweId
        - name
        - family
        - familyName
        - aliases
        - expectedTerms
        - mitreUrl
        - highQualityReport
        - reproductionExpectation
        - rejectionRate
