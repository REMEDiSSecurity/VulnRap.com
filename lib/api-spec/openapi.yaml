        - actionability

    ReproRecipeTarget:
      type: object
      description: Identified target project for reproduction
      properties:
        name:
          type: string
        version:
          oneOf:
            - type: string
            - type: "null"
        source:
          oneOf:
            - type: string
            - type: "null"
          description: Repository URL (GitHub/GitLab)
