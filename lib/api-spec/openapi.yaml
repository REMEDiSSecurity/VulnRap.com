        hardware:
          type: array
          items:
            $ref: "#/components/schemas/HardwareComponent"
          description: Detected hardware components with emulation guidance
      required:
        - title
        - setupCommands
        - notes
        - hardware

    LLMClaims:
      type: object
      description: Extracted claims from the vulnerability report, identified by LLM analysis.
      properties:
        claimedProject:
          type: ["string", "null"]
          description: The project the report claims to be about.
        claimedVersion:
          type: ["string", "null"]
          description: The version of the project claimed.
        claimedFiles:
          type: array
          items:
            type: string
          description: File paths referenced in the report.
        claimedFunctions:
          type: array
          items:
            type: string
          description: Function names referenced in the report.
        claimedLineNumbers:
          type: array
          items:
            type: integer
          description: Line numbers referenced in the report.
        claimedCVEs:
          type: array
          items:
            type: string
          description: CVE or CWE identifiers referenced.
        claimedImpact:
          type: ["string", "null"]
          description: The impact type claimed (RCE, data_leak, DoS, auth_bypass, etc.).
        cvssScore:
          type: ["number", "null"]
          description: CVSS score claimed in the report.
        hasPoC:
          type: boolean
          description: Whether a proof-of-concept is included.
        pocTargetsClaimedLibrary:
          type: boolean
          description: Whether the PoC actually exercises the claimed library.
        hasAsanOutput:
          type: boolean
          description: Whether AddressSanitizer or similar output is included.
        asanFromClaimedProject:
          type: boolean
          description: Whether the sanitizer output appears to be from the claimed project.
        selfDisclosesAI:
          type: boolean
          description: Whether the reporter mentions using AI assistance.
        complianceBuzzwords:
          type: array
          items:
            type: string
          description: Compliance frameworks mentioned (GDPR, PCI-DSS, HIPAA, etc.).
        complianceRelevance:
          type: string
          enum: ["high", "medium", "low", "none"]
          description: Whether the cited compliance frameworks are relevant to the project type.

    LLMSubstanceScores:
      type: object
      description: Substance-based scoring dimensions from LLM analysis.
      properties:
        pocValidity:
          type: integer
          minimum: 0
          maximum: 100
          description: Does the PoC actually test the claimed vulnerability? 0 = no PoC or doesn't reference the library.
        claimSpecificity:
          type: integer
          minimum: 0
          maximum: 100
          description: Are claims specific AND verifiable? Fabricated specifics score lower than vague claims.
        domainCoherence:
          type: integer
          minimum: 0
          maximum: 100
          description: Do claims make sense for the project's architecture and purpose?
        substanceScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Weighted average of pocValidity, claimSpecificity, and domainCoherence.
        coherenceScore:
          type: integer
          minimum: 0
          maximum: 100
          description: How well all claims fit together as a coherent whole.
      required:
        - pocValidity
        - claimSpecificity
        - domainCoherence
        - substanceScore
        - coherenceScore

    TriageAssistant:
      type: object
      properties:
        reproGuidance:
          oneOf:
            - $ref: "#/components/schemas/ReproGuidance"
            - type: "null"
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/GapItem"
        dontMiss:
          type: array
          items:
            $ref: "#/components/schemas/DontMissItem"
        reporterFeedback:
