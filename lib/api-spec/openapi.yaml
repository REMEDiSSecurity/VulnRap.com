            type: string
        environment:
          type: array
          items:
            type: string
        expectedBehavior:
          type: string
        testingTips:
          type: array
          items:
            type: string
        missingInfo:
          type: array
          items:
            type: string
        dontMiss:
          type: array
          items:
            type: string
        reporterFeedback:
          type: string
      required:
        - reproSteps
