          ratingDistribution,
          dailyTrend,
          scoreCorrelation,
          outliers,
          recentFeedback,
        ]

    HoldoutEvalPartition:
      type: object
      description: |
        One partition (holdout or in-sample) of the binary-classifier
        evaluation. Counts are always present; ratio metrics are nullable
        when the relevant denominator is zero.
      properties:
        totalFeedback:
          type: integer
        tp:
          type: integer
          description: Predicted slop AND actually slop.
        fp:
          type: integer
          description: Predicted slop AND not actually slop.
        fn:
          type: integer
          description: Not predicted slop AND actually slop.
        tn:
          type: integer
          description: Not predicted slop AND not actually slop.
        precision:
          type: number
          nullable: true
          description: tp / (tp + fp); null when no rows were predicted slop.
        recall:
          type: number
          nullable: true
          description: tp / (tp + fn); null when no rows were actually slop.
        f1:
          type: number
          nullable: true
          description: Harmonic mean of precision and recall; null when either is null.
        accuracy:
          type: number
          nullable: true
          description: (tp + tn) / total; null when total is zero.
      required: [totalFeedback, tp, fp, fn, tn, precision, recall, f1, accuracy]

    HoldoutEvalResponse:
      type: object
      properties:
        thresholds:
          type: object
          properties:
            scoreThreshold:
              type: number
              description: slopScore at/above which the engine "predicts slop".
            ratingThreshold:
              type: integer
              description: User rating at/below which the row is treated as "actually slop".
            description:
              type: string
          required: [scoreThreshold, ratingThreshold, description]
        holdout:
          $ref: "#/components/schemas/HoldoutEvalPartition"
        inSample:
          $ref: "#/components/schemas/HoldoutEvalPartition"
        holdoutFraction:
          type: number
          description: Fraction of feedback rows assigned to the holdout split (0.2 in v1).
      required: [thresholds, holdout, inSample, holdoutFraction]

    ScoringConfigItem:
      type: object
      properties:
        version:
          type: string
        createdAt:
          type: string
        prior:
          type: number
        floor:
          type: number
        ceiling:
          type: number
        axisThresholds:
          type: object
          additionalProperties:
            type: number
        tierThresholds:
          type: object
          properties:
            low:
              type: number
            high:
              type: number
          required: [low, high]
        fabricationBoost:
          type: number
        description:
          type: string
      required:
        [
          version,
          createdAt,
          prior,
          floor,
          ceiling,
          axisThresholds,
          tierThresholds,
          fabricationBoost,
          description,
        ]

    ScoringConfigResponse:
      type: object
      properties:
        current:
          $ref: "#/components/schemas/ScoringConfigItem"
        history:
          type: array
          items:
            $ref: "#/components/schemas/ScoringConfigItem"
      required: [current, history]

    CalibrationAuthStatus:
      description: |
        Task #117 — Snapshot of the calibration token gate as observed by the
        API server for THIS request. The dashboard polls this probe to render
        a "Reviewer token: configured / missing / invalid" indicator before
        the reviewer triggers a mutation that would otherwise 401.
      type: object
      properties:
        serverRequiresToken:
          type: boolean
          description: |
            True when `CALIBRATION_TOKEN` is set on the API process. When
            false, every calibration mutation is open (single-reviewer / local
            dev fallback) and the UI does not need to send a token.
        tokenPresented:
          type: boolean
          description: |
            True when the request included a token via either the
            `X-Calibration-Token` header or `Authorization: Bearer <token>`.
        tokenValid:
          type: boolean
          description: |
            True when a token was presented AND it matches the server's
            configured token. Always false when the server has no token
            configured (since there is nothing to compare against).
        mutationsAllowed:
          type: boolean
          description: |
            Derived: `!serverRequiresToken || tokenValid`. When false, the
            UI should warn the reviewer that calibration mutations will be
            rejected with 401.
      required:
        [serverRequiresToken, tokenPresented, tokenValid, mutationsAllowed]

    BucketAnalysis:
      type: object
      properties:
        bucket:
          type: string
        scoreRange:
          type: array
          items:
            type: number
        feedbackCount:
          type: integer
        avgRating:
          type: number
        helpfulPct:
          type: number
        meetsThreshold:
          type: boolean
        signal:
          type: string
          enum: [accurate, over-scoring, under-scoring, insufficient-data]
        ratingDeviation:
          type: number
      required:
        [
          bucket,
          scoreRange,
          feedbackCount,
          avgRating,
          helpfulPct,
          meetsThreshold,
          signal,
          ratingDeviation,
        ]

    CalibrationSuggestion:
      type: object
      properties:
        parameter:
          type: string
        currentValue:
          type: number
        suggestedValue:
          type: number
        reason:
          type: string
        confidence:
          type: string
          enum: [low, medium, high]
        basedOnCount:
          type: integer
      required:
        [
          parameter,
          currentValue,
          suggestedValue,
          reason,
          confidence,
          basedOnCount,
        ]

    PublicDriftSummaryWeek:
      type: object
      description: |
        Single weekly data point in the public drift sparkline. Contains
        only the UTC Monday week-start and the redacted T1−T3 composite
        spread; no bucket counts, per-family means, or sample IDs.
      properties:
        weekStart:
          type: string
          description: ISO date (YYYY-MM-DD) of the UTC Monday that starts the week.
        spread:
          type: number
          nullable: true
          description: |
            Rounded T1−T3 composite mean spread for the week. `null`
            when either bucket failed to meet the minimum sample size,
            so the public widget can skip ineligible weeks without
            leaking the underlying counts.
      required: [weekStart, spread]

    PublicDriftSummary:
      type: object
      description: |
        Public-safe wrapper around the internal AVRI drift compute. Only
        weekly redacted spreads + a current/previous/delta summary are
        exposed; reviewer-only fields (per-family means, flags, bucket
        counts, thresholds, bucketing-note, runbook path) are stripped
        upstream so this DTO can be served on `/transparency` without
        leaking internal calibration signals.
      properties:
        generatedAt:
          type: string
          description: ISO 8601 timestamp when the summary was computed.
        weeks:
          type: array
          maxItems: 12
          description: |
            Up to the last 12 eligible weeks of `{ weekStart, spread }`
            data points, oldest-first. Empty when no weekly aggregate
            has been computed yet so the widget can render an empty
            state.
          items:
            $ref: "#/components/schemas/PublicDriftSummaryWeek"
        currentSpread:
          type: number
          nullable: true
          description: Spread for the most recent eligible week, or `null` when unavailable.
        previousSpread:
          type: number
          nullable: true
          description: Spread for the week prior to the most recent eligible week, or `null` when unavailable.
        delta:
          type: number
          nullable: true
          description: |
            `currentSpread − previousSpread`, rounded to 1 decimal.
            `null` when either side is unavailable.
        hasCurrentWeek:
          type: boolean
          description: |
            True when the most recent eligible week in `weeks` matches
            the UTC Monday of the current week. Lets the widget show a
            "this week" badge vs. an "awaiting this week's aggregate"
            hint without exposing report counts.
      required:
        [
          generatedAt,
          weeks,
          currentSpread,
          previousSpread,
          delta,
          hasCurrentWeek,
        ]

    AvriDriftFamilyMean:
      type: object
      properties:
        family:
          type: string
        count:
          type: integer
        mean:
          type: number
      required: [family, count, mean]

    AvriDriftWeekBucketStats:
      type: object
      properties:
        count:
          type: integer
        mean:
          type: number
          nullable: true
      required: [count, mean]

    AvriDriftWeekBucketPerFamily:
