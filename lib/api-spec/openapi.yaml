          description: File paths referenced in the report.
        claimedFunctions:
          type: array
          items:
            type: string
          description: Function names referenced in the report.
        claimedLineNumbers:
          type: array
          items:
            type: integer
          description: Line numbers referenced in the report.
        claimedCVEs:
          type: array
          items:
            type: string
          description: CVE or CWE identifiers referenced.
        claimedImpact:
          type: ["string", "null"]
          description: The impact type claimed (RCE, data_leak, DoS, auth_bypass, etc.).
        cvssScore:
          type: ["number", "null"]
          description: CVSS score claimed in the report.
        hasPoC:
          type: boolean
          description: Whether a proof-of-concept is included.
        pocTargetsClaimedLibrary:
          type: boolean
          description: Whether the PoC actually exercises the claimed library.
        hasAsanOutput:
          type: boolean
          description: Whether AddressSanitizer or similar output is included.
        asanFromClaimedProject:
          type: boolean
          description: Whether the sanitizer output appears to be from the claimed project.
        selfDisclosesAI:
          type: boolean
          description: Whether the reporter mentions using AI assistance.
        complianceBuzzwords:
          type: array
          items:
            type: string
          description: Compliance frameworks mentioned (GDPR, PCI-DSS, HIPAA, etc.).
        complianceRelevance:
          type: string
          enum: ["high", "medium", "low", "none"]
          description: Whether the cited compliance frameworks are relevant to the project type.

    LLMSubstanceScores:
      type: object
      description: Substance-based scoring dimensions from LLM analysis.
      properties:
        pocValidity:
          type: integer
          minimum: 0
          maximum: 100
          description: Does the PoC actually test the claimed vulnerability? 0 = no PoC or doesn't reference the library.
        claimSpecificity:
          type: integer
          minimum: 0
          maximum: 100
          description: Are claims specific AND verifiable? Fabricated specifics score lower than vague claims.
        domainCoherence:
          type: integer
          minimum: 0
          maximum: 100
          description: Do claims make sense for the project's architecture and purpose?
        substanceScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Weighted average of pocValidity, claimSpecificity, and domainCoherence.
        coherenceScore:
          type: integer
          minimum: 0
          maximum: 100
          description: How well all claims fit together as a coherent whole.
      required:
        - pocValidity
        - claimSpecificity
        - domainCoherence
        - substanceScore
        - coherenceScore

    TriageAssistant:
      type: object
      properties:
        reproGuidance:
          oneOf:
            - $ref: "#/components/schemas/ReproGuidance"
            - type: "null"
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/GapItem"
        dontMiss:
          type: array
          items:
            $ref: "#/components/schemas/DontMissItem"
        reporterFeedback:
          type: array
          items:
            $ref: "#/components/schemas/ReporterFeedbackItem"
        reporterFeedbackSummary:
          $ref: "#/components/schemas/ReporterFeedbackSummary"
        llmTriageGuidance:
          oneOf:
            - $ref: "#/components/schemas/LLMTriageGuidance"
            - type: "null"
        reproRecipe:
          oneOf:
            - $ref: "#/components/schemas/ReproRecipe"
            - type: "null"
          description: Structured reproduction recipe with setup commands, PoC script, and optional Dockerfile
      required:
        - gaps
        - dontMiss
        - reporterFeedback
        - reporterFeedbackSummary

    SubmitFeedbackBody:
      type: object
      properties:
        reportId:
          type: integer
          description: The report ID this feedback is about (optional)
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (not useful) to 5 (very useful)
        helpful:
          type: boolean
          description: Whether the tool was helpful overall
        comment:
          type: string
          maxLength: 1000
          description: Optional free-text suggestions for improvement
      required:
        - rating
        - helpful

    SubmitFeedbackWithChallenge:
      type: object
      properties:
        challengeId:
          type: string
          description: The challenge ID from GET /feedback/challenge
        challengeSolution:
          type: string
          description: The computed solution to the proof-of-work challenge
        reportId:
          type: integer
          description: The report ID this feedback is about (optional)
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (not useful) to 5 (very useful)
        helpful:
          type: boolean
          description: Whether the tool was helpful overall
        comment:
          type: string
          maxLength: 1000
          description: Optional free-text suggestions for improvement
      required:
        - challengeId
        - challengeSolution
        - rating
        - helpful

    FeedbackChallenge:
      type: object
      properties:
        challengeId:
          type: string
        nonce:
          type: string
        difficulty:
          type: integer
        prefix:
          type: string
        expiresAt:
          type: number
      required: [challengeId, nonce, difficulty, prefix, expiresAt]

    FeedbackResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message

    FeedbackAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalFeedback:
              type: integer
            avgRating:
              type: number
            helpfulCount:
              type: integer
            notHelpfulCount:
              type: integer
            helpfulnessRate:
              type: number
            withComments:
              type: integer
            linkedToReport:
              type: integer
          required: [totalFeedback, avgRating, helpfulCount, notHelpfulCount, helpfulnessRate, withComments, linkedToReport]
        ratingDistribution:
          type: object
          additionalProperties:
            type: integer
        dailyTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
              avgRating:
                type: number
              helpfulPct:
                type: number
            required: [date, count, avgRating, helpfulPct]
        scoreCorrelation:
          type: array
          items:
            type: object
            properties:
              scoreBucket:
                type: string
              avgRating:
                type: number
              helpfulPct:
                type: number
              count:
                type: integer
            required: [scoreBucket, avgRating, helpfulPct, count]
        outliers:
          type: array
          items:
            type: object
            properties:
              feedbackId:
                type: integer
              rating:
                type: integer
              helpful:
                type: boolean
              comment:
                type: string
                nullable: true
              feedbackDate:
                type: string
                format: date-time
              slopScore:
                type: integer
              slopTier:
                type: string
              qualityScore:
                type: integer
            required: [feedbackId, rating, helpful, slopScore, slopTier, qualityScore]
        recentFeedback:
          type: array
          items:
            type: object
            properties:
              feedbackId:
                type: integer
              rating:
                type: integer
              helpful:
                type: boolean
              comment:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
              slopScore:
                type: integer
                nullable: true
              slopTier:
                type: string
                nullable: true
            required: [feedbackId, rating, helpful, createdAt]
      required: [summary, ratingDistribution, dailyTrend, scoreCorrelation, outliers, recentFeedback]

    ScoringConfigItem:
      type: object
      properties:
        version:
          type: string
        createdAt:
          type: string
        prior:
          type: number
        floor:
          type: number
        ceiling:
          type: number
        axisThresholds:
          type: object
          additionalProperties:
            type: number
        tierThresholds:
          type: object
          properties:
            low:
              type: number
            high:
              type: number
          required: [low, high]
        fabricationBoost:
          type: number
        description:
          type: string
      required: [version, createdAt, prior, floor, ceiling, axisThresholds, tierThresholds, fabricationBoost, description]

    ScoringConfigResponse:
      type: object
      properties:
        current:
          $ref: "#/components/schemas/ScoringConfigItem"
        history:
          type: array
          items:
            $ref: "#/components/schemas/ScoringConfigItem"
      required: [current, history]

    CalibrationAuthStatus:
      description: |
        Task #117 — Snapshot of the calibration token gate as observed by the
        API server for THIS request. The dashboard polls this probe to render
        a "Reviewer token: configured / missing / invalid" indicator before
        the reviewer triggers a mutation that would otherwise 401.
      type: object
      properties:
        serverRequiresToken:
          type: boolean
          description: |
            True when `CALIBRATION_TOKEN` is set on the API process. When
            false, every calibration mutation is open (single-reviewer / local
            dev fallback) and the UI does not need to send a token.
        tokenPresented:
          type: boolean
          description: |
            True when the request included a token via either the
            `X-Calibration-Token` header or `Authorization: Bearer <token>`.
        tokenValid:
          type: boolean
          description: |
            True when a token was presented AND it matches the server's
            configured token. Always false when the server has no token
            configured (since there is nothing to compare against).
        mutationsAllowed:
          type: boolean
          description: |
            Derived: `!serverRequiresToken || tokenValid`. When false, the
            UI should warn the reviewer that calibration mutations will be
            rejected with 401.
      required: [serverRequiresToken, tokenPresented, tokenValid, mutationsAllowed]

    BucketAnalysis:
      type: object
      properties:
        bucket:
          type: string
        scoreRange:
          type: array
          items:
            type: number
        feedbackCount:
          type: integer
        avgRating:
          type: number
        helpfulPct:
          type: number
        meetsThreshold:
          type: boolean
        signal:
          type: string
          enum: [accurate, over-scoring, under-scoring, insufficient-data]
        ratingDeviation:
          type: number
      required: [bucket, scoreRange, feedbackCount, avgRating, helpfulPct, meetsThreshold, signal, ratingDeviation]

    CalibrationSuggestion:
      type: object
      properties:
        parameter:
          type: string
        currentValue:
          type: number
        suggestedValue:
          type: number
        reason:
          type: string
        confidence:
          type: string
          enum: [low, medium, high]
        basedOnCount:
          type: integer
      required: [parameter, currentValue, suggestedValue, reason, confidence, basedOnCount]

    AvriDriftFamilyMean:
      type: object
      properties:
        family:
          type: string
        count:
          type: integer
        mean:
          type: number
      required: [family, count, mean]

    AvriDriftWeekBucketStats:
      type: object
      properties:
        count:
          type: integer
        mean:
          type: number
          nullable: true
      required: [count, mean]

    AvriDriftWeekBucketPerFamily:
      type: object
      properties:
        t1:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftFamilyMean"
        t3:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftFamilyMean"
      required: [t1, t3]

    AvriDriftWeekBucket:
      type: object
      properties:
        weekStart:
          type: string
          description: ISO date (YYYY-MM-DD) of the UTC Monday that starts the week.
        reportCount:
          type: integer
        t1:
          $ref: "#/components/schemas/AvriDriftWeekBucketStats"
        t3:
          $ref: "#/components/schemas/AvriDriftWeekBucketStats"
        gap:
          type: number
          nullable: true
        perFamily:
          $ref: "#/components/schemas/AvriDriftWeekBucketPerFamily"
        gapEligible:
          type: boolean
      required: [weekStart, reportCount, t1, t3, gap, perFamily, gapEligible]

    AvriDriftFlag:
      type: object
      properties:
        weekStart:
          type: string
        kind:
          type: string
          enum: [GAP_BELOW_45, FAMILY_MEAN_SHIFT]
        detail:
          type: string
      required: [weekStart, kind, detail]

    AvriDriftThresholds:
      type: object
      properties:
        gapWarn:
          type: number
        familyShiftWarn:
          type: number
        minBucketSize:
          type: integer
      required: [gapWarn, familyShiftWarn, minBucketSize]

    AvriDriftReport:
      type: object
      properties:
        generatedAt:
          type: string
        weeksRequested:
          type: integer
        totalReportsScanned:
          type: integer
        cohort:
          type: string
          enum: [avri_on_only]
        bucketingNote:
          type: string
        thresholds:
          $ref: "#/components/schemas/AvriDriftThresholds"
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftWeekBucket"
        flags:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftFlag"
        runbookPath:
          type: string
      required: [generatedAt, weeksRequested, totalReportsScanned, cohort, bucketingNote, thresholds, weeks, flags, runbookPath]

    AvriDriftNotificationRecord:
      type: object
      description: |
        Single dedup entry from `data/avri-drift-notifications.json`. The
        `key` is the stable per-flag identifier (week + kind, plus bucket +
        family for `FAMILY_MEAN_SHIFT`) used to suppress repeat
        notifications.
      properties:
        key:
          type: string
          description: Stable per-flag dedup key. Pass this back to /rearm to re-arm the flag.
        weekStart:
          type: string
          description: ISO date (YYYY-MM-DD) for the Monday that started the flag's week.
        kind:
          type: string
          enum: [GAP_BELOW_45, FAMILY_MEAN_SHIFT]
        notifiedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the flag was first dispatched.
        detail:
          type: string
          description: Original flag detail string at the time of the first notification.
      required: [key, weekStart, kind, notifiedAt, detail]

    AvriDriftNotificationsList:
      type: object
      properties:
        notified:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
        total:
          type: integer
      required: [notified, total]

    AvriDriftRearmBody:
      type: object
      properties:
        keys:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: string
            minLength: 1
          description: Dedup keys (from AvriDriftNotificationRecord.key) to re-arm.
      required: [keys]

    AvriDriftRearmResponse:
      type: object
      properties:
        rearmed:
          type: integer
          description: Number of dedup entries that were re-armed (i.e. removed from the dedup state).
        notFound:
          type: array
          items:
            type: string
          description: Keys from the request that did not match any persisted entry.
        remaining:
          type: integer
          description: Total entries left in the dedup state after the re-arm.
        removed:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
          description: Full records that were re-armed, in the order they appeared in the dedup state.
        notified:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
          description: Refreshed dedup state snapshot after the re-arm so the UI can update without an extra GET.
      required: [rearmed, notFound, remaining, removed, notified]

    CalibrationReport:
      type: object
      properties:
        currentConfig:
          $ref: "#/components/schemas/ScoringConfigItem"
        totalFeedbackAnalyzed:
          type: integer
        bucketAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/BucketAnalysis"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CalibrationSuggestion"
        overallHealth:
          type: string
          enum: [good, needs-attention, needs-tuning]
        minFeedbackThreshold:
          type: integer
      required: [currentConfig, totalFeedbackAnalyzed, bucketAnalysis, suggestions, overallHealth, minFeedbackThreshold]

    ApplyCalibrationBody:
      type: object
      properties:
        changes:
          type: object
          description: Object with scoring config changes (prior, floor, ceiling, axisThresholds, tierThresholds, fabricationBoost)
        description:
          type: string
          description: Description of why this change is being made
      required: [changes, description]

    ApplyCalibrationResponse:
      type: object
      properties:
        message:
          type: string
        config:
          $ref: "#/components/schemas/ScoringConfigItem"
      required: [message, config]

    HandwavyCategory:
      type: string
      enum: [absence, hedging, buzzword]
      description: Theme bucket used by the diagnostics panel to group matched phrases.

    HandwavyEditEntry:
      type: object
      description: |
        Single in-place edit applied to a curated hand-wavy marker phrase.
        Records who made the change, when, and the before/after for whichever
        fields actually changed (`category`, `rationale`, and/or — Task
        #247 — the phrase string itself when a reviewer renamed it).
        Fields that did not change are omitted to keep the audit log
        compact.
      properties:
        editedBy:
          type: string
          description: Reviewer name or email that performed the edit. Absent when no reviewer was supplied.
        editedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the edit.
        category:
          type: object
          properties:
            from:
              $ref: "#/components/schemas/HandwavyCategory"
            to:
              $ref: "#/components/schemas/HandwavyCategory"
          required: [from, to]
        rationale:
          type: object
          description: Before/after values for the rationale text. Empty string indicates the rationale was set or cleared.
          properties:
            from:
              type: string
            to:
              type: string
        phrase:
          type: object
          description: |
            Task #247 — before/after values for the phrase string itself,
            present only when the reviewer renamed the marker via the
            edit endpoint's `newPhrase` field. Both values are stored
            already normalized (lowercase + collapsed whitespace).
          properties:
            from:
              type: string
            to:
              type: string
          required: [from, to]
      required: [editedAt]

    HandwavyMarker:
      type: object
      properties:
        phrase:
          type: string
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
          description: Reviewer name or email that added the phrase. Absent for curated defaults.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase was added. Absent for curated defaults.
        rationale:
          type: string
          description: Free-text justification supplied by the reviewer at add time.
        edits:
          type: array
          description: |
            Chronological log of in-place edits to this marker (most recent
            last). Each entry records who changed what, when. Bounded
            server-side per marker.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
      required: [phrase, category]

    HandwavyBatchHistoryPhrase:
      type: object
      description: |
        Task #135 — one element of a batch-removal history entry's `phrases`
        array. Mirrors the audit metadata that a single-removal entry carries
        at its top level. Per-phrase `reinstated*` fields track partial
        reinstates so a reviewer can pull individual phrases back out of a
        batch removal.
      properties:
        phrase:
          type: string
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        rationale:
          type: string
        edits:
          type: array
          description: Preserved on remove so reinstating still shows the edit history.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
        reinstated:
          type: boolean
        reinstatedBy:
          type: string
        reinstatedAt:
          type: string
          format: date-time
      required: [phrase, category]

    HandwavyHistoryEntry:
      type: object
      description: |
        Removed-phrase audit record used so reviewers can reinstate a phrase
        with original context. Single-removal entries populate `phrase` +
        `category`; Task #135 batch-removal entries leave those empty and
        instead populate `phrases` with the list of removed phrases.
      properties:
        phrase:
          type: string
          description: |
            The removed phrase (single-removal entries). Empty/omitted on
            Task #135 batch entries — see `phrases` instead.
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        rationale:
          type: string
        edits:
          type: array
          description: Task #120 — preserved on remove so reinstating still shows the edit history.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
        removedBy:
          type: string
          description: Reviewer name or email that removed the phrase(s).
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase(s) were removed.
        reinstated:
          type: boolean
          description: |
            Task #121 — true once a reviewer has reinstated this phrase
            straight from the history log via POST
            /feedback/calibration/handwavy-phrases/reinstate. The same row
            cannot be reinstated twice — if the phrase is removed again, a
            new history row is appended. For Task #135 batch entries this
            is the AGGREGATE flag: true once every inner phrase has been
            reinstated (see `phrases[].reinstated`).
        reinstatedBy:
          type: string
          description: Reviewer name or email that reinstated the phrase from this history entry.
        reinstatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase was reinstated from this history entry.
        undone:
          type: boolean
          description: |
            Task #130 — true when this history row was produced by a reviewer
            undoing a brand-new add via POST
            /feedback/calibration/handwavy-phrases/undo. The UI renders these
            rows distinctly from manual removals so the audit trail clearly
            reads "added then undone" rather than "added then removed".
        undoneBy:
          type: string
          description: Reviewer name or email that pressed Undo on this entry.
        phrases:
          type: array
          description: |
            Task #135 — present when the entry represents a batch removal.
            Each item lists one removed phrase plus its original add-history
            metadata and per-phrase reinstate state.
          items:
            $ref: "#/components/schemas/HandwavyBatchHistoryPhrase"
      required: [removedAt]

    HandwavyPhraseRemovalBatchSummary:
      type: object
      description: |
        Task #160 — Slim summary of one BATCH removal entry from the hand-wavy
        phrase history log, scoped to the fields the reinstate-batch CLI
        picker needs to show (timestamp, reviewer, phrase count,
        already-reinstated flag, plus a small sample of removed phrases).
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the batch removal entry. Pass back to /reinstate-batch as `removedAt`.
        removedBy:
          type: string
          description: Reviewer name or email recorded on the batch removal. Omitted if the original removal didn't supply one.
        phraseCount:
          type: integer
          description: Number of phrases that were removed in this batch.
        reinstated:
          type: boolean
          description: Aggregate flag — true once every inner phrase from this batch has already been reinstated.
        samplePhrases:
          type: array
          maxItems: 5
          items:
            type: string
          description: First few removed phrases (capped at 5), shown in the picker so reviewers can identify the batch at a glance.
      required: [removedAt, phraseCount, reinstated, samplePhrases]

    HandwavyPhraseRemovalBatchesList:
      type: object
      description: |
        Task #160 — Response from GET
        /feedback/calibration/handwavy-phrases/removal-batches. Newest batches
        are returned first.
      properties:
        limit:
          type: integer
          description: Effective page size used for this response.
        totalBatches:
          type: integer
          description: Total number of batch removal entries in the history log (regardless of `limit`).
        batches:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseRemovalBatchSummary"
      required: [limit, totalBatches, batches]

    HandwavyPhraseRemovalBatchDetail:
      type: object
      description: |
        Task #176 — Detail response for one batch removal entry. Echoes the
        FULL inner phrase list with per-phrase audit metadata so the
        reinstate-batch CLI (and the Task #244 web reviewer picker) can
        render every phrase the action would touch — not just the
        5-phrase sample the list endpoint returns. `reinstatedCount`
        / `reinstated` together let callers spot a partial- or
        already-fully-reinstated batch before re-firing the action.
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the parent batch removal entry (echoes the path parameter).
        removedBy:
          type: string
          description: Reviewer name or email recorded on the batch removal. Omitted if the original removal didn't supply one.
        reinstated:
          type: boolean
          description: Aggregate flag — true once every inner phrase from this batch has been reinstated.
        reinstatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the batch was fully reinstated, when `reinstated` is true.
        reinstatedBy:
          type: string
          description: Reviewer name or email recorded on the batch-level reinstate, when `reinstated` is true.
        phraseCount:
          type: integer
          description: Total number of phrases in this batch.
        reinstatedCount:
          type: integer
          description: Number of inner phrases that have already been reinstated (per-phrase or via a prior batch reinstate).
        phrases:
          type: array
          description: Full inner phrase list with per-phrase audit metadata.
          items:
            $ref: "#/components/schemas/HandwavyBatchHistoryPhrase"
      required: [removedAt, reinstated, phraseCount, reinstatedCount, phrases]

    HandwavyPhraseRemovalBatchDetailError:
      type: object
      description: |
        Task #176 — 404 response shape for the batch detail endpoint.
        `reason` discriminates between "no matching removal-history entry"
        and "matched a single-phrase removal" so callers can format a
        targeted hint (e.g. the CLI suggests /reinstate for the latter).
      properties:
        error:
          type: string
        reason:
          type: string
          enum: [history-not-found, not-a-batch]
      required: [error, reason]

    HandwavyPhrasesList:
      type: object
      properties:
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        total:
          type: integer
        history:
          type: array
          description: Removal audit log (most recent last). Bounded server-side.
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required: [phrases, total, history]

    HandwavyPhraseEditBody:
      type: object
      description: |
        Request body for the in-place edit endpoint. The `phrase` string
        identifies which curated marker to update; provide at least one of
        `category`, `rationale`, or `newPhrase` to actually change
        something. Send an empty `rationale` string to clear an existing
        rationale. Task #247 — `newPhrase` is the rename target; the edit
        only changes the row identity when its normalized form differs
        from the existing phrase, otherwise it is treated as a no-op.
      properties:
        phrase:
          type: string
          description: Existing curated phrase to edit (matched after lowercase + whitespace normalization).
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        rationale:
          type: string
          description: New rationale text. Empty string clears the existing rationale.
        newPhrase:
          type: string
          description: |
            Task #247 — Rename target. Normalized to lowercase + collapsed
            whitespace before matching, and rejected when the normalized
            form already belongs to another active marker. When the
            normalized form matches the existing `phrase`, the rename is a
            no-op; the request can still apply concurrent
            `category`/`rationale` updates.
        reviewer:
          type: string
          description: Reviewer name or email recorded in the edit audit entry. Optional.
      required: [phrase]

    HandwavyPhraseBody:
      type: object
      properties:
        phrase:
          type: string
          description: Marker phrase (case-insensitive substring match against report text after whitespace collapsing).
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        dryRun:
          type: boolean
          description: |
            Task #114 — when true on POST, the server does NOT persist the phrase. It runs the
            candidate phrase against the curated benchmark corpus (T1 LEGIT / T2 BORDERLINE
            / T3 SLOP / T4 HALLUCINATED fixtures) and returns a `dryRunMatches` block so
            reviewers can see how many GREEN / YELLOW reports the phrase would have hit
            before they confirm the add.

            Task #155 — when true on DELETE for a single phrase, the server does NOT
            mutate the active list, history, or cache and instead returns a
            `HandwavyPhraseSingleRemoveDryRunResponse` (the same corpus + production
            removal-impact summary as the batch dry-run, with `batch: false`).

            Defaults to false (write-through behavior).
        reviewer:
          type: string
          description: Reviewer name or email recorded in the audit trail. Optional.
        rationale:
          type: string
          description: Free-text justification recorded with the phrase. Only consulted on POST.
        productionScanLimit:
          type: integer
          minimum: 100
          maximum: 10000
          description: |
            Task #125 — optional override for the upper bound on the production-archive
            scan that backs the dry-run preview. Only consulted on the dry-run path
            (the only place the production scan runs). Heavy-user installs can widen
            the window for a stronger false-positive signal; small installs can tighten
            it to focus on recent reporter behavior. Defaults to 2000 when omitted so
            existing reviewers see no behavior change. The chosen value is echoed back
            in `dryRunMatchesProductionLimit` so the UI can label the second signal
            accurately.

            Task #230 — also accepted on the DELETE single-phrase dry-run path
            via `HandwavyPhraseBody`, which shares this body schema, so the
            same reviewer-chosen window drives the single-phrase removal preview
            too. The chosen value is echoed back in
            `HandwavyPhraseSingleRemoveDryRunResponse.dryRunImpact.productionLimit`.
      required: [phrase]

    HandwavyPhraseUndoBody:
      type: object
      description: |
        Task #130 — body for POST /feedback/calibration/handwavy-phrases/undo.
        The active marker is matched by `phrase` + `addedAt`; the request is
        rejected with 409 if the marker is older than the server-side undo
        window (default 5 minutes).
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase of the live marker to undo.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp from the live marker's `addedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `removedBy`/`undoneBy` on the resulting history row. Optional.
      required: [phrase, addedAt]

    HandwavyPhraseUndoBatchEntry:
      type: object
      description: |
        Task #233 — one `(phrase, addedAt)` pair to undo as part of a batch.
        Mirrors the single-undo body fields; see `HandwavyPhraseUndoBody`
        for the matching contract.
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase of the live marker to undo.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp from the live marker's `addedAt` field.
      required: [phrase, addedAt]

    HandwavyPhraseUndoBatchBody:
      type: object
      description: |
        Task #233 — body for POST /feedback/calibration/handwavy-phrases/undo-batch.
        The reviewer's UI walks every reviewer-added marker that's still
        inside its per-marker undo window and sends each one as a pair
        in `entries`. The server runs each entry through the per-marker
        undo path so every successful undo still produces its own
        `undone: true` history row (no batch-merge row that hides
        per-phrase provenance). Capped at 200 entries per call.
      properties:
        entries:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/HandwavyPhraseUndoBatchEntry"
        reviewer:
          type: string
          description: Reviewer name or email recorded as `removedBy`/`undoneBy` on every successful undo's history row. Optional.
      required: [entries]

    HandwavyPhraseUndoBatchEntryResult:
      type: object
      description: |
        Task #233 — outcome of attempting to undo one `(phrase, addedAt)`
        pair as part of a /undo-batch round-trip. Mirrors the
        single-undo failure reasons so the UI can render the same per-row
        explanations the per-row Undo button already surfaces.
      properties:
        phrase:
          type: string
        undone:
          type: boolean
        reason:
          type: string
          enum: [not-found, addedAt-mismatch, no-addedAt, window-expired]
          description: Present only when `undone` is false.
        historyEntry:
          allOf:
            - $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Present only when `undone` is true. The fresh `undone:true` history row appended for this phrase.
      required: [phrase, undone]

    HandwavyPhraseUndoBatchResponse:
      type: object
      description: |
        Task #233 — response from POST /feedback/calibration/handwavy-phrases/undo-batch.
        `phrases` and `history` echo the post-batch active list and audit
        log so callers can refresh their cached views in one round-trip.
      properties:
        undone:
          type: boolean
          description: Always true on a successful response (the batch was processed).
        batch:
          type: boolean
          description: Always true — distinguishes this response from a single-phrase /undo.
        undoneCount:
          type: integer
          description: Number of entries actually undone in this round-trip.
        skipped:
          type: integer
          description: Number of entries skipped (any non-success per-entry reason).
        total:
          type: integer
          description: Number of active phrases after the batch.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseUndoBatchEntryResult"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required: [undone, batch, undoneCount, skipped, total, results, phrases, history]

    HandwavyPhraseRevertEditBody:
      type: object
      description: |
        Task #132 — body for POST /feedback/calibration/handwavy-phrases/revert-edit.
        The edit entry is matched by `phrase` + `editedAt`.
      properties:
        phrase:
          type: string
          description: Existing curated phrase (matched after lowercase + whitespace normalization).
        editedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the `edits` entry to undo.
        reviewer:
          type: string
          description: Reviewer name or email recorded on the inverse edit entry. Optional.
      required: [phrase, editedAt]

    HandwavyPhraseBatchRemoveBody:
      type: object
      description: |
        Task #135 — batch removal request body for DELETE
        /feedback/calibration/handwavy-phrases. Sends up to 200 phrases in
        one round-trip; the server runs a single in-memory pass, a single
        file rewrite, and appends ONE history entry that lists every removed
        phrase. Mutually exclusive with the single-phrase `phrase` field.

        Task #145 — when `dryRun: true` the server returns a preview
        (`HandwavyPhraseBatchRemoveDryRunResponse`) that mirrors the
        post-mutation per-phrase results plus a corpus impact summary, but
        does NOT mutate the active list, the history log, or the cache.
      properties:
        phrases:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: string
          description: List of phrases to remove. Normalized server-side.
        reviewer:
          type: string
          description: Reviewer name or email recorded on the batch history entry. Optional.
        dryRun:
          type: boolean
          description: When true, return a removal preview (corpus impact + per-phrase outcomes) without mutating the active list.
        productionScanLimit:
          type: integer
          minimum: 100
          maximum: 10000
          description: |
            Task #229 / #230 — optional override for the upper bound on the
            production-archive scan that backs the bulk-removal dry-run. Mirrors the
            same field on `HandwavyPhraseBody` (Task #125) so the reviewer-chosen scan
            window persisted in the calibration UI applies to every production-archive
            scan, not just the add-phrase preview. Only consulted on the dry-run path,
            but validated on every DELETE so a malformed value never silently slips into
            a real bulk delete. Heavy-user installs can widen the window for a sharper
            "valid detections lost" signal; small installs can tighten it. Defaults to
            2000 when omitted so existing reviewers see no behavior change. The chosen
            value is echoed back in
            `HandwavyPhraseBatchRemoveDryRunResponse.dryRunImpact.productionLimit`.
      required: [phrases]

    HandwavyPhraseBatchRemoveDryRunImpact:
      type: object
      description: |
        Task #145 — projected impact of a bulk removal against a single
        corpus (curated benchmark fixtures or recent production reports).
        `total` counts fixtures that are flagged today but would NOT be
        flagged after the removal, broken down by tier. `validDetectionsLost`
        is `byTier.t3Slop + byTier.t4Hallucinated` (the worrying number).
        `falsePositivesDropped` is `byTier.t1Legit + byTier.t2Borderline`
        (informational good news). `warning` is set when valid detections
        would be lost; null otherwise.
      properties:
        total:
          type: integer
        byTier:
          type: object
          properties:
            t1Legit: { type: integer }
            t2Borderline: { type: integer }
            t3Slop: { type: integer }
            t4Hallucinated: { type: integer }
          required: [t1Legit, t2Borderline, t3Slop, t4Hallucinated]
        validDetectionsLost:
          type: integer
        falsePositivesDropped:
          type: integer
        corpusSize:
          type: integer
        sampleMatches:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              tier:
                type: string
                enum: [T1_LEGIT, T2_BORDERLINE, T3_SLOP, T4_HALLUCINATED]
            required: [id, tier]
        warning:
          oneOf:
            - type: string
            - type: "null"
        oldestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #218 — For production scans, the earliest `createdAt` among the rows
            actually included in the scanned sample (i.e. survived the label/content
            filter, so the same population reflected in `corpusSize`). Reported so
            reviewers using the bulk-retire flow can tell whether the impact signal
            reflects current reporter behavior or a long-stale archive (e.g. "scanned
            2000 reports from 2026-02-01 to 2026-04-22"). Null on the curated
            benchmark block (fixtures have no wall-clock timestamp) and when the
            scan was empty. Mirrors the add-time `HandwavyPhraseDryRunMatches`
            field of the same name (Task #124).
        newestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #218 — For production scans, the most recent `createdAt` among the
            rows actually included in the scanned sample. See `oldestCreatedAt` for
            details. Null on the curated benchmark block and when the scan was empty.
      required: [total, byTier, validDetectionsLost, falsePositivesDropped, corpusSize, sampleMatches, warning, oldestCreatedAt, newestCreatedAt]

    HandwavyPhraseBatchRemoveDryRunResponse:
      type: object
      description: |
        Task #145 — preview response returned when DELETE
        /feedback/calibration/handwavy-phrases is called with `dryRun: true`
        on the batch path. Mirrors the post-mutation per-phrase result
        shape but does NOT mutate the active list, history, or cache.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [true]
        wouldRemove:
          type: integer
          description: Count of phrases that WOULD be removed if the batch were applied.
        notFound:
          type: integer
        duplicateInBatch:
          type: integer
        total:
          type: integer
          description: Active list size BEFORE the batch (no mutation occurred).
        projectedTotal:
          type: integer
          description: Projected active list size AFTER the batch would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
        dryRunImpact:
          type: object
          properties:
            corpus:
              $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
            production:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
                - type: "null"
            productionError:
              oneOf:
                - type: string
                - type: "null"
            productionLimit:
              type: integer
          required: [corpus, productionError, productionLimit]
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
      required: [dryRun, batch, wouldRemove, notFound, duplicateInBatch, total, projectedTotal, results, dryRunImpact, phrases]

    HandwavyPhraseSingleRemoveDryRunResponse:
      type: object
      description: |
        Task #155 — preview response returned when DELETE
        /feedback/calibration/handwavy-phrases is called with `dryRun: true`
        on the SINGLE-phrase path. Mirrors the batch dry-run shape (with
        `batch: false`) so the in-UI Trash flow can show the same corpus +
        production removal-impact warning before a one-click removal,
        without mutating the active list, history, or cache.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [false]
        wouldRemove:
          type: integer
          description: 0 if the phrase is not on the active list, 1 otherwise.
        notFound:
          type: integer
        duplicateInBatch:
          type: integer
        phrase:
          type: string
          description: Normalized form actually compared against the active list.
        raw:
          type: string
          description: Original (raw) phrase as supplied by the client.
        removed:
          type: boolean
          description: Whether the phrase WOULD be removed if the call were not a dry run.
        reason:
          oneOf:
            - type: string
              enum: [not-found, duplicate-in-batch]
            - type: "null"
        total:
          type: integer
          description: Active list size BEFORE the removal (no mutation occurred).
        projectedTotal:
          type: integer
          description: Projected active list size AFTER the removal would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
          description: Single-element array mirroring the batch dry-run results shape.
        dryRunImpact:
          type: object
          properties:
            corpus:
              $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
            production:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
                - type: "null"
            productionError:
              oneOf:
                - type: string
                - type: "null"
            productionLimit:
              type: integer
          required: [corpus, productionError, productionLimit]
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
      required: [dryRun, batch, wouldRemove, notFound, duplicateInBatch, phrase, raw, removed, total, projectedTotal, results, dryRunImpact, phrases]

    HandwavyPhraseBatchRemoveResultEntry:
      type: object
      description: |
        Per-phrase outcome from a Task #135 batch removal. `phrase` is the
        normalized form actually compared against the active list. `reason`
        is omitted on successful removals.
      properties:
        raw:
          type: string
          description: Original (raw) phrase as supplied by the client.
        phrase:
          type: string
          description: Normalized form actually compared against the active list.
        removed:
          type: boolean
        reason:
          type: string
          enum: [not-found, duplicate-in-batch]
      required: [raw, phrase, removed]

    HandwavyPhraseBatchRemoveResponse:
      type: object
      description: |
        Task #135 — response from a batch DELETE call. The shape is
        intentionally distinct from `HandwavyPhraseMutationResponse` so
        clients can disambiguate by checking `batch === true`.
      properties:
        batch:
          type: boolean
          enum: [true]
        removed:
          type: integer
          description: Count of phrases that actually came off the active list.
        notFound:
          type: integer
          description: Count of phrases that were not in the active list at lookup time.
        total:
          type: integer
          description: Number of active phrases AFTER the batch.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
        historyEntry:
          oneOf:
            - $ref: "#/components/schemas/HandwavyHistoryEntry"
            - type: "null"
          description: The single batch history entry, or null if nothing was removed.
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Full active list after the batch.
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Full removal audit log after the batch.
      required: [batch, removed, notFound, total, results, phrases, history]

    HandwavyPhraseReinstateBody:
      type: object
      description: |
        Task #121 — body for POST /feedback/calibration/handwavy-phrases/reinstate.
        The history row is matched by `phrase` + `removedAt`.
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase from the matching history entry.
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the matching history entry's `removedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `addedBy`/`reinstatedBy` in the audit trail. Optional.
      required: [phrase, removedAt]

    HandwavyPhraseReinstateBatchBody:
      type: object
      description: |
        Task #144 — body for POST /feedback/calibration/handwavy-phrases/reinstate-batch.
        The batch history entry is matched by `removedAt`; every inner phrase
        that has not already been reinstated and is not currently active is
        re-added in one round-trip.

        Task #159 — when `dryRun: true` the server returns
        `HandwavyPhraseReinstateBatchDryRunResponse` with the same per-phrase
        outcome shape, and does NOT mutate the active marker list, the
        removal-history log, or the cache. Both the mutating and dry-run
        paths return HTTP 200; callers discriminate on the `dryRun` flag
        in the response body.
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the matching batch removal entry's `removedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `addedBy`/`reinstatedBy` on every reinstated phrase. Optional.
        dryRun:
          type: boolean
          description: When true, return a per-phrase reinstate preview without mutating the active list or removal-history log.
      required: [removedAt]

    HandwavyPhraseReinstateBatchResponse:
      type: object
      description: |
        Task #144 — response from POST /feedback/calibration/handwavy-phrases/reinstate-batch.
      properties:
        reinstated:
          type: boolean
          description: Always true on a successful mutating response (the batch was processed).
        batch:
          type: boolean
          description: Always true — distinguishes this response from a single-phrase /reinstate.
        removedAt:
          type: string
          format: date-time
        reinstatedCount:
          type: integer
          description: Number of inner phrases actually re-added in this round-trip.
        skipped:
          type: integer
          description: Number of inner phrases skipped (already reinstated or already active).
        total:
          type: integer
          description: Number of active phrases after the batch reinstate.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseReinstateBatchEntryResult"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required: [reinstated, batch, removedAt, reinstatedCount, skipped, total, results, historyEntry, phrases, history]

    HandwavyPhraseReinstateBatchEntryResult:
      type: object
      description: |
        Task #144 — outcome of attempting to reinstate one inner phrase as
        part of a /reinstate-batch round-trip.
      properties:
        phrase:
          type: string
        reinstated:
          type: boolean
        reason:
          type: string
          enum: [already-reinstated, already-active]
          description: Present only when `reinstated` is false.
      required: [phrase, reinstated]

    HandwavyPhraseReinstateBatchDryRunResponse:
      type: object
      description: |
        Task #159 — dry-run preview returned when POST
        /feedback/calibration/handwavy-phrases/reinstate-batch is called with
        `dryRun: true`. Mirrors the per-phrase outcome shape of
        `HandwavyPhraseReinstateBatchResponse` so callers can reuse the same
        renderer, but does NOT mutate the active marker list, the
        removal-history log, or the cache. Both the mutating and dry-run
        paths return HTTP 200; callers discriminate on the `dryRun` flag
        in the response body.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [true]
        removedAt:
          type: string
          format: date-time
        reinstatedCount:
          type: integer
          description: Number of inner phrases that WOULD be re-added if the batch were applied.
        skipped:
          type: integer
          description: Number of inner phrases that would be skipped (already reinstated or already active).
        total:
          type: integer
          description: Projected number of active phrases after the batch reinstate would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseReinstateBatchEntryResult"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Removal-history log (unchanged because this is a dry run).
      required: [dryRun, batch, removedAt, reinstatedCount, skipped, total, results, historyEntry, phrases, history]

    HandwavyPhraseDryRunMatches:
      type: object
      description: |
        Task #114 — preview of how a candidate FLAT hand-wavy phrase would have flagged
        the curated benchmark corpus. `falsePositives` is the count of T1 LEGIT (GREEN)
        and T2 BORDERLINE (YELLOW) fixtures the substring would have matched — a high
        value is a strong signal that the phrase will crater AVRI for legitimate reports.
      properties:
        total:
          type: integer
          description: Total number of corpus fixtures the candidate phrase matched.
        byTier:
          type: object
          properties:
            t1Legit:
              type: integer
              description: Matches in T1 LEGIT fixtures (GREEN — legitimate, well-evidenced).
            t2Borderline:
              type: integer
              description: Matches in T2 BORDERLINE fixtures (YELLOW — debatable signal).
            t3Slop:
              type: integer
              description: Matches in T3 SLOP fixtures (RED — known slop archetypes).
            t4Hallucinated:
              type: integer
              description: Matches in T4 HALLUCINATED fixtures (RED — fabricated/hallucinated).
          required: [t1Legit, t2Borderline, t3Slop, t4Hallucinated]
        falsePositives:
          type: integer
          description: T1 + T2 hits — the count of GREEN/YELLOW corpus reports that would have been flagged.
        corpusSize:
          type: integer
          description: Total number of corpus fixtures evaluated.
        sampleMatches:
          type: array
          maxItems: 12
          items:
            type: object
            properties:
              id:
                type: string
              tier:
                type: string
                enum: [T1_LEGIT, T2_BORDERLINE, T3_SLOP, T4_HALLUCINATED]
            required: [id, tier]
          description: Up to 12 sample matched fixtures (id + tier) for reviewer review.
        warning:
          type: string
          nullable: true
          description: |
            Reviewer-facing warning string when the phrase would flag legitimate reports
            (`falsePositives > 0`). Null when there are no GREEN/YELLOW hits.
        oldestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #124 — For production scans, the earliest `createdAt` among the rows
            actually included in the scanned sample (i.e. survived the label/content
            filter, so the same population reflected in `corpusSize`). Reported so
            reviewers can tell whether the false-positive signal reflects current
            reporter behavior or a long-stale archive (e.g. "scanned 2000 reports
            from 2026-02-01 to 2026-04-22"). Null on the curated benchmark block
            (fixtures have no wall-clock timestamp) and when the scan was empty.
        newestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #124 — For production scans, the most recent `createdAt` among the
            rows actually included in the scanned sample. See `oldestCreatedAt` for
            details. Null on the curated benchmark block and when the scan was empty.
      required: [total, byTier, falsePositives, corpusSize, sampleMatches, oldestCreatedAt, newestCreatedAt]

    HandwavyPhraseDryRunOverlaps:
      type: object
      description: |
        Task #123 — overlap signal between a candidate FLAT hand-wavy phrase and the
        already-curated active list. A non-empty `matches` array means adding the
        candidate would be redundant (or partially redundant) with an existing entry,
        which the reviewer should see BEFORE confirming the add. The relation tells
        the reviewer whether the candidate is an exact duplicate, a broader phrase
        that would supersede an existing one, or a narrower phrase already covered
        by an existing entry.
      properties:
        total:
          type: integer
          description: Number of curated entries the candidate overlaps with.
        matches:
          type: array
          items:
            type: object
            properties:
              phrase:
                type: string
                description: The existing curated phrase that the candidate overlaps with.
              category:
                $ref: "#/components/schemas/HandwavyCategory"
              relation:
                type: string
                enum: [equal, candidate-contains-existing, existing-contains-candidate]
                description: |
                  How the candidate relates to the existing curated phrase:
                  - `equal`: identical normalized text (exact duplicate).
                  - `candidate-contains-existing`: candidate is broader; it would
                    supersede the existing entry (anything matching the existing
                    phrase would also match the candidate).
                  - `existing-contains-candidate`: candidate is narrower; the
                    existing phrase already covers everything the candidate would.
            required: [phrase, category, relation]
      required: [total, matches]

    HandwavyPhraseMutationResponse:
      type: object
      properties:
        added:
          type: boolean
          description: True when POST appended the phrase. Omitted on PATCH/DELETE responses.
        edited:
          type: boolean
          description: True when PATCH actually changed the marker; false when the supplied updates matched the existing values. Omitted on POST/DELETE responses.
        editEntry:
          $ref: "#/components/schemas/HandwavyEditEntry"
        removed:
          type: boolean
          description: True when DELETE removed the phrase. Omitted on POST responses.
        reinstated:
          type: boolean
          description: |
            Task #121 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/reinstate. Omitted on plain
            POST/DELETE responses.
        undone:
          type: boolean
          description: |
            Task #130 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/undo. Omitted on plain
            POST/DELETE/reinstate responses.
        reverted:
          type: boolean
          description: |
            Task #132 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/revert-edit. Inspect
            `edited` to tell whether the revert actually changed anything.
            Omitted on other endpoints.
        revertedEntry:
          $ref: "#/components/schemas/HandwavyEditEntry"
        phrase:
          type: string
          description: The normalized phrase that was added/removed.
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        total:
          type: integer
          description: Number of active phrases after the mutation.
        marker:
          $ref: "#/components/schemas/HandwavyMarker"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Full active list after the mutation.
        dryRun:
          type: boolean
          description: |
            Task #114 — true when the response is a preview only and the phrase was NOT
            persisted. When dryRun is true, `dryRunMatches` is populated and the existing
            active phrase list (unchanged) is returned in `phrases`.
        dryRunMatches:
          $ref: "#/components/schemas/HandwavyPhraseDryRunMatches"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Full removal audit log after the mutation (only included on DELETE).
        dryRunMatchesProduction:
          allOf:
            - $ref: "#/components/schemas/HandwavyPhraseDryRunMatches"
          nullable: true
          description: |
            Task #119 — Same shape as `dryRunMatches`, but scored against the most
            recent N production reports (capped by `dryRunMatchesProductionLimit`)
            instead of the curated benchmark cohorts. Production rows are bucketed
            into the same T1/T2/T3/T4 tiers as the curated corpus by mapping the
            persisted vulnrap composite label (STRONG/PROMISING -> T1, REASONABLE/
            NEEDS REVIEW -> T2, LIKELY INVALID -> T3, HIGH RISK -> T4). `corpusSize`
            on this block is the number of production reports actually scanned
            after dropping rows with no usable label / content. `null` when the
            production scan failed (see `dryRunMatchesProductionError`).
        dryRunMatchesProductionError:
          type: string
          nullable: true
          description: |
            Task #119 — Reviewer-facing notice when the production-archive scan
            could not run (e.g. DB unavailable). Null on success. The curated
            `dryRunMatches` block is still returned regardless.
        dryRunMatchesProductionLimit:
          type: integer
          description: |
            Task #119 — Upper bound on the number of most-recent production reports
            the dry-run scan considered. Reported so reviewers know the depth of
            the second signal (e.g. "scanned the last 2000 reports").
        dryRunOverlaps:
          $ref: "#/components/schemas/HandwavyPhraseDryRunOverlaps"
      required: [phrase, total, phrases]

