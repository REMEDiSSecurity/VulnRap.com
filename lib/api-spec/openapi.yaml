        - notes

    ReproRecipe:
      type: object
      description: Structured reproduction recipe — setup commands, PoC script, and Dockerfile for reproducing the reported vulnerability
      properties:
        title:
          type: string
        target:
          oneOf:
            - $ref: "#/components/schemas/ReproRecipeTarget"
            - type: "null"
        setupCommands:
          type: array
          items:
            type: string
          description: Shell commands to set up the target environment
        pocScript:
          oneOf:
            - type: string
            - type: "null"
          description: Extracted or generated PoC as a runnable script
        pocLanguage:
          oneOf:
            - type: string
            - type: "null"
          description: Language of the PoC script (bash, python, etc.)
        expectedOutput:
          oneOf:
            - type: string
            - type: "null"
          description: What the triager should observe if the vulnerability is real
        dockerfile:
          oneOf:
            - type: string
            - type: "null"
          description: Generated Dockerfile for containerized reproduction
        notes:
          type: array
          items:
