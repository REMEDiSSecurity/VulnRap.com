            - $ref: "#/components/schemas/TemplateMatch"
            - type: "null"
          description: Template reuse detection result. Null when no template match found.
        matrixInputs:
          oneOf:
            - $ref: "#/components/schemas/TriageMatrixInputs"
            - type: "null"
          description: The v3.6.0 matrix inputs (composite, engine 2 substance, verification ratio, strong-evidence count) that drove the triage decision. Null on legacy reports stored before v3.6.0 composite scoring.
        revision:
          oneOf:
            - $ref: "#/components/schemas/RevisionResult"
            - type: "null"
          description: Revision tracking result — detected when a report is a revision of a recent submission. Null when not a revision.
      required:
        - action
        - reason
        - note
        - challengeQuestions
        - temporalSignals
        - matrixInputs

    TriageMatrixInputs:
