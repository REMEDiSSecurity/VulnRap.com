    Verification:
      type: object
      properties:
        checks:
          type: array
          items:
            $ref: "#/components/schemas/VerificationCheck"
        summary:
          $ref: "#/components/schemas/VerificationSummary"
        triageNotes:
          type: array
          items:
            type: string
          description: Actionable notes for PSIRT triage based on verification results
        score:
          type: integer
          description: Verification axis score (0-100, 50=neutral, above=slop signals, below=human signals)
        detectedProjects:
          type: array
          items:
            $ref: "#/components/schemas/DetectedProject"
        mode:
          type: string
          enum:
            - SOURCE_CODE
            - ENDPOINT
            - MANUAL_ONLY
            - GENERIC
          description: |
            Active-verification routing decision. SOURCE_CODE probes detected
            GitHub repos for cited file paths/symbols; ENDPOINT runs PoC
            plausibility checks; MANUAL_ONLY short-circuits automated probes
            (race conditions, request smuggling) and only verifies CVE
            existence; GENERIC runs both source-code and endpoint probes.
        familyName:
          type: string
          description: Human-readable AVRI family name that drove the verification mode (e.g. "Web client (XSS / CSRF / clickjacking / open redirect)").
      required:
        - checks
        - summary
        - triageNotes
        - score
        - detectedProjects

    ScoreBreakdown:
      type: object
      properties:
        linguistic:
          type: integer
          description: Linguistic AI fingerprinting score (0-100)
        factual:
          type: integer
          description: Factual verification score (0-100)
        template:
          type: integer
          description: Template/mass-submission pattern score (0-100)
        llm:
          type: ["integer", "null"]
          description: LLM analysis score (0-100), null if LLM unavailable
        verification:
          type: ["integer", "null"]
          description: Active content verification score (0-100, 50=neutral). Null when no verifiable references found.
        quality:
          type: integer
          description: Report quality score (0-100)
        substanceScore:
          type: ["integer", "null"]
          description: LLM substance score (0-100). Null when LLM not used.
        coherenceScore:
          type: ["integer", "null"]
          description: LLM coherence score (0-100). Null when LLM not used.
        pocValidity:
          type: ["integer", "null"]
          description: LLM PoC validity score (0-100). Null when LLM not used.
        domainCoherence:
          type: ["integer", "null"]
          description: LLM domain coherence score (0-100). Null when LLM not used.
      required:
        - linguistic
        - factual
        - template
        - quality

    HumanIndicator:
      type: object
      properties:
        type:
          type: string
          description: Human indicator type (e.g. human_contractions, human_terse_style)
        description:
          type: string
          description: Human-readable description of the human signal
        weight:
          type: integer
          description: Negative weight (reduces slop score)
        matched:
          type: ["string", "null"]
          description: The specific text that triggered this indicator
      required:
        - type
        - description
        - weight

    EvidenceItem:
      type: object
      properties:
        type:
          type: string
          description: Evidence type identifier (e.g. ai_phrase, placeholder_url, severity_inflation)
        description:
          type: string
          description: Human-readable description of the signal
        weight:
          type: integer
          description: Weight/importance of this signal (higher = more significant)
        matched:
          type: ["string", "null"]
          description: The specific text or pattern that was matched
        markers:
          type: array
          items:
            type: string
          description: |
            Task #431: optional structured per-marker IDs for evidence types that aggregate multiple impossibility tells
            into a single signal (today: `hallucination_impossible_http_response`). The triage UI renders one
            badge plus a plain-language tooltip per marker; non-UI surfaces (logs, exports, markdown reports)
            keep using `description`. Omitted when the signal does not aggregate per-marker tells.
        context:
          type: object
          description: |
            Task #435: optional structured payload for richer rendering. Today
            only `hallucination_structural_fabrication` populates this — the
            results UI uses `context.markers` to render one bullet per
            fabrication tell that fired (with each marker's id +
            human-readable description), without regex-parsing the joined
            description string.
          properties:
            markers:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  description:
                    type: string
                required:
                  - id
                  - description
      required:
        - type
        - description
        - weight

    TriageRecommendation:
      type: object
      properties:
        action:
          type: string
          enum:
            [
              AUTO_CLOSE,
              MANUAL_REVIEW,
              CHALLENGE_REPORTER,
              PRIORITIZE,
              STANDARD_TRIAGE,
            ]
          description: Recommended triage action based on score, confidence, and verification results
        reason:
          type: string
          description: Why this action was recommended
        note:
          type: string
          description: Detailed guidance for the triager
        challengeQuestions:
          type: array
          items:
            $ref: "#/components/schemas/ChallengeQuestion"
          description: Questions to send to the reporter to verify legitimacy (1-4 questions based on detected issues)
        temporalSignals:
          type: array
          items:
            $ref: "#/components/schemas/TemporalSignal"
          description: Behavioral signals based on CVE publication timing
        templateMatch:
          oneOf:
            - $ref: "#/components/schemas/TemplateMatch"
            - type: "null"
          description: Template reuse detection result. Null when no template match found.
        matrixInputs:
          oneOf:
            - $ref: "#/components/schemas/TriageMatrixInputs"
            - type: "null"
          description: The v3.6.0 matrix inputs (composite, engine 2 substance, verification ratio, strong-evidence count) that drove the triage decision. Null on legacy reports stored before v3.6.0 composite scoring.
        revision:
          oneOf:
            - $ref: "#/components/schemas/RevisionResult"
            - type: "null"
          description: Revision tracking result — detected when a report is a revision of a recent submission. Null when not a revision.
      required:
        - action
        - reason
        - note
        - challengeQuestions
        - temporalSignals
        - matrixInputs

    TriageMatrixInputs:
      type: object
      description: The four matrix inputs that drove the v3.6.0 triage decision.
      properties:
        compositeScore:
          type: number
          description: Composite score 0..100, higher = better.
        engine2Score:
          type: number
          description: Engine 2 (Technical Substance Analyzer) score 0..100.
        verificationRatio:
          type: number
          description: Verified / (verified + not_found) ratio over referenced_in_report checks (0..1).
        strongEvidenceCount:
          type: integer
          description: Count of strong evidence signals (CRASH_OUTPUT, STACK_TRACE, CODE_DIFF, etc.).
      required:
        - compositeScore
        - engine2Score
        - verificationRatio
        - strongEvidenceCount

    ChallengeQuestion:
      type: object
      properties:
        category:
          type: string
          description: Question category (missing_file, missing_function, nvd_plagiarism, invalid_cve, placeholder_poc, severity_inflation, fabricated_output)
        question:
          type: string
          description: The question to send to the reporter
        context:
          type: string
          description: Context about why this question was generated
      required:
        - category
        - question
        - context

    TemporalSignal:
      type: object
      properties:
        cveId:
          type: string
        publishedDate:
          type: string
          format: date-time
        hoursSincePublication:
          type: number
        signal:
          type: string
          enum: [suspiciously_fast, fast_turnaround, normal]
        weight:
          type: integer
      required:
        - cveId
        - publishedDate
        - hoursSincePublication
        - signal
        - weight

    TemplateMatch:
      type: object
      properties:
