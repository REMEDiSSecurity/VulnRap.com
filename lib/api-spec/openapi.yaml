            - type: "null"
        reproRecipe:
          oneOf:
            - $ref: "#/components/schemas/ReproRecipe"
            - type: "null"
          description: Structured reproduction recipe with setup commands, PoC script, and optional Dockerfile
      required:
        - gaps
        - dontMiss
        - reporterFeedback
        - reporterFeedbackSummary

    NewsletterSubscribeBody:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address to subscribe to the community mailing list.
        challengeId:
          type: string
          description: The challenge ID returned from GET /newsletter/challenge.
        challengeSolution:
          type: string
          description: |
            The solution string whose SHA-256 hash with the issued nonce
            satisfies the challenge difficulty.
      required:
        - email
        - challengeId
        - challengeSolution

    NewsletterChallenge:
      type: object
      properties:
        challengeId:
          type: string
        nonce:
          type: string
        difficulty:
          type: integer
        prefix:
          type: string
        expiresAt:
          type: number
      required: [challengeId, nonce, difficulty, prefix, expiresAt]

    NewsletterSubscribeResponse:
      type: object
      properties:
        ok:
          type: boolean
        alreadySubscribed:
          type: boolean
          description: True when the HMAC of this address was already on file.
        pendingConfirmation:
          type: boolean
          description: |
            True when the server requires the user to click a link in a
            confirmation email before the subscription is considered
            active (NEWSLETTER_DOUBLE_OPT_IN is on). Always false for
            duplicate signups.
        message:
          type: string
      required:
        - ok
        - alreadySubscribed
        - pendingConfirmation
        - message

    NewsletterConfirmResponse:
      type: object
      properties:
        ok:
          type: boolean
        alreadyConfirmed:
          type: boolean
          description: True when this token was used to confirm a prior click.
        message:
          type: string
      required:
        - ok
        - alreadyConfirmed
        - message

    NewsletterUnsubscribeBody:
      type: object
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 128
          description: The opaque token from the unsubscribe link in the email.
      required:
        - token

    NewsletterUnsubscribeResponse:
      type: object
      properties:
        ok:
          type: boolean
        removed:
          type: boolean
          description: True when a matching subscription was removed; false when the token was unknown / already used.
        message:
          type: string
      required:
        - ok
        - removed
        - message

    SubmitFeedbackBody:
