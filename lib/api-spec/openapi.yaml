openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 3.0.0
  description: VulnRap.com API — Vulnerability Report Validation Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Report submission and analysis
  - name: feedback
    description: User feedback
  - name: stats
    description: Platform statistics
  - name: newsletter
    description: Community newsletter signup
  - name: cohort
    description: Cohort baseline distributions for contextualizing scores
  - name: public
    description: Public-safe transparency endpoints (no reviewer-only fields)
  - name: presets
    description: Curated public preset library (sensitivity + per-engine weights)
  - name: phrase-suggestions
    description: User-suggested handwavy / ai-self-disclosure phrases (Task #634)
  - name: internal
    description: Reviewer-only internal surfaces (gated by CALIBRATION_TOKEN)
  - name: audit
    description: Reviewer audit log of mutation endpoints
  - name: gallery
    description: Curated sample-report gallery for new users
  - name: showcase
    description: Curator-picked "interesting reports" — high-confidence catches, edge cases, surprising agreements
  - name: embed
    description: Embeddable public assets (badges, snippets) for third-party triage tools
  - name: webhooks
    description: Reviewer-managed webhook subscriptions (Task #673)
  - name: roadmap
    description: Public roadmap (Now / Next / Later)
  - name: test-yourself
    description: Bring-your-own labeled fixture battery — score user-supplied rows against the live engines and report precision/recall/F1.
paths:
  /webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List registered webhooks (reviewer-only)
      description: |
        Returns every registered webhook with its destination URL,
        subscribed events, registration timestamp, last successful
        delivery, and current consecutive-failure count. Reviewer-only —
        the destination URLs and failure counters are operational data we
        do not expose publicly.
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookList"
        "401":
          description: Missing or invalid reviewer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook (reviewer-only)
      description: |
        Registers a destination URL that will receive a signed POST
        whenever a subscribed event fires. v1 only emits the
        `report.scored` event after a successful POST /reports.

        The response body includes a freshly-generated `secret` exactly
        once — only its SHA-256 hash is persisted on the server, so the
        caller MUST capture this value to verify incoming HMAC
        signatures. Re-register the webhook to receive a new secret if
        it is lost.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreateBody"
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookCreateResponse"
        "400":
          description: Invalid URL or unsupported event type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid reviewer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete a registered webhook (reviewer-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeleteResponse"
        "400":
          description: Invalid webhook id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid reviewer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /version:
    get:
      operationId: getVersion
      tags: [health]
      summary: Build / version info
      description: |
        Returns the running build's project version, git SHA, OpenAPI
        spec version, and build timestamp. Self-hosters and hosted-instance
        users can use this to confirm exactly which build they are talking
        to. Stable, public, no authentication required.
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"

  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a vulnerability report for analysis
      description: Upload a vulnerability report file for similarity checking and sloppiness scoring
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf). Either file or rawText must be provided.
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report. Either file, rawText, or reportUrl must be provided.
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                contentMode:
                  type: string
                  enum: [full, similarity_only]
                  default: full
                  description: Privacy mode — full shares content, similarity_only stores only hashes
                showInFeed:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Whether to show this report in the public recent reports feed
                skipLlm:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip LLM analysis — use only local heuristic/statistical scoring. Sent as string in multipart form data. Forced to "true" server-side when skipRedaction is "true".
                skipRedaction:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip PII auto-redaction. When enabled, LLM analysis is automatically disabled to prevent unredacted data from reaching external services. Sent as string in multipart form data.
              required:
                - contentMode
      responses:
        "201":
          description: Report submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report analysis results
      description: Retrieve the full analysis for a previously submitted report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a previously submitted report
      description: Permanently deletes a report and all associated data. Requires the delete token returned at submission time.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteReportBody"
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportResponse"
        "403":
          description: Invalid delete token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /embed/badge.svg:
    get:
      operationId: getEmbedBadgeSvg
      tags: [embed]
      summary: Embeddable score badge SVG (5 styles)
      description: |
        Returns an SVG badge showing the slop tier + score for the report
        identified by `id` (either a numeric id or the public `VR-XXXX` hex
        code). Designed to be dropped into READMEs, advisories, HackerOne /
        Bugcrowd comments, or triage tickets via `<img>` or Markdown.

        Five visual styles are supported via the `style` query param:
        `default` (Shields-style flat with gradient), `flat`, `plastic`,
        `social`, and `square`.

        Always returns 200 OK with a well-formed SVG — unknown / hidden /
        malformed ids render an "unknown" badge so a broken image never
        appears on the embedder's page. Honours `showInFeed`: hidden
        reports render as "unknown" so private scores are not leaked. Sets
        ETag + `Cache-Control: max-age=300` so embedders that re-render
        frequently get cheap 304s.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: Numeric report id, or public `VR-XXXX` hex code.
        - name: style
          in: query
          required: false
          schema:
            type: string
            enum: [default, flat, plastic, social, square]
            default: default
      responses:
        "200":
          description: SVG badge
          content:
            image/svg+xml:
              schema:
                type: string
        "304":
          description: Not modified (matches the `If-None-Match` header)

  /reports/{id}/verify:
    get:
      operationId: getVerification
      tags: [reports]
      summary: Get verification badge data for a report
      description: Returns a lightweight verification summary for embedding in bug reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationBadge"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/compare/{matchId}:
    get:
      operationId: compareReports
      tags: [reports]
      summary: Compare two reports side by side
      description: Returns redacted text snippets of both reports for side-by-side similarity comparison
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportComparison"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/score-history:
    get:
      operationId: getScoreHistory
      tags: [reports]
      summary: Get the chronological score evolution timeline for a report
      description: |
        Returns every recorded composite score for this report — the original
        analysis plus each subsequent backfill rescore. Each entry carries the
        composite score + tier + timestamp + correlation id. Per-engine
        sub-scores are included only for the current scoring event (where
        authentic engine numbers are persisted on the row); past entries
        return `engines: null` because today's analysis_traces schema does
        not persist per-engine numeric scores. `codeVersion` carries the
        semver-style scoring engine version that produced each entry — read
        from the persisted `engine_versions` column for the current score
        and from the `scoringEngineVersion` field on each rescore audit
        entry for historical scores. Null for legacy rows that predate
        version pinning. When the score-stability-monitor task lands a
        dedicated `report_rescore_log` table this endpoint will switch to
        reading from it; today the canonical per-row audit trail is the
        `rescoreHistory` array on the engines blob. Hidden from the UI
        when only a single entry exists (no rescores have happened) so
        fresh reports stay quiet.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Score history timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreHistoryResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /og/result/{id}.png:
    get:
      operationId: getResultOgCard
      tags: [reports]
      summary: Dynamic Open Graph card PNG for a results page
      description: |
        Task #666 — Returns a 1200×630 PNG composed from the report's score,
        tier, top fired evidence signal and timestamp, suitable for use as
        the og:image / twitter:image when sharing /results/:id links.
        Cached for 24h with a content-derived ETag. On any rendering failure
        or unknown / hidden report, redirects to the static site OG image so
        consumers always get something to display.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 1200×630 PNG card
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            image/png:
              schema:
                type: string
                format: binary
        "302":
          description: Fallback redirect to the static site OG image
          headers:
            Location:
              schema:
                type: string

  /reports/{id}/triage-report:
    get:
      operationId: getTriageReport
      tags: [reports]
      summary: Get exportable markdown triage report
      description: Returns a formatted markdown summary with score, verification results, evidence, recommendation, and challenge questions — ready to paste into Jira/ServiceNow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Triage report markdown
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/check:
    post:
      operationId: checkReport
      tags: [reports]
      summary: Check a report against the database without storing it
      description: For report receivers -- analyze a report for similarity and sloppiness without adding it to the database
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf)
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                skipLlm:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip LLM analysis — use only local heuristic/statistical scoring. Sent as string in multipart form data. Forced to "true" server-side when skipRedaction is "true".
                skipRedaction:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Skip PII auto-redaction. When enabled, LLM analysis is automatically disabled to prevent unredacted data from reaching external services. Sent as string in multipart form data.
              required: []
      responses:
        "200":
          description: Check results (not stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/check/dry-run-batch:
    post:
      operationId: checkReportDryRunBatch
      tags: [reports]
      summary: Preview auto-close decisions for a batch of reports
      description: |
        Read-only batch endpoint that runs the same scoring pipeline as
        `POST /reports/check` against an array of report bodies and
        returns, per item, the composite score, the recommended triage
        action, the AVRI gold-signal hit count, and a `wouldAutoClose`
        boolean that mirrors the safety gates in the platform-specific
        recipes (HackerOne, Bugcrowd, etc.). Use this to spot-check what
        the auto-close path *would* have closed across the last week of
        an inbox before flipping auto-close on for real.

        Nothing is persisted — neither the report bodies nor the
        decisions land on the public feed or in the database. LLM
        analysis is forced off so this stays cheap and rate-limit
        friendly. The endpoint shares the analysis rate-limit bucket
        (30 requests / 15 min / IP) with `POST /reports/check`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DryRunBatchBody"
      responses:
        "200":
          description: Per-item dry-run decisions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DryRunBatchResult"
        "400":
          description: Invalid request (empty array, oversize body, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: A single item exceeds the per-item size cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/lookup/{hash}:
    get:
      operationId: lookupByHash
      tags: [reports]
      summary: Look up a report by content hash
      description: Check if a report with the given SHA-256 content hash has been seen before
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            pattern: "^[a-fA-F0-9]{64}$"
            maxLength: 64
      responses:
        "200":
          description: Hash lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashLookupResult"

  /reports/feed:
    get:
      operationId: getReportFeed
      tags: [reports]
      summary: Get recent public reports
      description: Returns recent reports that submitters opted to show in the public feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: tier
          in: query
          required: false
          schema:
            type: string
          description: Filter by slop tier name (exact match)
        - name: avriFamily
          in: query
          required: false
          schema:
            type: string
            enum:
              - MEMORY_CORRUPTION
              - INJECTION
              - WEB_CLIENT
              - AUTHN_AUTHZ
              - CRYPTO
              - DESERIALIZATION
              - RACE_CONCURRENCY
              - REQUEST_SMUGGLING
              - FLAT
          description: Filter by cached AVRI rubric family id (exact match against reports.avri_family).
        - name: fabricatedEvidence
          in: query
          required: false
          schema:
            type: string
            enum:
              - fake_raw_http
              - stripped_trace
              - either
          description: |
            Filter the feed to AVRI Engine 2 fabricated-evidence cohorts. `fake_raw_http`
            keeps only rows where signalBreakdown.avri.rawHttp.isFake is true,
            `stripped_trace` keeps only rows where signalBreakdown.avri.crashTrace.isStripped
            is true, and `either` keeps rows that match either flag. Mirrors the
            fakeRawHttp / strippedCrashTrace booleans surfaced on each feed row.
        - name: fusionVersion
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter by fusion engine version (exact match against engine_versions->>'fusion').
            For example `3.10.0`. Use GET /reports/feed/engine-versions
            to discover available values.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, score_asc, score_desc]
            default: newest
      responses:
        "200":
          description: Recent public reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportFeed"

  /reports/feed/engine-versions:
    get:
      operationId: getReportFeedEngineVersions
      tags: [reports]
      summary: List distinct engine versions in the public feed
      description: |
        Returns the distinct fusion engine version strings present across all
        public feed reports, sorted in descending semver order. The result is
        briefly cached (60 s) so the dropdown stays cheap.
      responses:
        "200":
          description: Distinct engine versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedEngineVersions"

  /newsletter/challenge:
    get:
      operationId: getNewsletterChallenge
      tags: [newsletter]
      summary: Get a proof-of-work challenge for newsletter signup
      description: |
        Returns a SHA-256 proof-of-work challenge that must be solved before
        submitting a newsletter signup. This raises the cost of distributed
        bot signups beyond what the per-IP rate limit can stop on its own.
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterChallenge"

  /newsletter/subscribe:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to the VulnRap community mailing list
      description: |
        Stores a SHA-256 HMAC of the email address (keyed with VISITOR_HMAC_KEY)
        so duplicate signups can be detected without persisting the raw address.
        When NEWSLETTER_FORWARD_URL is configured, the raw email is forwarded to
        that destination as a best-effort POST. Per-IP rate limited to 20
        signups per hour. Requires a solved proof-of-work challenge from
        GET /newsletter/challenge.

        Task #733 — On a fresh signup the server mints a per-row random
        token (only the SHA-256 hash is persisted) and dispatches a
        welcome email containing a one-click unsubscribe link backed by
        `/newsletter/unsubscribe`. When `NEWSLETTER_DOUBLE_OPT_IN` is
        truthy, the row stays in a "pending confirmation" state until
        the recipient clicks the link in the confirm email
        (`/newsletter/confirm`); the response field
        `pendingConfirmation` reflects which mode is in effect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscribeBody"
      responses:
        "201":
          description: Subscription accepted (or already on the list)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscribeResponse"
        "400":
          description: Invalid email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many signups from this IP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/confirm:
    get:
      operationId: confirmNewsletter
      tags: [newsletter]
      summary: Confirm a pending newsletter subscription
      description: |
        Task #733 — Confirms a subscription created with double opt-in.
        Idempotent: re-clicking after confirmation returns the same 200
        success body so a forwarded email never surfaces a scary error.
        The token is the opaque random string sent in the confirm
        email; the server stores only its SHA-256 hash so a DB
        compromise cannot replay confirm / unsubscribe links.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
      responses:
        "200":
          description: Subscription confirmed (or was already confirmed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterConfirmResponse"
        "400":
          description: Token missing or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Token does not match any pending subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/unsubscribe:
    get:
      operationId: unsubscribeNewsletterGet
      tags: [newsletter]
      summary: One-click unsubscribe (link from email)
      description: |
        Task #733 — Removes the HMAC row matching the SHA-256 hash of
        the supplied token. Idempotent: an unknown token returns 200
        with `removed: false` so a re-clicked link does not look like a
        failure. Exposed as GET so the link works straight from an
        email client without JavaScript.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
      responses:
        "200":
          description: Unsubscribe processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterUnsubscribeResponse"
        "400":
          description: Token missing or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: unsubscribeNewsletter
      tags: [newsletter]
      summary: Unsubscribe from the newsletter (richer client form)
      description: |
        Task #733 — POST variant of the unsubscribe endpoint for
        clients that prefer a request body to a query string. Same
        semantics as the GET form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterUnsubscribeBody"
      responses:
        "200":
          description: Unsubscribe processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterUnsubscribeResponse"
        "400":
          description: Token missing or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/challenge:
    get:
      operationId: getFeedbackChallenge
      tags: [feedback]
      summary: Get a proof-of-work challenge for feedback submission
      description: Returns a SHA-256 proof-of-work challenge that must be solved before submitting feedback. This prevents automated spam.
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackChallenge"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback about the tool
      description: Allows users to share whether the tool was helpful and suggest improvements. Requires a solved proof-of-work challenge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackWithChallenge"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Challenge verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/analytics:
    get:
      operationId: getFeedbackAnalytics
      tags: [feedback]
      summary: Get aggregated feedback analytics
      description: Returns summary stats, rating distribution, daily trends, score-vs-feedback correlation, outlier reports, and recent feedback entries
      responses:
        "200":
          description: Feedback analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackAnalytics"

  /feedback/holdout-eval:
    get:
      operationId: getHoldoutEval
      tags: [feedback]
      summary: Honest precision/recall computed from the locked holdout split (Task #640)
      description: |
        Returns binary-classifier precision/recall/F1/accuracy computed
        ONLY from the deterministic 20% feedback holdout that calibration
        suggestions never touch, alongside the same numbers computed from
        the in-sample 80%. Treats the engine as a binary "slop" classifier
        where `predicted slop = slopScore >= tierThresholds.high` and
        `actually slop = rating <= 2 OR helpful = false`. Each partition
        returns nullable precision/recall/F1/accuracy so the UI can render
        "insufficient data" instead of a misleading 0 when a partition is
        empty.
      responses:
        "200":
          description: Holdout evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldoutEvalResponse"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: List recorded reviewer mutations
      description: |
        Task #645 — Reviewer-only paginated read of the `audit_log` table
        populated by the audit-log middleware on every mutation route.
        Strict reviewer auth required (sends reviewer identities and IPs).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: actor
          in: query
          required: false
          schema:
            type: string
          description: Exact-match filter on the `actor` column.
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum: [POST, PUT, PATCH, DELETE]
          description: Exact-match HTTP method filter (case-insensitive).
        - name: endpoint
          in: query
          required: false
          schema:
            type: string
          description: Substring filter (case-insensitive) on the endpoint URL.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `createdAt` (ISO 8601).
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive upper bound on `createdAt` (ISO 8601).
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          description: Reviewer auth required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration:
    get:
      operationId: getCalibrationReport
      tags: [feedback]
      summary: Get calibration report with tuning suggestions
      description: Analyzes feedback data against scoring results to suggest weight and threshold adjustments. Uses volume gating to ensure suggestions are based on sufficient data.
      responses:
        "200":
          description: Calibration report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationReport"

  /feedback/calibration/avri-drift:
    get:
      operationId: getAvriDriftReport
      tags: [feedback]
      summary: Get rolling AVRI calibration drift report
      description: |
        Rolling weekly view of the AVRI composite for production reports,
        bucketed by triage outcome (T1-equivalent vs T3-equivalent). Surfaces
        per-family means and drift flags (rubric collapse and per-family
        weight drift) so reviewers can spot when the AVRI rubric needs
        re-tuning.
      parameters:
        - in: query
          name: weeks
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 26
          description: How many weeks of history to scan (default 8, capped at 26).
      responses:
        "200":
          description: AVRI drift report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftReport"

  /feedback/calibration/avri-drift/notifications:
    get:
      operationId: getAvriDriftNotifications
      tags: [feedback]
      summary: List the persisted AVRI drift notification dedup state
      description: |
        Task #196 — Returns the per-flag dedup records that have already been
        dispatched via `POST /feedback/calibration/avri-drift/notify` (or the
        in-process auto-trigger). Each entry would silently suppress its
        corresponding flag on the next dispatch run unless re-armed via
        `/feedback/calibration/avri-drift/notifications/rearm`. The endpoint
        is auth-gated (strict) because the records include the original flag
        `detail` string.
      responses:
        "200":
          description: Persisted dedup state snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftNotificationsList"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/avri-drift/notifications/rearm:
    post:
      operationId: rearmAvriDriftNotifications
      tags: [feedback]
      summary: Re-arm one or more previously-notified AVRI drift flags
      description: |
        Task #196 — Removes one or more entries from the AVRI drift
        notification dedup state by `key` so the next dispatch run treats
        the matching flags as never-seen and re-fires the webhook. Useful
        for the "acknowledged-but-not-fixed by the fix-by date" workflow,
        where reviewers want a flag re-paged after the fix window lapses
        without hand-editing `data/avri-drift-notifications.json`.

        Unknown keys are reported back via `notFound` (mirroring the
        per-phrase removal pattern); the request returns 200 when at least
        one entry was re-armed and 404 only when nothing matched.

        The optional `reviewer` and `rationale` body fields feed the
        bounded re-arm audit log persisted alongside the dedup state
        so multi-reviewer teams can see who re-armed which flag and why.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvriDriftRearmBody"
      responses:
        "200":
          description: At least one entry was re-armed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftRearmResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No entries matched any of the supplied keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftRearmResponse"

  /feedback/calibration/avri-drift/scheduler-status:
    get:
      operationId: getAvriDriftSchedulerStatus
      tags: [feedback]
      summary: Get per-replica AVRI drift scheduler status
      description: |
        Operator-visible status of the AVRI drift-notification scheduler
        across every replica that has registered a heartbeat. Backs the
        calibration page's per-replica heartbeat table so reviewers can
        confirm every replica's timer is firing — and spot a wedged
        replica hiding behind a healthy one — without scraping logs.

        Unauthenticated, matching `/feedback/calibration/auth-status`:
        the response is timestamps + booleans + replica identity only
        (no error text, webhook URL, or token).

        The response is an array because the API server runs in a
        multi-replica deploy. Each entry is keyed by `replicaId` (a
        stable per-process identity, e.g. `${hostname}-${bootHex}`) so
        the calibration UI can render one row per replica. The replica
        that handled the request returns a live in-memory snapshot;
        peer replicas return their last-persisted heartbeat from the
        shared `data/avri-drift-notifications.json` state file.
      responses:
        "200":
          description: Per-replica scheduler status snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvriDriftSchedulerStatus"

  /internal/shadow-drift:
    get:
      operationId: getShadowDrift
      tags: [internal]
      summary: Shadow scoring drift report (reviewer-only, Task #639)
      description: |
        Reviewer-only listing of production reports whose shadow score
        diverges from the live score by ≥1 tier or ≥10 score points
        within the lookback window. Backs the "Shadow drift" tab on
        `/feedback-analytics`. Strict-auth: shadow drift is a leading
        signal of an in-flight scoring regression, same access policy
        as the other reviewer-only drift surfaces.
      parameters:
        - name: lookbackDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Shadow drift report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShadowDriftReport"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/score-stability:
    get:
      operationId: getScoreStabilitySummary
      tags: [feedback]
      summary: Score-stability tier-flip summary (reviewer-only, Task #620)
      description: |
        Reviewer-only summary of the nightly score-stability monitor.
        Aggregates `report_rescore_log` rows from the last 7 days into
        per-day flip counts broken down by direction (legit→slop,
        slop→legit, tightened, loosened, lateral) plus the day's
        overall flip-rate. Backs the tier-flip chart on
        `/feedback-analytics`. Strict-auth: an elevated flip-rate is a
        leading indicator of an active scoring regression, same access
        policy as the other reviewer-only drift surfaces.
      responses:
        "200":
          description: Score stability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreStabilitySummary"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/score-stability/flips:
    get:
      operationId: getScoreStabilityFlips
      tags: [feedback]
      summary: List individual tier flips for a specific day (Task #944)
      description: |
        Reviewer-only drilldown listing the individual reports whose tier
        flipped on a given day, with old/new tier, old/new score, flip
        direction, and report ID for deep-linking to the report detail
        view. Backs the "investigate" flow on the score-stability chart.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: ISO date `YYYY-MM-DD` (UTC) to list flips for.
      responses:
        "200":
          description: Day flip listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreStabilityDayFlips"
        "400":
          description: Missing or invalid date parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/score-stability/scheduler-status:
    get:
      operationId: getScoreStabilitySchedulerStatus
      tags: [feedback]
      summary: Per-replica score-stability scheduler heartbeat (Task #620)
      description: |
        Operator-visible status of the in-process score-stability
        scheduler for the responding replica. Mirrors the AVRI drift /
        rescore-backfill scheduler-status endpoints: timestamps +
        booleans + small numeric counters only, so the endpoint stays
        safe to expose unauthenticated alongside the other heartbeat
        surfaces.
      responses:
        "200":
          description: Score stability scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreStabilitySchedulerStatus"

  /feedback/calibration/avri-drift/notifications/rearm-history:
    get:
      operationId: getAvriDriftRearmHistory
      tags: [feedback]
      summary: List the persisted AVRI drift re-arm audit log
      description: |
        Returns the bounded audit log of every reviewer-driven re-arm
        event recorded by
        `POST /feedback/calibration/avri-drift/notifications/rearm`. The
        log is capped at 200 entries (oldest trimmed first). Strict-auth
        because the entries include the original flag `detail` plus
        reviewer/rationale context.
      responses:
        "200":
          description: Persisted re-arm audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvriDriftRearmHistoryList"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /presets:
    get:
      operationId: listPresets
      tags: [presets]
      summary: List curated scoring presets
      description: |
        Task #631 — Returns the curated preset library (sensitivity profiles
        plus per-engine weights). Sourced from a static JSON file shipped
        with the api-server; safe to cache for an hour. Each preset has an
        opaque `id` that the `/check` page accepts via `?preset=<id>` to
        load the configuration into local settings.
      responses:
        "200":
          description: Curated preset library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresetLibrary"

  /roadmap:
    get:
      operationId: listRoadmap
      tags: [roadmap]
      summary: List public roadmap items (Now / Next / Later)
      description: |
        Task #693 — Returns the public roadmap rendered on `/roadmap`.
        Sourced from a static JSON file shipped with the api-server so
        curators can edit `roadmap.json` and bump `version` without a
        redeploy of the schema. Items carry a `column` (now | next |
        later), a `status` badge, a one-line description, and an
        optional fuzzy ETA. The response is intentionally illustrative
        — the page header reminds visitors it is not a contractual
        commitment.
      responses:
        "200":
          description: Public roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapResponse"

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List curated sample reports
      description: |
        Task #647 — Returns the curated sample-report gallery rendered on
        `/gallery`. Sourced from a static JSON file shipped with the
        api-server; safe to cache for an hour. Each sample carries the
        display fields the gallery card needs (title, snippet, score,
        top signals, label) plus a `reportId` pointing at a seed report
        so click-through resolves on `/results/:id`.
      responses:
        "200":
          description: Curated sample-report gallery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryResponse"

  /incidents:
    get:
      operationId: listIncidents
      tags: [public]
      summary: List public incident postmortems
      description: |
        Task #707 — Returns the public incident log rendered on
        `/incidents`. Sourced from a static JSON file shipped with the
        api-server (curator-edited only — there is no admin/write
        endpoint). Each entry documents one operational incident
        (engine outage, scoring regression, calibration mistake) with
        date, duration, severity, summary, root cause, remediation,
        and an optional `/changelog#anchor` link to the corresponding
        release notes. Returns an empty array when no incidents have
        been recorded.
      responses:
        "200":
          description: Public incident log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentLog"

  /showcase:
    get:
      operationId: listShowcase
      tags: [showcase]
      summary: List curator-picked interesting reports
      description: |
        Task #694 — Returns the hand-curated "interesting reports"
        rendered on `/showcase`: high-confidence catches, edge cases,
        and surprising engine agreements. Sourced from a static JSON
        file (`data/showcase.json`) shipped with the api-server; safe
        to cache for an hour. Each entry carries a redacted excerpt,
        the composite score + tier, a one-paragraph "why this is
        interesting" note, and a `reportId` pointing at a seed report
        so click-through resolves on `/results/<reportId>`.
      responses:
        "200":
          description: Curated showcase entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseResponse"

  /public/drift-summary:
    get:
      operationId: getPublicDriftSummary
      tags: [public]
      summary: Public-safe AVRI drift summary for the transparency page
      description: |
        Task #617 — Public, read-only summary of the rolling weekly
        T1-vs-T3 mean composite spread. Wraps the internal AVRI drift
        compute and strips every reviewer-only field (cohort sample IDs,
        per-family means, flag detail strings, thresholds,
        bucketing-note, runbook path, raw bucket counts) so the
        `/transparency` page can show that the platform actively monitors
        itself for calibration drift without exposing internal triage
        signals.

        Returns up to the last 12 eligible weeks of `{ weekStart,
        spread }` data points plus a current-vs-previous-week delta. If
        no weekly aggregate has been computed yet, `weeks` is `[]` and
        the current/previous/delta fields are `null` so the widget can
        render an empty state.
      responses:
        "200":
          description: Public drift summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDriftSummary"

  /feedback/calibration/auth-brute-force-alerts:
    get:
      operationId: getCalibrationAuthBruteForceAlerts
      tags: [feedback]
      summary: List recent calibration auth brute-force alert decisions
      description: |
        Task #399 — Bounded snapshot of the in-process ring buffer of
        dispatched calibration-auth brute-force alerts so reviewers can
        confirm at a glance whether the latest alert was them
        fat-fingering a token or a real probe, without round-tripping
        through pino logs.

        The entries mirror the webhook payload (sans the constant
        `event` discriminator and the static `recommendedActions`
        runbook copy). The buffer is in-memory only — restarts clear it
        and a multi-replica deploy reflects whichever replica handled
        the request. Strict-auth because the entries include client IP
        plus per-route metadata.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
          description: |
            Maximum number of recent alerts to return (newest first).
            Defaults to 10 and is clamped server-side to the buffer
            size (50). Values that fail to parse as a positive integer
            return 400.
      responses:
        "200":
          description: Recent alert snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationAuthBruteForceAlertsList"
        "400":
          description: Invalid limit query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/auth-brute-force-alerts/ack:
    post:
      operationId: ackCalibrationAuthBruteForceAlert
      tags: [feedback]
      summary: Acknowledge a calibration auth brute-force alert
      description: |
        Task #749 — Mark the alert identified by `(ip, detectedAt)` as
        acknowledged so the next reviewer to land on the calibration
        page can tell signal from noise. The optional `reviewer` and
        `note` body fields populate an in-memory audit trail attached
        to the same ring-buffer entry the recent-alerts panel renders;
        an alert evicted by FIFO churn (or a process restart) takes
        its ack with it, matching the buffer's "in-process only" model.

        Returns 404 when no matching alert is in the ring buffer (it
        was already evicted, or the API server restarted) and 409 when
        a different reviewer has already acknowledged the row — in the
        409 case the response includes the existing `ack` so the UI
        can display who got there first instead of just toasting an
        error. Strict-auth because the response echoes the alert's
        IP / last-route metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalibrationAuthBruteForceAlertAckBody"
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationAuthBruteForceAlertAckResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Reviewer token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching alert in the in-process ring buffer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Alert was already acknowledged by another reviewer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationAuthBruteForceAlertAckConflict"

  /feedback/calibration/config:
    get:
      operationId: getScoringConfig
      tags: [feedback]
      summary: Get current and historical scoring configurations
      description: Returns the active scoring config version and full version history.
      responses:
        "200":
          description: Scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigResponse"

  /feedback/calibration/auth-status:
    get:
      operationId: getCalibrationAuthStatus
      tags: [feedback]
      summary: Probe whether the reviewer token is configured/valid
      description: |
        Task #117 — Returns boolean signals describing whether the API server
        requires a reviewer token for calibration mutations and whether the
        caller's request would be accepted by `requireCalibrationAuth`. This
        endpoint is intentionally NOT auth-gated so the dashboard can render
        a "Reviewer token: configured / missing / invalid" indicator BEFORE
        the reviewer triggers a mutation that 401s. The configured token is
        never echoed in the response — only boolean signals.
      responses:
        "200":
          description: Auth status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationAuthStatus"

  /feedback/calibration/apply:
    post:
      operationId: applyCalibration
      tags: [feedback]
      summary: Apply calibration changes to scoring config
      description: Creates a new scoring configuration version with the specified changes. All subsequent reports will be scored with the new config.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyCalibrationBody"
      responses:
        "201":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyCalibrationResponse"
        "400":
          description: Invalid changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases:
    get:
      operationId: getHandwavyPhrases
      tags: [feedback]
      summary: List the curated FLAT hand-wavy marker phrases
      description: |
        Returns the active list of FLAT-family hand-wavy marker phrases used by
        AVRI Engine 2 to apply the slop haircut. Reviewers can extend this list
        through POST/DELETE without an engineer redeploying the service.
      responses:
        "200":
          description: Active hand-wavy phrase list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhrasesList"
    post:
      operationId: addHandwavyPhrase
      tags: [feedback]
      summary: Append a new FLAT hand-wavy marker phrase
      description: |
        Appends a phrase to the curated FLAT hand-wavy marker list. Phrases are
        normalized to lowercase + collapsed whitespace before storage. Subsequent
        triages pick the new phrase up immediately — no redeploy required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseBody"
      responses:
        "200":
          description: Phrase already present (no change)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "201":
          description: Phrase appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid phrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: editHandwavyPhrase
      tags: [feedback]
      summary: Edit a curated FLAT hand-wavy marker phrase in place
      description: |
        Updates the `category`, `rationale`, and/or the phrase string itself
        of an existing curated marker without losing the original add audit
        context. Each edit appends a `HandwavyEditEntry` to the marker's
        `edits` log recording who made the change, when, and the
        before/after for any field that actually changed.

        Task #247 — when `newPhrase` is provided AND its normalized form
        (lowercase + collapsed whitespace) differs from the existing
        phrase, the marker's row identity is rewritten in place to the new
        phrase. The marker keeps its original `addedBy`/`addedAt`/
        `rationale` and the rename is recorded as a `phrase` before/after
        change on the appended audit entry. Renaming to a normalized form
        already used by another active phrase is rejected so the active
        list stays a set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseEditBody"
      responses:
        "200":
          description: Edit applied (or no-op if updates matched the existing values)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid request body or update values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Phrase not in the list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeHandwavyPhrase
      tags: [feedback]
      summary: Remove one or many FLAT hand-wavy marker phrases
      description: |
        Removes a phrase (matched after lowercase + whitespace normalization)
        from the curated FLAT hand-wavy marker list. Task #135 — accepts
        either a single phrase (`{phrase}`) or a batch (`{phrases: [...]}`)
        in one round-trip; the batch path appends one history entry that
        lists every removed phrase instead of N separate entries.

        Task #145 — when the batch body has `dryRun: true`, the server
        returns a preview (corpus impact + per-phrase outcomes) and does
        NOT mutate the active list, history, or cache.

        Task #155 — the single-phrase body also accepts `dryRun: true`
        and returns the same corpus + production removal-impact summary
        (with `batch: false`) so the in-UI Trash flow can warn reviewers
        before a one-click removal lands.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBody"
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveBody"
      responses:
        "200":
          description: |
            Phrase removed (single path), batch processed and at least one
            phrase was removed (batch path; see `batch: true` and `results`),
            single-phrase dry-run preview (`dryRun: true`, `batch: false`),
            OR batch dry-run preview (`dryRun: true`, `batch: true`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseSingleRemoveDryRunResponse"
        "400":
          description: Invalid phrase / batch body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Phrase not in the list (single path) OR batch matched zero phrases
            (batch path returns the same `results` shape as 200).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResponse"

  /feedback/calibration/handwavy-phrases/removal-batches:
    get:
      operationId: listHandwavyPhraseRemovalBatches
      tags: [feedback]
      summary: List recent FLAT hand-wavy phrase BATCH removal entries (picker-friendly summary)
      description: |
        Task #160 — Slim summary of the most recent batch removal entries from
        the hand-wavy phrase removal-history log, intended for the
        reinstate-batch CLI's interactive picker. Single-phrase removal
        entries are omitted because they're not reinstatable through the
        /reinstate-batch endpoint. Newest entries are returned first; default
        page size is 10, capped at 50 via the `limit` query parameter.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of batch entries to return (newest first). Defaults to 10, capped at 50.
      responses:
        "200":
          description: Recent batch removal summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchesList"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/removal-batches/{removedAt}:
    get:
      operationId: getHandwavyPhraseRemovalBatch
      tags: [feedback]
      summary: Fetch the FULL inner phrase list for a single batch removal entry
      description: |
        Task #176 — Sibling detail endpoint for the picker list above. Returns
        every inner phrase from one batch removal entry (not just the
        5-phrase sample the list endpoint surfaces) plus the per-phrase
        audit metadata (category, original adder, per-phrase reinstated
        flag). The reinstate-batch CLI calls this to render a "preview"
        step between the picker / `--removed-at` flag and the final
        confirmation prompt; Task #244 wires the same endpoint into the
        web reviewer's picker so reviewers see every phrase before
        confirming.

        Single-phrase removal entries return 404 with `reason: "not-a-batch"`
        — they are not reinstatable through /reinstate-batch and the caller
        should fall back to /reinstate.
      parameters:
        - in: path
          name: removedAt
          required: true
          schema:
            type: string
            format: date-time
          description: ISO 8601 timestamp of the parent batch removal entry. Must be URL-encoded by the caller.
      responses:
        "200":
          description: Full inner phrase list with per-phrase audit metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchDetail"
        "400":
          description: Missing or empty removedAt path parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            No removal-history entry matches the supplied removedAt
            (`reason: "history-not-found"`) or the matched entry is a
            single-phrase removal that's not addressable through this
            endpoint (`reason: "not-a-batch"`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseRemovalBatchDetailError"

  /feedback/calibration/handwavy-phrases/undo:
    post:
      operationId: undoHandwavyPhrase
      tags: [feedback]
      summary: Undo a brand-new add of a FLAT hand-wavy marker phrase
      description: |
        Task #130 — mirror of /reinstate. A reviewer who just added a phrase
        can press Undo within a short server-side window (default 5 minutes)
        and the marker is removed. The resulting history row is tagged
        `undone: true` so the audit trail clearly records "added then undone"
        rather than producing an unrelated manual-removal entry. The active
        marker is matched by `phrase` + `addedAt`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseUndoBody"
      responses:
        "200":
          description: Phrase undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching active marker (or curated default)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: addedAt mismatch or undo window expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/undo-batch:
    post:
      operationId: undoHandwavyPhrasesBatch
      tags: [feedback]
      summary: Undo every still-in-window FLAT hand-wavy phrase add in one round-trip
      description: |
        Task #233 — bulk wrapper around POST /feedback/calibration/handwavy-phrases/undo.
        The reviewer's UI tracks every reviewer-added phrase that is still
        inside its per-marker undo window (default 5 minutes) and pressing
        "Undo last N adds" sends every `(phrase, addedAt)` pair in one
        round-trip. The server walks each entry through the per-marker
        undo path so each successful undo still appends its own
        `undone: true` history row — the audit contract is NOT collapsed
        into a single batch row, so per-phrase provenance is preserved
        for downstream tooling. Per-entry failures (`not-found`,
        `addedAt-mismatch`, `window-expired`, `no-addedAt`) are reported
        in the per-phrase `results` array instead of failing the whole
        call so a reviewer who fires the button right as one entry's
        window elapses still gets the rest rolled back.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseUndoBatchBody"
      responses:
        "200":
          description: Batch processed (see `undoneCount` and per-phrase `results`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseUndoBatchResponse"
        "400":
          description: Invalid body (missing / malformed `entries`, oversized batch, or non-string `reviewer`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/reinstate-batch:
    post:
      operationId: reinstateHandwavyPhrasesBatch
      tags: [feedback]
      summary: Reinstate every not-yet-reinstated phrase from a single batch removal entry
      description: |
        Task #144 — single-round-trip reinstate of every inner phrase from one
        Task #135 batch removal entry. The reviewer supplies the parent
        entry's `removedAt`; the server reinstates each remaining inner
        phrase, records the current reviewer on each one, and flips the
        aggregate `reinstated` flag once everything is back. Inner phrases
        that have already been reinstated (partial undo earlier) or that
        have been re-added to the active list separately are skipped with a
        reason instead of failing the whole call. Per-phrase reinstate via
        the existing /reinstate endpoint still works for partial undos.

        Task #159 — when `dryRun: true` is sent in the body, the server
        returns the same `results` / `reinstatedCount` / `skipped` shape
        (with `dryRun: true` and `batch: true` flags) without mutating
        the active marker list or appending to the removal-history log.
        Reviewers can preview exactly which inner phrases would be
        reinstated and which would be skipped before pressing yes.
        Mirrors the dry-run pattern used by the bulk-remove endpoint:
        both the mutating and dry-run paths return HTTP 200 and callers
        discriminate on the `dryRun` flag in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseReinstateBatchBody"
      responses:
        "200":
          description: |
            Batch processed (mutating path; see `reinstatedCount` and
            `results`) OR dry-run preview when `dryRun: true` was sent
            (`dryRun: true` and `batch: true` flags, no state was mutated).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HandwavyPhraseReinstateBatchResponse"
                  - $ref: "#/components/schemas/HandwavyPhraseReinstateBatchDryRunResponse"
        "400":
          description: Invalid body (missing or non-string `removedAt`/`reviewer`, or non-boolean `dryRun`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching removal-history entry for that removedAt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The matched history entry exists but is a single-phrase removal (use /reinstate instead).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/reinstate:
    post:
      operationId: reinstateHandwavyPhrase
      tags: [feedback]
      summary: Reinstate a previously removed FLAT hand-wavy marker phrase from history
      description: |
        Task #121 — re-adds a phrase straight from the removal-history log so a
        reviewer doesn't have to retype it (and its rationale) into the add
        form. The history entry is matched by `phrase` + `removedAt`. The
        marker is added with the original category and rationale; the CURRENT
        reviewer is recorded as `addedBy` and a fresh `addedAt` timestamp is
        used so the audit trail still shows who reinstated and when. The
        history row is then flagged `reinstated: true` so the same row cannot
        be reinstated twice.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseReinstateBody"
      responses:
        "201":
          description: Phrase reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No matching history entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already reinstated or already in the active list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/handwavy-phrases/revert-edit:
    post:
      operationId: revertHandwavyPhraseEdit
      tags: [feedback]
      summary: Revert a single edit on a curated FLAT hand-wavy marker phrase
      description: |
        Task #132 — undoes a single entry from a curated phrase's `edits` log
        in one click. The reviewer supplies the phrase and the `editedAt`
        timestamp of the edit they want to undo; the server restores
        whatever fields that entry recorded a change to (category and/or
        rationale) back to their `from` values, leaving any field the entry
        did NOT change alone. The audit log stays append-only — the revert
        appears as a fresh `HandwavyEditEntry` with the inverse before/after
        pair, attributed to the reviewer who pressed the button. A no-op
        revert (current values already match the target) returns
        `edited: false` and does not append a new entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandwavyPhraseRevertEditBody"
      responses:
        "200":
          description: Revert applied (or no-op when current values already match)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandwavyPhraseMutationResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Phrase or matching edit entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      description: Returns aggregate statistics for the platform
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent submission activity
      description: Returns a summary of recent report submissions
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /stats/distribution:
    get:
      operationId: getSlopDistribution
      tags: [stats]
      summary: Get slop score distribution
      description: Returns the distribution of slop scores across all reports
      responses:
        "200":
          description: Score distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlopDistribution"

  /stats/visit:
    post:
      operationId: recordVisit
      tags: [stats]
      summary: Record a page visit
      description: Records a privacy-respecting unique visitor count using hashed identifiers
      responses:
        "200":
          description: Visit recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitRecorded"

  /stats/visitors:
    get:
      operationId: getVisitorStats
      tags: [stats]
      summary: Get visitor statistics
      description: Returns total unique visitors and total visits
      responses:
        "200":
          description: Visitor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitorStats"

  /cohort/baseline:
    get:
      operationId: getCohortBaseline
      tags: [cohort]
      summary: Get cohort baseline distribution
      description: |
        Returns a 10-bucket histogram of VulnRap composite scores submitted in
        the last 7 days plus the median score for that cohort. The composite
        score is the same metric shown in the big number on the results page
        header, so the percentile derived from these bins is a valid
        percentile for that displayed score. When `cwe` is supplied, the
        histogram and median are restricted to reports whose cached AVRI rubric
        family matches the requested CWE family — otherwise the platform-wide
        cohort is returned. Reports with no cached composite (legacy rows from
        before the multi-engine consensus) are excluded from the cohort.
      parameters:
        - name: cwe
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional cached AVRI rubric family id (e.g. INJECTION,
            MEMORY_CORRUPTION) to restrict the cohort. Unknown values fall
            through to the platform-wide cohort.
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum: [composite, slop]
            default: composite
          description: |
            Which per-report score axis to bucket the cohort against.
            `composite` (default) uses the VulnRap composite score shown in
            the results page header. `slop` uses the legacy AI Detection
            ("slop") score that still appears further down the results page,
            so the same baseline ribbon UI can contextualise that legacy
            number too. When `metric=slop` the engineMedians block is null
            (engine medians are only meaningful for the composite cohort).
        - name: score
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 100
          description: |
            Optional composite score to compute an exact percentile rank
            for. When supplied, the response includes a `percentile` field
            computed from the underlying rows (mid-rank convention) so
            callers do not have to approximate from the 10-bucket
            histogram.
      responses:
        "200":
          description: Cohort baseline distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CohortBaseline"

  /public/cwe-catalog:
    get:
      operationId: getCweCatalog
      tags: [public]
      summary: Public CWE family catalog the engine recognizes
      description: |
        Task #663 — Returns every CWE the scoring engine has a fingerprint
        for, grouped by AVRI rubric family (INJECTION, MEMORY_CORRUPTION,
        ...). Each entry carries the CWE id, friendly name, family, alias
        list, expected vocabulary the engine looks for, MITRE link, a short
        "what a high-quality report for this class looks like" summary
        derived from the family rubric, the historical rejection-rate
        multiplier, per-CWE usage stats (count + average composite score
        across the corpus, computed from the soft-citation `inferredCwe`
        on `vulnrap_engine_results`), and a deep link into the reports
        feed filtered to that family.
      responses:
        "200":
          description: CWE catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CweCatalogResponse"

  /public/corpus-stats:
    get:
      operationId: getCorpusStats
      tags: [stats]
      summary: Get aggregate corpus statistics
      description: |
        Returns at-a-glance aggregates over the platform's full scoring corpus —
        total reports, breakdown by tier, top 10 most-fired evidence signals,
        top 10 CWE families, and a daily volume time series. All values are
        already-aggregated counts; no individual report content is exposed.
      responses:
        "200":
          description: Corpus statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorpusStats"

  /public/latency-snapshot:
    get:
      operationId: getLatencySnapshot
      tags: [stats]
      summary: Get 24h scoring latency snapshot
      description: |
        Public p50/p95/p99 latency for the end-to-end scoring pipeline plus a
        per-engine breakdown, computed from the last 24h of analysis_traces.
        Returns the histogram bins for the full pipeline and each engine, the
        percentile values, and an optional worst-engine call-out when one
        engine is dragging the tail (its p95 is more than 1.5x the median
        engine p95 and contributes >25% of pipeline p95).
      responses:
        "200":
          description: Latency snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatencySnapshot"

  /public/latency-history:
    get:
      operationId: getLatencyHistory
      tags: [stats]
      summary: Get daily p95 latency over time
      description: |
        Returns daily p50/p95/p99 latency for the end-to-end scoring pipeline
        and each engine over the last N days (default 14). Useful for spotting
        latency trends and engine regressions.
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
      responses:
        "200":
          description: Daily latency history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatencyHistory"

  /public/status:
    get:
      operationId: getPublicStatus
      tags: [stats]
      summary: Public status / uptime snapshot
      description: |
        Task #706 — Public status page snapshot. Returns:
          * 30-day API uptime % (fraction of last 30 days that recorded
            at least one successful scoring trace).
          * 24h p50/p95 end-to-end pipeline latency, in milliseconds.
          * Per-engine subsystem health (linguistic, substance, CWE,
            AVRI, LLM gate) derived from the most recent traces — each
            engine is marked operational/degraded/down/unknown based on
            how recently its pipeline stage was last seen successfully.
          * An overall banner status — operational if every engine is
            operational, degraded if any engine is degraded, and down
            if any engine is fully down.
        Cached publicly for 60 seconds.
      responses:
        "200":
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStatusSnapshot"

  /stats/trends:
    get:
      operationId: getTrends
      tags: [stats]
      summary: Get trend data over time
      description: Returns daily report volume, tier breakdown, average score, and feedback trends for the specified time window
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 7
            maximum: 365
            default: 90
          description: Number of days to look back
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsData"

  /public/phrase-suggestions:
    post:
      operationId: submitPhraseSuggestion
      tags: [phrase-suggestions]
      summary: Submit a user-suggested handwavy / ai-self-disclosure phrase
      description: |
        Task #634 — Public endpoint that lets anonymous end users propose new
        phrases for reviewer triage. Submissions are queued (status="pending")
        and never auto-applied. Rate-limited to 5 successful submissions per
        IP per 24 hours; same-IP duplicates of the same normalized text in
        the last 24h return 200 with `duplicate: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhraseSuggestionSubmitBody"
      responses:
        "200":
          description: Duplicate submission (already queued in the last 24h)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseSuggestionSubmitResponse"
        "201":
          description: Suggestion accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseSuggestionSubmitResponse"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Daily limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseSuggestionRateLimited"

  /feedback/calibration/phrase-suggestions:
    get:
      operationId: listPhraseSuggestions
      tags: [phrase-suggestions]
      summary: List queued user-suggested phrases (reviewer-only)
      description: |
        Task #634 — Returns the suggestion queue for reviewer triage.
        Defaults to status=pending. Requires the calibration token.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
            default: pending
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Suggestions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseSuggestionList"
        "401":
          description: Missing or invalid calibration token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/calibration/phrase-suggestions/{id}:
    patch:
      operationId: updatePhraseSuggestionStatus
      tags: [phrase-suggestions]
      summary: Mark a suggestion approved or rejected (reviewer-only)
      description: |
        Task #634 — Updates the status of a queued suggestion. The actual
        addition to the active phrase list happens via the existing
        /feedback/calibration/handwavy-phrases (or
        /feedback/calibration/ai-self-disclosure-phrases) endpoints; this
        is just the bookkeeping flip.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhraseSuggestionPatchBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseSuggestionPatchResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid calibration token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Suggestion not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /test-yourself/run:
    post:
      operationId: runTestYourself
      tags: [test-yourself]
      summary: Score a user-supplied labeled fixture battery
      description: |
        Bring-your-own fixture battery for power users (PSIRT teams,
        security platforms) who want to validate the engine against
        their own labeled corpus before adopting it.

        Accepts up to 50 `{text, label}` rows where `label` is the
        user's expected verdict (`valid` for a real, well-substantiated
        report; `invalid` for slop / fabrication / noise). Each row is
        run through the same composite scoring pipeline used by
        `POST /reports`, the predicted label is derived from the
        composite score (composite >= 50 → `valid`, otherwise
        `invalid`), and an aggregate confusion matrix +
        precision / recall / F1 against the user-supplied labels is
        returned alongside per-row results.

        Synchronous; nothing is persisted; no PII redaction is applied
        to the returned per-row text excerpt (the caller already has
        the text). IP rate-limited to 10 runs / day. The "valid" class
        is treated as the positive class for precision / recall.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestYourselfRunBody"
      responses:
        "200":
          description: Battery scored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestYourselfRunResponse"
        "400":
          description: Invalid request body (missing rows, too many rows, bad labels, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Daily rate limit exceeded for this IP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AuditRevertHint:
      type: object
      description: |
        Task #645 — Static "revert this mutation" hint stitched onto each
        audit-log entry by the read endpoint. Null when the entry's
        endpoint has no known reverse operation.
      properties:
        method:
          type: string
        endpoint:
          type: string
        description:
          type: string
      required: [method, endpoint, description]

    AuditLogEntry:
      type: object
      description: |
        Task #645 — One reviewer mutation captured by the audit-log
        middleware. `requestPayload` is the JSON body that hit the
        server with secret-shaped keys (token/secret/password/...)
        replaced by `[REDACTED]`. `responseStatus` is the final HTTP
        status the reviewer's request received.
      properties:
        id:
          type: integer
        actor:
          type: string
          description: Reviewer name (from body.reviewer or X-Reviewer-Name) or "anonymous".
        method:
          type: string
        endpoint:
          type: string
        requestPayload:
          nullable: true
          description: Redacted JSON body. Null for empty / multipart bodies.
        queryParams:
          nullable: true
          description: Redacted query-string parameters. Null when none were sent.
        responseStatus:
          type: integer
        ip:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        revertHint:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AuditRevertHint"
      required:
        [id, actor, method, endpoint, responseStatus, createdAt, revertHint]

    AuditLogResponse:
      type: object
      description: |
        Task #645 — Paginated reviewer audit log response. `entries` is
        ordered newest-first.
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
      required: [total, limit, offset, entries]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    VersionInfo:
      type: object
      description: |
        Version metadata for the running build. `project` is the human
        product name, `projectVersion` is the SemVer of the running
        build (matches the root `package.json#version`), `gitSha` is
        the git commit the build was cut from (or `"dev"` for an
        un-tagged local build), `specVersion` is the SemVer of the
        OpenAPI contract this server is serving (matches
        `lib/api-spec/openapi.yaml#info.version`), and `builtAt` is
        an ISO-8601 timestamp of when the build was produced.
      properties:
        project:
          type: string
        projectVersion:
          type: string
        gitSha:
          type: string
        specVersion:
          type: string
        builtAt:
          type: string
          format: date-time
      required:
        - project
        - projectVersion
        - gitSha
        - specVersion
        - builtAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ScoreHistoryEntry:
      type: object
      description: |
        One scoring event in a report's evolution timeline. The first entry is
        the original analysis; subsequent entries each correspond to a
        backfill rescore that rewrote the composite (drawn from the row's
        rescoreHistory audit trail).
      properties:
        compositeScore:
          type: integer
          description: Composite score 0-100 captured at this point in time.
        label:
          type: string
          nullable: true
          description: Composite tier label captured at this point in time. Null for very old rows that pre-date the label column.
        recordedAt:
          type: string
          format: date-time
          description: ISO timestamp of when this score was recorded (report.createdAt for the original entry; rescoredAt for rescore entries).
        correlationId:
          type: string
          nullable: true
          description: Correlation id of the analysis trace that produced this score, if any. Reconstruction-mode rescores use a `recon-…` prefix.
        source:
          type: string
          enum: [original, backfill-rescore]
          description: Where this entry came from. `original` = first analysis; `backfill-rescore` = a bulk rescore overwrote the row.
        mode:
          type: string
          enum: [original, engine, reconstruction]
          description: For rescore entries, which branch produced the new score (live engine re-run vs. reconstruction from cached signals). Always `original` for the first entry.
        codeVersion:
          type: string
          nullable: true
          description: Semver-style scoring engine version that produced this score (e.g. "3.10.0"). Read from the persisted engine_versions for the current entry, or from the rescore audit entry for historical scores. Null for legacy rows that predate version pinning.
        engines:
          type: array
          nullable: true
          description: Per-engine sub-scores captured at this point. Sourced from the engines blob for the current entry, or from the matching analysis trace for past entries. Null when no per-engine data is available for that scoring event.
          items:
            type: object
            properties:
              engine:
                type: string
              score:
                type: integer
              verdict:
                type: string
                nullable: true
              confidence:
                type: string
                nullable: true
            required:
              - engine
              - score
      required:
        - compositeScore
        - recordedAt
        - source
        - mode

    ScoreHistoryResponse:
      type: object
      properties:
        reportId:
          type: integer
        entries:
          type: array
          description: Chronological (oldest-first) list of every recorded composite score for this report. Empty when no vulnrap composite has been computed yet.
          items:
            $ref: "#/components/schemas/ScoreHistoryEntry"
      required:
        - reportId
        - entries

    SimilarityMatch:
      type: object
      properties:
        reportId:
          type: integer
        similarity:
          type: integer
          description: Similarity percentage (0-100)
        matchType:
          type: string
          enum: [near-duplicate, high-similarity, structural, semantic]
      required:
        - reportId
        - similarity
        - matchType

    SectionMatchItem:
      type: object
      properties:
        sectionTitle:
          type: string
        matchedReportId:
          type: integer
        matchedSectionTitle:
          type: string
        similarity:
          type: integer
      required:
        - sectionTitle
        - matchedReportId
        - matchedSectionTitle
        - similarity

    RedactionSummary:
      type: object
      properties:
        totalRedactions:
          type: integer
        categories:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalRedactions
        - categories

    DeleteReportBody:
      type: object
      properties:
        deleteToken:
          type: string
          description: The delete token returned when the report was submitted
      required:
        - deleteToken

    DeleteReportResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ReportAnalysis:
      type: object
      properties:
        id:
          type: integer
        deleteToken:
          type: string
          description: Secret token for deleting this report. Only returned on initial submission. Store it — it cannot be recovered.
        contentHash:
          type: string
        contentMode:
          type: string
          enum: [full, similarity_only]
        slopScore:
          type: integer
          description: AI slop likelihood score 0-100 (higher = more likely AI-generated)
        slopTier:
          type: string
          description: Human-readable sloppiness tier
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100 (higher = better quality). Separate from slopScore — a terse real report can have low quality but also low slop.
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0). Low confidence means limited signals were available.
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
          description: Specific signals found during analysis with their weights
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
          description: SHA-256 hashes of each report section for granular similarity
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
          description: Sections that match existing reports
        redactedText:
          type: ["string", "null"]
          description: Auto-redacted version of the report (PII/secrets removed)
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings — specific issues flagged by the rule-based engine
        llmSlopScore:
          type: ["integer", "null"]
          description: LLM analysis slop score (0–100), weighted from 5 dimensions (specificity, originality, voice, coherence, hallucination). Null when LLM is unavailable. Contributes to the fused slopScore via multi-axis Noisy-OR combination.
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
          description: Semantic observations from the LLM scorer. Null when LLM analysis is unavailable.
        llmBreakdown:
          type: ["object", "null"]
          properties:
            claimSpecificity:
              type: integer
              description: Claim specificity score (0-25)
            evidenceQuality:
              type: integer
              description: Evidence quality score (0-25)
            internalConsistency:
              type: integer
              description: Internal consistency score (0-25)
            hallucinationSignals:
              type: integer
              description: Hallucination signals score (0-25, higher = fewer hallucinations)
            validityScore:
              type: integer
              description: Overall validity score (0-100)
            redFlags:
              type: array
              items:
                type: string
            greenFlags:
              type: array
              items:
                type: string
            verdict:
              type: string
              description: "LIKELY_VALID | UNCERTAIN | LIKELY_FABRICATED"
            specificity:
              type: integer
              description: Legacy V1 field (deprecated)
            originality:
              type: integer
              description: Legacy V1 field (deprecated)
            voice:
              type: integer
              description: Legacy V1 field (deprecated)
            coherence:
              type: integer
              description: Legacy V1 field (deprecated)
            hallucination:
              type: integer
              description: Legacy V1 field (deprecated)
          description: Per-criterion LLM validity scores. Null when LLM analysis is unavailable. May contain legacy V1 fields for older records.
        humanIndicators:
          type: array
          items:
            $ref: "#/components/schemas/HumanIndicator"
          description: Detected human-writing signals that reduced the slop score
        authenticityScore:
          type: integer
          description: AI-authorship likelihood score 0-100 (higher = more likely AI-generated). Measures writing style, spectral patterns, template usage.
        validityScore:
          type: integer
          description: Technical substance/validity score 0-100 (higher = stronger evidence of a real vulnerability). Measures evidence quality, claim specificity, internal consistency.
        quadrant:
          type: string
          enum: ["AI_SLOP", "AI_ASSISTED", "WEAK_HUMAN", "STRONG_HUMAN"]
          description: Two-axis classification quadrant. AI_SLOP=high auth/low valid, AI_ASSISTED=high auth/high valid, WEAK_HUMAN=low auth/low valid, STRONG_HUMAN=low auth/high valid.
        archetype:
          type: string
          enum: ["AUTO_CLOSE", "PRIORITIZE_REVIEW", "REQUEST_DETAILS", "ACCEPT"]
          description: Recommended triage action derived from quadrant classification.
        analysisMode:
          type: string
          enum: ["heuristic_only", "llm_enhanced"]
          description: Whether the analysis ran in heuristic-only mode or with LLM enhancement.
        confidenceNote:
          type: ["string", "null"]
          description: Human-readable note explaining confidence adjustments (e.g. LLM-free mode reduces confidence by 15%).
        configNotices:
          type: array
          items:
            type: object
            properties:
              setting:
                type: string
              severity:
                type: string
                enum: ["info", "warning", "critical"]
              title:
                type: string
              summary:
                type: string
              impact:
                type: object
                additionalProperties:
                  type: string
              recommendation:
                type: string
          description: Configuration impact notices explaining how current settings affect analysis accuracy, latency, and privacy.
        diagnostics:
          type: ["object", "null"]
          properties:
            inputStats:
              type: object
              properties:
                charCount:
                  type: integer
                lineCount:
                  type: integer
                wordCount:
                  type: integer
                maxLineLength:
                  type: integer
                containsPlaceholders:
                  type: boolean
            stages:
              type: object
              additionalProperties:
                type: object
                properties:
                  status:
                    type: string
                  durationMs:
                    type: integer
                  error:
                    type: string
            parseWarnings:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  detail:
                    type: string
            totalDurationMs:
              type: integer
            crashInfo:
              type: ["object", "null"]
              properties:
                message:
                  type: string
                stage:
                  type: string
                inputLength:
                  type: integer
          description: Pipeline diagnostics showing which analysis stages ran, their durations, and any warnings. crashInfo is non-null when the pipeline ran in degraded mode.
        adjustedScore:
          type: ["integer", "null"]
          description: Client-adjusted slop score based on sensitivity profile. Null when no adjustment applied (balanced preset).
        sensitivityProfile:
          type: ["string", "null"]
          enum: ["lenient", "balanced", "strict", null]
          description: Active sensitivity preset used for score adjustment. Null when default (balanced).
        llmEnhanced:
          type: boolean
          description: True when LLM analysis contributed to the final slopScore. False means the score is purely heuristic.
        llmFailed:
          type: boolean
          description: True when LLM analysis was attempted but failed (timeout, parse error, API error). False when LLM succeeded or was not attempted.
        llmUsed:
          type: boolean
          description: Whether LLM analysis was attempted (not skipped by user). When false, the user explicitly opted out of AI analysis.
        redactionApplied:
          type: boolean
          description: Whether PII auto-redaction was applied. When false, the user explicitly disabled redaction.
        verification:
          oneOf:
            - $ref: "#/components/schemas/Verification"
            - type: "null"
          description: Active content verification results (GitHub, NVD, PoC checks). Null when verification was not performed.
        triageRecommendation:
          oneOf:
            - $ref: "#/components/schemas/TriageRecommendation"
            - type: "null"
          description: Automated triage action recommendation with challenge questions and behavioral signals. Null when not computed.
        triageAssistant:
          oneOf:
            - $ref: "#/components/schemas/TriageAssistant"
            - type: "null"
          description: AI triage assistant with reproduction guidance, gap analysis, don't-miss warnings, and reporter feedback. Null when not computed.
        claims:
          oneOf:
            - $ref: "#/components/schemas/LLMClaims"
            - type: "null"
          description: Extracted claims from the report (project, files, functions, PoC presence, etc.). Null when LLM analysis was not performed.
        substance:
          oneOf:
            - $ref: "#/components/schemas/LLMSubstanceScores"
            - type: "null"
          description: Substance-based scoring (PoC validity, claim specificity, domain coherence). Null when LLM analysis was not performed.
        vulnrap:
          oneOf:
            - $ref: "#/components/schemas/VulnrapComposite"
            - type: "null"
          description: Sprint 9 multi-engine consensus score (3 engines). Null when not computed (e.g., legacy reports).
        avriFamily:
          type: ["string", "null"]
          description: Cached AVRI rubric family id for this report (e.g. INJECTION, MEMORY_CORRUPTION). Sourced from the persisted reports.avri_family column; null for legacy rows submitted before the family was persisted.
        engineVersions:
          oneOf:
            - $ref: "#/components/schemas/EngineVersions"
            - type: "null"
          description: Semver pin of every scoring engine that produced this report. Null for legacy rows scored before the engine_versions column shipped (Task #624).
        fileName:
          type: ["string", "null"]
        fileSize:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contentHash
        - contentMode
        - slopScore
        - slopTier
        - qualityScore
        - confidence
        - breakdown
        - evidence
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - fileSize
        - createdAt

    EngineVersions:
      type: object
      description: Semver pins for each scoring engine that produced a report. Bumped when an engine's behavior changes so reviewers can attribute score deltas to the right release.
      properties:
        linguistic:
          type: string
          description: Semver of the linguistic-slop scorer.
        substance:
          type: string
          description: Semver of the substance scorer.
        cwe:
          type: string
          description: Semver of the CWE classifier.
        avri:
          type: string
          description: Semver of the AVRI rubric engine.
        fusion:
          type: string
          description: Semver of the composite fusion algorithm.
      required:
        - linguistic
        - substance
        - cwe
        - avri
        - fusion

    VulnrapComposite:
      type: object
      description: VulnRap multi-engine consensus score with per-engine breakdowns.
      properties:
        compositeScore:
          type: integer
          description: Composite score 0-100, where higher = stronger evidence of a real, reproducible vulnerability.
        label:
          type: string
          enum:
            [
              "LIKELY INVALID",
              "HIGH RISK",
              "NEEDS REVIEW",
              "REASONABLE",
              "PROMISING",
              "STRONG",
            ]
        engines:
          type: array
          items:
            $ref: "#/components/schemas/VulnrapEngineResult"
        compositeBreakdown:
          type: object
          properties:
            weightedSum:
              type: number
            totalWeight:
              type: number
            beforeOverride:
              type: integer
            afterOverride:
              type: integer
        overridesApplied:
          type: array
          items:
            type: string
          description: Composite-level override rules that fired (e.g. CONVERGENT_NEGATIVE, CWE_TYPE_SWAP).
        warnings:
          type: array
          items:
            type: string
        engineCount:
          type: integer
        reconstructed:
          type: boolean
          description: True when the composite was rebuilt by backfill-vulnrap from cached v3.5.0 signals (legacy reports stored without raw text). Reviewers should treat the score as approximate — CWE coherence is neutralized, no perplexity is available, and per-engine scores derive from cached slop / validity / quality / evidence values rather than a fresh pipeline run.
        rescoreHistory:
          type: array
          description: Task #389 — chronological audit trail (oldest first) of times the bulk vulnrap backfill rewrote this report's composite. Empty when the row has only ever been scored by a normal recheck or first-time analysis. Lets reviewers tell from the row itself that the composite was changed by a `--rescore` run (vs. a real recheck) and what the prior value was.
          items:
            type: object
            required:
              - source
              - mode
              - rescoredAt
              - priorCompositeScore
              - newCompositeScore
              - newCorrelationId
            properties:
              source:
                type: string
                enum: ["backfill-rescore"]
                description: Always `backfill-rescore` for now; reserved for future audit sources (e.g. manual reviewer overrides).
              mode:
                type: string
                enum: ["engine", "reconstruction"]
                description: Which rescore branch produced this entry. `engine` means the live pipeline re-ran on stored text; `reconstruction` means the composite was rebuilt from cached v3.5.0 signals.
              rescoredAt:
                type: string
                format: date-time
                description: ISO timestamp of the moment the rescore wrote this row.
              priorCompositeScore:
                type: integer
                description: Composite score the row carried before this rescore.
              priorCompositeLabel:
                type: string
                nullable: true
                description: Composite label the row carried before this rescore (null for very old rows where the label column was unset).
              priorCorrelationId:
                type: string
                nullable: true
                description: Correlation id the row carried before this rescore (null for legacy rows analyzed before the column existed).
              newCompositeScore:
                type: integer
                description: Composite score this rescore wrote onto the row.
              newCompositeLabel:
                type: string
                description: Composite label this rescore wrote onto the row.
              newCorrelationId:
                type: string
                description: Correlation id this rescore wrote onto the row (joinable to the analysis_traces table for engine-mode rescores; `recon-…` for reconstruction-mode rescores).
      required:
        - compositeScore
        - label
        - engines
        - overridesApplied

    VulnrapEngineResult:
      type: object
      properties:
        engine:
          type: string
          description: Human-readable engine name.
        score:
          type: integer
        verdict:
          type: string
          enum: ["GREEN", "YELLOW", "RED", "GREY"]
        confidence:
          type: string
          enum: ["HIGH", "MEDIUM", "LOW"]
        triggeredIndicators:
          type: array
          items:
            type: object
            properties:
              signal:
                type: string
              value:
                description: Indicator value; may be string, number, or boolean.
              threshold:
                type: number
              strength:
                type: string
                enum: ["HIGH", "MEDIUM", "LOW"]
              explanation:
                type: string
        signalBreakdown:
          type: object
          additionalProperties: true
        note:
          type: string
      required:
        - engine
        - score
        - verdict
        - confidence

    VerificationBadge:
      type: object
      properties:
        id:
          type: integer
        reportCode:
          type: string
          description: Human-readable report code (e.g. VR-000B)
        slopScore:
          type: integer
        slopTier:
          type: string
        similarityMatchCount:
          type: integer
        sectionMatchCount:
          type: integer
        contentHash:
          type: string
        verifyUrl:
          type: string
          description: Public URL to verify this report
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportCode
        - slopScore
        - slopTier
        - similarityMatchCount
        - sectionMatchCount
        - contentHash
        - verifyUrl
        - createdAt

    CheckResult:
      type: object
      properties:
        slopScore:
          type: integer
        slopTier:
          type: string
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0)
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings
        llmSlopScore:
          type: ["integer", "null"]
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
        llmBreakdown:
          type: ["object", "null"]
          properties:
            claimSpecificity:
              type: integer
            evidenceQuality:
              type: integer
            internalConsistency:
              type: integer
            hallucinationSignals:
              type: integer
