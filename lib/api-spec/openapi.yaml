        ]

    AvriDriftNotificationRecord:
      type: object
      description: |
        Single dedup entry from `data/avri-drift-notifications.json`. The
        `key` is the stable per-flag identifier (week + kind, plus bucket +
        family for `FAMILY_MEAN_SHIFT`) used to suppress repeat
        notifications.
      properties:
        key:
          type: string
          description: Stable per-flag dedup key. Pass this back to /rearm to re-arm the flag.
        weekStart:
          type: string
          description: ISO date (YYYY-MM-DD) for the Monday that started the flag's week.
        kind:
          type: string
          enum: [GAP_BELOW_45, FAMILY_MEAN_SHIFT]
        notifiedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the flag was first dispatched.
        detail:
          type: string
          description: Original flag detail string at the time of the first notification.
      required: [key, weekStart, kind, notifiedAt, detail]

    AvriDriftNotificationsList:
      type: object
      properties:
        notified:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
        total:
          type: integer
      required: [notified, total]

    AvriDriftRearmBody:
      type: object
      properties:
        keys:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: string
            minLength: 1
          description: Dedup keys (from AvriDriftNotificationRecord.key) to re-arm.
        reviewer:
          type: string
          maxLength: 200
          description: |
            Optional reviewer name recorded in the re-arm audit log.
            Empty/whitespace-only values are treated as absent.
        rationale:
          type: string
          maxLength: 500
          description: |
            Optional free-form rationale recorded in the re-arm audit
            log so reviewers can explain why a flag was re-armed.
            Empty/whitespace-only values are treated as absent.
      required: [keys]

    AvriDriftRearmAuditEntry:
      type: object
      description: |
        Single entry in the re-arm audit log. Preserves the original
        notification metadata of the dedup record that was removed
        plus the wall-clock + reviewer context for the re-arm action
        itself, so the log stays useful even after the matching dedup
        record is gone.
      properties:
        key:
          type: string
          description: Dedup key that was re-armed.
        weekStart:
          type: string
          description: ISO date (YYYY-MM-DD) for the Monday that started the flag's week.
        kind:
          type: string
          enum: [GAP_BELOW_45, FAMILY_MEAN_SHIFT]
        originalNotifiedAt:
          type: string
          format: date-time
          description: ISO timestamp when the original notification first dispatched.
        originalDetail:
          type: string
          description: Original flag detail string at the time of the first notification.
        rearmedAt:
          type: string
          format: date-time
          description: ISO timestamp when the entry was re-armed.
        rearmedBy:
          type: string
          description: Reviewer name supplied with the re-arm call (omitted when not provided).
        rationale:
          type: string
          description: Free-form rationale supplied with the re-arm call (omitted when not provided).
      required:
        [key, weekStart, kind, originalNotifiedAt, originalDetail, rearmedAt]

    AvriDriftRearmHistoryList:
      type: object
      description: |
        Snapshot of the persisted re-arm audit log. Capped at 200
        entries (oldest trimmed first); newest entries are at the END
        of the array (callers reverse for newest-first display).
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftRearmAuditEntry"
        total:
          type: integer
      required: [history, total]

    AvriDriftRearmResponse:
      type: object
      properties:
        rearmed:
          type: integer
          description: Number of dedup entries that were re-armed (i.e. removed from the dedup state).
        notFound:
          type: array
          items:
            type: string
          description: Keys from the request that did not match any persisted entry.
        remaining:
          type: integer
          description: Total entries left in the dedup state after the re-arm.
        removed:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
          description: Full records that were re-armed, in the order they appeared in the dedup state.
        notified:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftNotificationRecord"
          description: Refreshed dedup state snapshot after the re-arm so the UI can update without an extra GET.
        auditEntries:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftRearmAuditEntry"
          description: |
            Audit entries appended to the persisted log for this call
            (one per matched key). Empty when nothing matched.
        rearmHistory:
          type: array
          items:
            $ref: "#/components/schemas/AvriDriftRearmAuditEntry"
          description: |
            Refreshed re-arm audit log after this call so the UI can
            render the "Recently re-armed" panel without an extra
            GET. Capped at 200 entries.
      required:
        [
          rearmed,
          notFound,
          remaining,
          removed,
          notified,
          auditEntries,
          rearmHistory,
        ]

    CalibrationAuthBruteForceAlertEntry:
      type: object
      description: |
        Single entry in the in-process ring buffer of dispatched
        calibration-auth brute-force alerts. Mirrors the webhook
        payload (sans the constant `event` discriminator and the
        static `recommendedActions` runbook copy).
      properties:
        detectedAt:
          type: string
          format: date-time
          description: ISO timestamp when the alert tripped (i.e. the threshold-crossing wrong-token event).
        ip:
          type: string
          description: Source IP that crossed the per-IP wrong-token threshold.
        windowMs:
          type: integer
          description: Sliding window (ms) used to count wrong-token events.
        threshold:
          type: integer
          description: Number of wrong-token events within `windowMs` that triggered the alert.
        wrongTokenCount:
          type: integer
          description: Total wrong-token events from the IP within the window at the moment the alert fired.
        rejectionsByStatus:
          type: object
          properties:
            "401":
              type: integer
            "429":
              type: integer
          required: ["401", "429"]
          description: Tally of in-window rejections split by HTTP status code.
        rejectionsByGate:
          type: object
          properties:
            mutation:
              type: integer
            "strict-read":
              type: integer
          required: [mutation, "strict-read"]
          description: Tally of in-window rejections split by which calibration gate fired.
        firstSeenAt:
          type: string
          format: date-time
          description: ISO timestamp of the oldest in-window wrong-token event from this IP.
        lastSeenAt:
          type: string
          format: date-time
          description: ISO timestamp of the newest in-window wrong-token event from this IP (the one that crossed the threshold).
        lastRoute:
          type: string
          description: Route that the threshold-crossing request hit.
        lastMethod:
          type: string
          description: HTTP method of the threshold-crossing request.
        runbookUrl:
          type: string
          description: Operator runbook URL surfaced in the alert payload.
        ack:
          $ref: "#/components/schemas/CalibrationAuthBruteForceAlertAck"
      required:
        - detectedAt
        - ip
        - windowMs
        - threshold
        - wrongTokenCount
        - rejectionsByStatus
        - rejectionsByGate
        - firstSeenAt
        - lastSeenAt
        - lastRoute
        - lastMethod
        - runbookUrl

    CalibrationAuthBruteForceAlertAck:
      type: object
      description: |
        Reviewer acknowledgement attached to a dispatched calibration
        auth brute-force alert. Mirrors the shape of the AVRI drift
        re-arm audit entries (reviewer + free-form note + wall-clock
        timestamp) so the dashboard can render both audit trails with
        the same helpers.
      properties:
        ackedAt:
          type: string
          format: date-time
          description: ISO timestamp when the reviewer acknowledged the alert.
        ackedBy:
          type: string
          description: Reviewer name supplied with the ack call (omitted when not provided).
        note:
          type: string
          description: Free-form note supplied with the ack call (omitted when not provided).
      required: [ackedAt]

    CalibrationAuthBruteForceAlertAckBody:
      type: object
      description: |
        Identifies the alert by `(ip, detectedAt)` — the same tuple
        the recent-alerts panel uses as a React key — plus optional
        reviewer attribution and a free-form note.
      properties:
        ip:
          type: string
          minLength: 1
          description: Source IP from the alert row to acknowledge.
        detectedAt:
          type: string
          format: date-time
          description: The `detectedAt` of the alert row to acknowledge.
        reviewer:
          type: string
          maxLength: 200
          description: Reviewer display name to record on the ack (optional).
        note:
          type: string
          maxLength: 500
          description: Free-form note describing the disposition (e.g. "false alarm — office NAT").
      required: [ip, detectedAt]

    CalibrationAuthBruteForceAlertAckResponse:
      type: object
      description: |
        Echoes the now-acked alert (with the `ack` field populated)
        so the calibration UI can update the row without re-fetching
        the entire ring buffer.
      properties:
        alert:
          $ref: "#/components/schemas/CalibrationAuthBruteForceAlertEntry"
      required: [alert]

    CalibrationAuthBruteForceAlertAckConflict:
      type: object
      description: |
        Returned with HTTP 409 when the alert identified by the
        request body has already been acknowledged by another
        reviewer. Includes the existing `alert` (with its `ack`
        populated) so the UI can show who got there first.
      properties:
        error:
          type: string
        reason:
          type: string
          enum: [already-acked]
        alert:
          $ref: "#/components/schemas/CalibrationAuthBruteForceAlertEntry"
      required: [error, reason, alert]

    CalibrationAuthBruteForceAlertsList:
      type: object
      description: |
        Newest-first snapshot of the in-process recent-alerts ring
        buffer. `bufferSize` is the absolute cap on retained entries
        (older alerts are evicted FIFO); `limit` is the per-request
        cap actually applied.
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/CalibrationAuthBruteForceAlertEntry"
        total:
          type: integer
          description: Number of alerts returned (`<= limit`).
        limit:
          type: integer
          description: Effective per-request cap that was applied.
        bufferSize:
          type: integer
          description: Maximum number of entries the in-process buffer retains.
      required: [alerts, total, limit, bufferSize]

    AvriDriftSchedulerStatus:
      type: object
      description: |
        Per-replica status of the AVRI drift-notification scheduler.
        Timestamps are ISO 8601; `null` is used wherever the field is
        not yet meaningful (e.g. `lastTickAt` before the first tick,
        `nextTickAt` while the scheduler is stopped).

        `replicaId` + `hostname` identify the server replica that owns
        this snapshot so a multi-replica deploy can render one row per
        replica. `heartbeatAt` is the wall-clock at which the snapshot
        was last persisted to the shared state file (null only for the
        live in-memory snapshot of the responding replica before its
        first persisted heartbeat).
      properties:
        replicaId:
          type: string
          description: |
            Stable per-process identity for the replica that owns this
            snapshot (e.g. `${hostname}-${bootHex}`, overridable via
            the `AVRI_REPLICA_ID` environment variable).
        hostname:
          type: string
          description: Hostname of the replica that owns this snapshot.
        heartbeatAt:
          type: string
          format: date-time
          nullable: true
          description: |
            ISO timestamp at which this snapshot was last persisted to
            the shared state file. Null only for the live in-memory
            snapshot of the responding replica before its first
            persisted heartbeat.
        schedulerStarted:
          type: boolean
          description: True once the scheduler has been armed in this process.
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp when the scheduler was started, or null when never started in this process.
        intervalMs:
          type: integer
          nullable: true
          description: Configured success-case interval (ms), or null when not started.
        retryIntervalMs:
          type: integer
          nullable: true
          description: Configured retry-on-failure interval (ms), or null when not started.
        webhookConfigured:
          type: boolean
          description: True when the drift webhook URL is currently set; ticks short-circuit when false.
        lastTickAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the most recent completed tick, or null when no tick has run yet.
        lastTickOk:
          type: boolean
          nullable: true
          description: True when the last tick succeeded; false on failure; null until the first tick.
        lastTickRanCheck:
          type: boolean
          nullable: true
          description: True when the last tick scanned the database; false when it short-circuited because no webhook is configured; null until the first tick.
        lastTickDispatched:
          type: boolean
          nullable: true
          description: True when the last tick dispatched a webhook; null until the first tick or when no dispatch was attempted.
        lastTickNewFlagCount:
          type: integer
          nullable: true
          description: Number of new flags dispatched on the most recent tick; null until the first tick or when no dispatch was attempted.
        nextTickAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp when the next tick is scheduled to fire; null when the scheduler is stopped or never started.
        ticksCompleted:
          type: integer
          description: Number of ticks that have completed since the scheduler started.
      required:
        - replicaId
        - hostname
        - heartbeatAt
        - schedulerStarted
        - startedAt
        - intervalMs
        - retryIntervalMs
        - webhookConfigured
        - lastTickAt
        - lastTickOk
        - lastTickRanCheck
        - lastTickDispatched
        - lastTickNewFlagCount
        - nextTickAt
        - ticksCompleted

    CalibrationReport:
      type: object
      properties:
        currentConfig:
          $ref: "#/components/schemas/ScoringConfigItem"
        totalFeedbackAnalyzed:
          type: integer
        bucketAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/BucketAnalysis"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CalibrationSuggestion"
        overallHealth:
          type: string
          enum: [good, needs-attention, needs-tuning]
        minFeedbackThreshold:
          type: integer
      required:
        [
          currentConfig,
          totalFeedbackAnalyzed,
          bucketAnalysis,
          suggestions,
          overallHealth,
          minFeedbackThreshold,
        ]

    ShadowDriftRow:
      type: object
      description: |
        One persisted shadow-score row whose live vs. shadow result
        diverges enough to surface on the reviewer drift dashboard
        (Task #639). A row qualifies when the tier flipped OR the
        score delta is at least 10 points in either direction.
      properties:
        id:
          type: integer
        reportId:
          type: integer
        liveScore:
          type: integer
        liveTier:
          type: string
        shadowScore:
          type: integer
        shadowTier:
          type: string
        scoreDiff:
          type: integer
          description: shadow_score − live_score (positive means shadow is harsher)
        tierDiverged:
          type: boolean
        shadowVersion:
          type: string
        scoredAt:
          type: string
          format: date-time
        fileName:
          type: string
          nullable: true
      required:
        - id
        - reportId
        - liveScore
        - liveTier
        - shadowScore
        - shadowTier
        - scoreDiff
        - tierDiverged
        - shadowVersion
        - scoredAt

    ShadowDriftTotals:
      type: object
      properties:
        total:
          type: integer
        divergent:
          type: integer
        tierFlips:
          type: integer
        scoreFlips:
          type: integer
        legitToSlop:
          type: integer
        slopToLegit:
          type: integer
      required:
        [total, divergent, tierFlips, scoreFlips, legitToSlop, slopToLegit]

    ShadowDriftReport:
      type: object
      description: |
        Reviewer-only listing of shadow-score divergences in the
        lookback window. `enabled` echoes whether
        `SHADOW_SCORING_ENABLED=1` is set on the API server so the UI
        can render an "OFF" hint when no fresh rows are landing.
      properties:
        enabled:
          type: boolean
        generatedAt:
          type: string
          format: date-time
        lookbackDays:
          type: integer
        scoreDeltaThreshold:
          type: integer
          description: Score-delta threshold (in points) above which a row is considered divergent regardless of tier.
        totals:
          $ref: "#/components/schemas/ShadowDriftTotals"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ShadowDriftRow"
      required:
        [enabled, generatedAt, lookbackDays, scoreDeltaThreshold, totals, rows]

    ScoreStabilityDailyBucket:
      type: object
      description: |
        Per-day flip counts for the score-stability monitor. `total` is
        the number of `report_rescore_log` rows the scheduler wrote on
        that day (i.e. the day's re-score volume); `flips` is the
        subset whose tier changed. The direction-specific counters
        sum to `flips`.
      properties:
        date:
          type: string
          description: ISO date `YYYY-MM-DD` (UTC) the re-scores were written for.
        total:
          type: integer
          description: Number of re-score rows logged that day.
        flips:
          type: integer
          description: Subset of `total` whose tier changed under the new code.
        legitToSlop:
          type: integer
          description: Reports that moved from {Clean, Likely Human} into {Likely Slop, Slop}.
        slopToLegit:
          type: integer
          description: Reports that moved from {Likely Slop, Slop} into {Clean, Likely Human}.
        tightened:
          type: integer
          description: One-step moves toward `slop` (e.g. legit→middle, middle→slop).
        loosened:
          type: integer
          description: One-step moves toward `legit` (e.g. slop→middle, middle→legit).
        lateral:
          type: integer
          description: Tier changes that don't fit any of the above directions.
        flipRate:
          type: number
          description: flips / total, rounded to 4 decimals (0 when total is 0).
      required:
        [
          date,
          total,
          flips,
          legitToSlop,
          slopToLegit,
          tightened,
          loosened,
          lateral,
          flipRate,
        ]

    ScoreStabilitySummary:
      type: object
      description: |
        Reviewer-only summary backing the tier-flip chart on
        `/feedback-analytics`. Aggregates `report_rescore_log` over the
        lookback window into per-day flip counts plus the rolling totals
        the chart's header needs. The `alertThreshold` is echoed back so
        the UI can render the same dashed line the scheduler uses to
        decide whether to page reviewers.
      properties:
        generatedAt:
          type: string
          format: date-time
        lookbackDays:
          type: integer
        alertThreshold:
          type: number
          description: Flip-rate threshold (0..1) above which the scheduler pages reviewers.
        daily:
          type: array
          description: Per-day flip buckets, most-recent first.
          items:
            $ref: "#/components/schemas/ScoreStabilityDailyBucket"
        totals:
          type: object
          properties:
            total: { type: integer }
            flips: { type: integer }
            legitToSlop: { type: integer }
            slopToLegit: { type: integer }
            tightened: { type: integer }
            loosened: { type: integer }
            lateral: { type: integer }
            flipRate: { type: number }
          required:
            [
              total,
              flips,
              legitToSlop,
              slopToLegit,
              tightened,
              loosened,
              lateral,
              flipRate,
            ]
      required: [generatedAt, lookbackDays, alertThreshold, daily, totals]

    ScoreStabilityFlipDetail:
      type: object
      description: |
        A single report whose tier changed during re-scoring on a given
        day. Carries the old/new tier and score plus the flip direction
        so reviewers can assess the regression at a glance before
        clicking through to the report detail view.
      properties:
        reportId:
          type: integer
          description: Primary key of the report in `reports`.
        oldTier:
          type: string
        newTier:
          type: string
        oldScore:
          type: integer
        newScore:
          type: integer
        direction:
          type: string
          enum: [legit_to_slop, slop_to_legit, tightened, loosened, lateral]
      required: [reportId, oldTier, newTier, oldScore, newScore, direction]

    ScoreStabilityDayFlips:
      type: object
      description: |
        Listing of individual tier flips for a single UTC day. Returned
        by the `/score-stability/flips?date=YYYY-MM-DD` drilldown
        endpoint so reviewers can investigate which reports regressed.
      properties:
        date:
          type: string
          description: The requested ISO date.
        flips:
          type: array
          items:
            $ref: "#/components/schemas/ScoreStabilityFlipDetail"
      required: [date, flips]

    ScoreStabilitySchedulerStatus:
      type: object
      description: |
        Per-replica heartbeat for the in-process score-stability
        scheduler. Mirrors `AvriDriftSchedulerStatus` shape (booleans /
        timestamps / small numeric counters only) so it's safe to
        expose on an unauthenticated endpoint alongside the other
        scheduler-status surfaces.
      properties:
        schedulerStarted:
          type: boolean
        schedulerEnabled:
          type: boolean
          description: True when SCORE_STABILITY_SCHEDULER_ENABLED is set; ticks short-circuit when false.
        startedAt:
          type: string
          format: date-time
          nullable: true
        intervalMs:
          type: integer
          nullable: true
        retryIntervalMs:
          type: integer
          nullable: true
        lastTickAt:
          type: string
          format: date-time
          nullable: true
        lastTickOk:
          type: boolean
          nullable: true
        lastTickRanCheck:
          type: boolean
          nullable: true
          description: True when the last tick scanned the database; false when it short-circuited because the scheduler is disabled.
        lastTickScanned:
          type: integer
          nullable: true
        lastTickLogged:
          type: integer
          nullable: true
        lastTickFlips:
          type: integer
          nullable: true
        lastTickFailed:
          type: integer
          nullable: true
        lastAlertDate:
          type: string
          nullable: true
          description: ISO date (`YYYY-MM-DD`) of the most recently evaluated day.
        lastAlertFlipRate:
          type: number
          nullable: true
        lastAlertDispatched:
          type: boolean
          nullable: true
        nextTickAt:
          type: string
          format: date-time
          nullable: true
        ticksCompleted:
          type: integer
      required:
        [
          schedulerStarted,
          schedulerEnabled,
          startedAt,
          intervalMs,
          retryIntervalMs,
          lastTickAt,
          lastTickOk,
          lastTickRanCheck,
          lastTickScanned,
          lastTickLogged,
          lastTickFlips,
          lastTickFailed,
          lastAlertDate,
          lastAlertFlipRate,
          lastAlertDispatched,
          nextTickAt,
          ticksCompleted,
        ]

    ApplyCalibrationBody:
      type: object
      properties:
        changes:
          type: object
          description: Object with scoring config changes (prior, floor, ceiling, axisThresholds, tierThresholds, fabricationBoost)
        description:
          type: string
          description: Description of why this change is being made
      required: [changes, description]

    ApplyCalibrationResponse:
      type: object
      properties:
        message:
          type: string
        config:
          $ref: "#/components/schemas/ScoringConfigItem"
      required: [message, config]

    HandwavyCategory:
      type: string
      enum: [absence, hedging, buzzword]
      description: Theme bucket used by the diagnostics panel to group matched phrases.

    HandwavyEditEntry:
      type: object
      description: |
        Single in-place edit applied to a curated hand-wavy marker phrase.
        Records who made the change, when, and the before/after for whichever
        fields actually changed (`category`, `rationale`, and/or — Task
        #247 — the phrase string itself when a reviewer renamed it).
        Fields that did not change are omitted to keep the audit log
        compact.
      properties:
        editedBy:
          type: string
          description: Reviewer name or email that performed the edit. Absent when no reviewer was supplied.
        editedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the edit.
        category:
          type: object
          properties:
            from:
              $ref: "#/components/schemas/HandwavyCategory"
            to:
              $ref: "#/components/schemas/HandwavyCategory"
          required: [from, to]
        rationale:
          type: object
          description: Before/after values for the rationale text. Empty string indicates the rationale was set or cleared.
          properties:
            from:
              type: string
            to:
              type: string
        phrase:
          type: object
          description: |
            Task #247 — before/after values for the phrase string itself,
            present only when the reviewer renamed the marker via the
            edit endpoint's `newPhrase` field. Both values are stored
            already normalized (lowercase + collapsed whitespace).
          properties:
            from:
              type: string
            to:
              type: string
          required: [from, to]
      required: [editedAt]

    HandwavyMarker:
      type: object
      properties:
        phrase:
          type: string
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
          description: Reviewer name or email that added the phrase. Absent for curated defaults.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase was added. Absent for curated defaults.
        rationale:
          type: string
          description: Free-text justification supplied by the reviewer at add time.
        edits:
          type: array
          description: |
            Chronological log of in-place edits to this marker (most recent
            last). Each entry records who changed what, when. Bounded
            server-side per marker.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
      required: [phrase, category]

    HandwavyBatchHistoryPhrase:
      type: object
      description: |
        Task #135 — one element of a batch-removal history entry's `phrases`
        array. Mirrors the audit metadata that a single-removal entry carries
        at its top level. Per-phrase `reinstated*` fields track partial
        reinstates so a reviewer can pull individual phrases back out of a
        batch removal.
      properties:
        phrase:
          type: string
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        rationale:
          type: string
        edits:
          type: array
          description: Preserved on remove so reinstating still shows the edit history.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
        reinstated:
          type: boolean
        reinstatedBy:
          type: string
        reinstatedAt:
          type: string
          format: date-time
      required: [phrase, category]

    HandwavyHistoryEntry:
      type: object
      description: |
        Removed-phrase audit record used so reviewers can reinstate a phrase
        with original context. Single-removal entries populate `phrase` +
        `category`; Task #135 batch-removal entries leave those empty and
        instead populate `phrases` with the list of removed phrases.
      properties:
        phrase:
          type: string
          description: |
            The removed phrase (single-removal entries). Empty/omitted on
            Task #135 batch entries — see `phrases` instead.
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        rationale:
          type: string
        edits:
          type: array
          description: Task #120 — preserved on remove so reinstating still shows the edit history.
          items:
            $ref: "#/components/schemas/HandwavyEditEntry"
        removedBy:
          type: string
          description: Reviewer name or email that removed the phrase(s).
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase(s) were removed.
        reinstated:
          type: boolean
          description: |
            Task #121 — true once a reviewer has reinstated this phrase
            straight from the history log via POST
            /feedback/calibration/handwavy-phrases/reinstate. The same row
            cannot be reinstated twice — if the phrase is removed again, a
            new history row is appended. For Task #135 batch entries this
            is the AGGREGATE flag: true once every inner phrase has been
            reinstated (see `phrases[].reinstated`).
        reinstatedBy:
          type: string
          description: Reviewer name or email that reinstated the phrase from this history entry.
        reinstatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the phrase was reinstated from this history entry.
        undone:
          type: boolean
          description: |
            Task #130 — true when this history row was produced by a reviewer
            undoing a brand-new add via POST
            /feedback/calibration/handwavy-phrases/undo. The UI renders these
            rows distinctly from manual removals so the audit trail clearly
            reads "added then undone" rather than "added then removed".
        undoneBy:
          type: string
          description: Reviewer name or email that pressed Undo on this entry.
        phrases:
          type: array
          description: |
            Task #135 — present when the entry represents a batch removal.
            Each item lists one removed phrase plus its original add-history
            metadata and per-phrase reinstate state.
          items:
            $ref: "#/components/schemas/HandwavyBatchHistoryPhrase"
      required: [removedAt]

    HandwavyPhraseRemovalBatchSummary:
      type: object
      description: |
        Task #160 — Slim summary of one BATCH removal entry from the hand-wavy
        phrase history log, scoped to the fields the reinstate-batch CLI
        picker needs to show (timestamp, reviewer, phrase count,
        already-reinstated flag, plus a small sample of removed phrases).
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the batch removal entry. Pass back to /reinstate-batch as `removedAt`.
        removedBy:
          type: string
          description: Reviewer name or email recorded on the batch removal. Omitted if the original removal didn't supply one.
        phraseCount:
          type: integer
          description: Number of phrases that were removed in this batch.
        reinstated:
          type: boolean
          description: Aggregate flag — true once every inner phrase from this batch has already been reinstated.
        samplePhrases:
          type: array
          maxItems: 5
          items:
            type: string
          description: First few removed phrases (capped at 5), shown in the picker so reviewers can identify the batch at a glance.
      required: [removedAt, phraseCount, reinstated, samplePhrases]

    HandwavyPhraseRemovalBatchesList:
      type: object
      description: |
        Task #160 — Response from GET
        /feedback/calibration/handwavy-phrases/removal-batches. Newest batches
        are returned first.
      properties:
        limit:
          type: integer
          description: Effective page size used for this response.
        totalBatches:
          type: integer
          description: Total number of batch removal entries in the history log (regardless of `limit`).
        batches:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseRemovalBatchSummary"
      required: [limit, totalBatches, batches]

    HandwavyPhraseRemovalBatchDetail:
      type: object
      description: |
        Task #176 — Detail response for one batch removal entry. Echoes the
        FULL inner phrase list with per-phrase audit metadata so the
        reinstate-batch CLI (and the Task #244 web reviewer picker) can
        render every phrase the action would touch — not just the
        5-phrase sample the list endpoint returns. `reinstatedCount`
        / `reinstated` together let callers spot a partial- or
        already-fully-reinstated batch before re-firing the action.
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the parent batch removal entry (echoes the path parameter).
        removedBy:
          type: string
          description: Reviewer name or email recorded on the batch removal. Omitted if the original removal didn't supply one.
        reinstated:
          type: boolean
          description: Aggregate flag — true once every inner phrase from this batch has been reinstated.
        reinstatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the batch was fully reinstated, when `reinstated` is true.
        reinstatedBy:
          type: string
          description: Reviewer name or email recorded on the batch-level reinstate, when `reinstated` is true.
        phraseCount:
          type: integer
          description: Total number of phrases in this batch.
        reinstatedCount:
          type: integer
          description: Number of inner phrases that have already been reinstated (per-phrase or via a prior batch reinstate).
        phrases:
          type: array
          description: Full inner phrase list with per-phrase audit metadata.
          items:
            $ref: "#/components/schemas/HandwavyBatchHistoryPhrase"
      required: [removedAt, reinstated, phraseCount, reinstatedCount, phrases]

    HandwavyPhraseRemovalBatchDetailError:
      type: object
      description: |
        Task #176 — 404 response shape for the batch detail endpoint.
        `reason` discriminates between "no matching removal-history entry"
        and "matched a single-phrase removal" so callers can format a
        targeted hint (e.g. the CLI suggests /reinstate for the latter).
      properties:
        error:
          type: string
        reason:
          type: string
          enum: [history-not-found, not-a-batch]
      required: [error, reason]

    HandwavyPhrasesList:
      type: object
      properties:
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        total:
          type: integer
        history:
          type: array
          description: Removal audit log (most recent last). Bounded server-side.
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required: [phrases, total, history]

    HandwavyPhraseEditBody:
      type: object
      description: |
        Request body for the in-place edit endpoint. The `phrase` string
        identifies which curated marker to update; provide at least one of
        `category`, `rationale`, or `newPhrase` to actually change
        something. Send an empty `rationale` string to clear an existing
        rationale. Task #247 — `newPhrase` is the rename target; the edit
        only changes the row identity when its normalized form differs
        from the existing phrase, otherwise it is treated as a no-op.
      properties:
        phrase:
          type: string
          description: Existing curated phrase to edit (matched after lowercase + whitespace normalization).
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        rationale:
          type: string
          description: New rationale text. Empty string clears the existing rationale.
        newPhrase:
          type: string
          description: |
            Task #247 — Rename target. Normalized to lowercase + collapsed
            whitespace before matching, and rejected when the normalized
            form already belongs to another active marker. When the
            normalized form matches the existing `phrase`, the rename is a
            no-op; the request can still apply concurrent
            `category`/`rationale` updates.
        reviewer:
          type: string
          description: Reviewer name or email recorded in the edit audit entry. Optional.
      required: [phrase]

    HandwavyPhraseBody:
      type: object
      properties:
        phrase:
          type: string
          description: Marker phrase (case-insensitive substring match against report text after whitespace collapsing).
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        dryRun:
          type: boolean
          description: |
            Task #114 — when true on POST, the server does NOT persist the phrase. It runs the
            candidate phrase against the curated benchmark corpus (T1 LEGIT / T2 BORDERLINE
            / T3 SLOP / T4 HALLUCINATED fixtures) and returns a `dryRunMatches` block so
            reviewers can see how many GREEN / YELLOW reports the phrase would have hit
            before they confirm the add.

            Task #155 — when true on DELETE for a single phrase, the server does NOT
            mutate the active list, history, or cache and instead returns a
            `HandwavyPhraseSingleRemoveDryRunResponse` (the same corpus + production
            removal-impact summary as the batch dry-run, with `batch: false`).

            Defaults to false (write-through behavior).
        reviewer:
          type: string
          description: Reviewer name or email recorded in the audit trail. Optional.
        rationale:
          type: string
          description: Free-text justification recorded with the phrase. Only consulted on POST.
        productionScanLimit:
          type: integer
          minimum: 100
          maximum: 10000
          description: |
            Task #125 — optional override for the upper bound on the production-archive
            scan that backs the dry-run preview. Only consulted on the dry-run path
            (the only place the production scan runs). Heavy-user installs can widen
            the window for a stronger false-positive signal; small installs can tighten
            it to focus on recent reporter behavior. Defaults to 2000 when omitted so
            existing reviewers see no behavior change. The chosen value is echoed back
            in `dryRunMatchesProductionLimit` so the UI can label the second signal
            accurately.

            Task #230 — also accepted on the DELETE single-phrase dry-run path
            via `HandwavyPhraseBody`, which shares this body schema, so the
            same reviewer-chosen window drives the single-phrase removal preview
            too. The chosen value is echoed back in
            `HandwavyPhraseSingleRemoveDryRunResponse.dryRunImpact.productionLimit`.
      required: [phrase]

    HandwavyPhraseUndoBody:
      type: object
      description: |
        Task #130 — body for POST /feedback/calibration/handwavy-phrases/undo.
        The active marker is matched by `phrase` + `addedAt`; the request is
        rejected with 409 if the marker is older than the server-side undo
        window (default 5 minutes).
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase of the live marker to undo.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp from the live marker's `addedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `removedBy`/`undoneBy` on the resulting history row. Optional.
      required: [phrase, addedAt]

    HandwavyPhraseUndoBatchEntry:
      type: object
      description: |
        Task #233 — one `(phrase, addedAt)` pair to undo as part of a batch.
        Mirrors the single-undo body fields; see `HandwavyPhraseUndoBody`
        for the matching contract.
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase of the live marker to undo.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp from the live marker's `addedAt` field.
      required: [phrase, addedAt]

    HandwavyPhraseUndoBatchBody:
      type: object
      description: |
        Task #233 — body for POST /feedback/calibration/handwavy-phrases/undo-batch.
        The reviewer's UI walks every reviewer-added marker that's still
        inside its per-marker undo window and sends each one as a pair
        in `entries`. The server runs each entry through the per-marker
        undo path so every successful undo still produces its own
        `undone: true` history row (no batch-merge row that hides
        per-phrase provenance). Capped at 200 entries per call.
      properties:
        entries:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/HandwavyPhraseUndoBatchEntry"
        reviewer:
          type: string
          description: Reviewer name or email recorded as `removedBy`/`undoneBy` on every successful undo's history row. Optional.
      required: [entries]

    HandwavyPhraseUndoBatchEntryResult:
      type: object
      description: |
        Task #233 — outcome of attempting to undo one `(phrase, addedAt)`
        pair as part of a /undo-batch round-trip. Mirrors the
        single-undo failure reasons so the UI can render the same per-row
        explanations the per-row Undo button already surfaces.
      properties:
        phrase:
          type: string
        undone:
          type: boolean
        reason:
          type: string
          enum: [not-found, addedAt-mismatch, no-addedAt, window-expired]
          description: Present only when `undone` is false.
        historyEntry:
          allOf:
            - $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Present only when `undone` is true. The fresh `undone:true` history row appended for this phrase.
      required: [phrase, undone]

    HandwavyPhraseUndoBatchResponse:
      type: object
      description: |
        Task #233 — response from POST /feedback/calibration/handwavy-phrases/undo-batch.
        `phrases` and `history` echo the post-batch active list and audit
        log so callers can refresh their cached views in one round-trip.
      properties:
        undone:
          type: boolean
          description: Always true on a successful response (the batch was processed).
        batch:
          type: boolean
          description: Always true — distinguishes this response from a single-phrase /undo.
        undoneCount:
          type: integer
          description: Number of entries actually undone in this round-trip.
        skipped:
          type: integer
          description: Number of entries skipped (any non-success per-entry reason).
        total:
          type: integer
          description: Number of active phrases after the batch.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseUndoBatchEntryResult"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required:
        [undone, batch, undoneCount, skipped, total, results, phrases, history]

    HandwavyPhraseRevertEditBody:
      type: object
      description: |
        Task #132 — body for POST /feedback/calibration/handwavy-phrases/revert-edit.
        The edit entry is matched by `phrase` + `editedAt`.
      properties:
        phrase:
          type: string
          description: Existing curated phrase (matched after lowercase + whitespace normalization).
        editedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the `edits` entry to undo.
        reviewer:
          type: string
          description: Reviewer name or email recorded on the inverse edit entry. Optional.
      required: [phrase, editedAt]

    HandwavyPhraseBatchRemoveBody:
      type: object
      description: |
        Task #135 — batch removal request body for DELETE
        /feedback/calibration/handwavy-phrases. Sends up to 200 phrases in
        one round-trip; the server runs a single in-memory pass, a single
        file rewrite, and appends ONE history entry that lists every removed
        phrase. Mutually exclusive with the single-phrase `phrase` field.

        Task #145 — when `dryRun: true` the server returns a preview
        (`HandwavyPhraseBatchRemoveDryRunResponse`) that mirrors the
        post-mutation per-phrase results plus a corpus impact summary, but
        does NOT mutate the active list, the history log, or the cache.
      properties:
        phrases:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: string
          description: List of phrases to remove. Normalized server-side.
        reviewer:
          type: string
          description: Reviewer name or email recorded on the batch history entry. Optional.
        dryRun:
          type: boolean
          description: When true, return a removal preview (corpus impact + per-phrase outcomes) without mutating the active list.
        productionScanLimit:
          type: integer
          minimum: 100
          maximum: 10000
          description: |
            Task #229 / #230 — optional override for the upper bound on the
            production-archive scan that backs the bulk-removal dry-run. Mirrors the
            same field on `HandwavyPhraseBody` (Task #125) so the reviewer-chosen scan
            window persisted in the calibration UI applies to every production-archive
            scan, not just the add-phrase preview. Only consulted on the dry-run path,
            but validated on every DELETE so a malformed value never silently slips into
            a real bulk delete. Heavy-user installs can widen the window for a sharper
            "valid detections lost" signal; small installs can tighten it. Defaults to
            2000 when omitted so existing reviewers see no behavior change. The chosen
            value is echoed back in
            `HandwavyPhraseBatchRemoveDryRunResponse.dryRunImpact.productionLimit`.
      required: [phrases]

    HandwavyPhraseBatchRemoveDryRunImpact:
      type: object
      description: |
        Task #145 — projected impact of a bulk removal against a single
        corpus (curated benchmark fixtures or recent production reports).
        `total` counts fixtures that are flagged today but would NOT be
        flagged after the removal, broken down by tier. `validDetectionsLost`
        is `byTier.t3Slop + byTier.t4Hallucinated` (the worrying number).
        `falsePositivesDropped` is `byTier.t1Legit + byTier.t2Borderline`
        (informational good news). `warning` is set when valid detections
        would be lost; null otherwise.
      properties:
        total:
          type: integer
        byTier:
          type: object
          properties:
            t1Legit: { type: integer }
            t2Borderline: { type: integer }
            t3Slop: { type: integer }
            t4Hallucinated: { type: integer }
          required: [t1Legit, t2Borderline, t3Slop, t4Hallucinated]
        validDetectionsLost:
          type: integer
        falsePositivesDropped:
          type: integer
        corpusSize:
          type: integer
        sampleMatches:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              tier:
                type: string
                enum: [T1_LEGIT, T2_BORDERLINE, T3_SLOP, T4_HALLUCINATED]
              snippet:
                nullable: true
                description: |
                  Task #345 — A short context snippet (~80 chars centered on the
                  matched phrase) cut from the row's original text so a reviewer
                  can judge the un-flag in place without opening /verify/:id.
                  Returned as a structured `{ before, match, after }` triple so
                  the UI can render the matched phrase highlighted while the
                  rest of the snippet stays plain text. All three fields are
                  raw text — the client is responsible for escaping them when
                  rendering (React's text-node rendering already does this).
                  Null when the matched phrase could not be located in the
                  original text (defensive fallback; should not happen for the
                  flow that produced the match).
                type: object
                properties:
                  before: { type: string }
                  match: { type: string }
                  after: { type: string }
                required: [before, match, after]
            required: [id, tier]
        warning:
          oneOf:
            - type: string
            - type: "null"
        oldestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #218 — For production scans, the earliest `createdAt` among the rows
            actually included in the scanned sample (i.e. survived the label/content
            filter, so the same population reflected in `corpusSize`). Reported so
            reviewers using the bulk-retire flow can tell whether the impact signal
            reflects current reporter behavior or a long-stale archive (e.g. "scanned
            2000 reports from 2026-02-01 to 2026-04-22"). Null on the curated
            benchmark block (fixtures have no wall-clock timestamp) and when the
            scan was empty. Mirrors the add-time `HandwavyPhraseDryRunMatches`
            field of the same name (Task #124).
        newestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #218 — For production scans, the most recent `createdAt` among the
            rows actually included in the scanned sample. See `oldestCreatedAt` for
            details. Null on the curated benchmark block and when the scan was empty.
        archiveTotal:
          type: integer
          nullable: true
          description: |
            Task #323 — For production scans, the total number of label-bearing
            archived reports (i.e. the addressable population the chosen scan
            window is applied to, NOT just the `corpusSize` returned by the
            tier-filter). Reported alongside the response's `productionLimit`
            so the bulk-removal preview can warn when a reviewer-tightened
            scan window covers only a small slice of the archive (e.g.
            "scanning 100 of ~8,400 archived reports — recent reporter
            behavior only"). Null on the curated benchmark block (the corpus
            is the full fixture set, not a sample) and when the production
            scan was skipped because nothing would be removed.
      required:
        [
          total,
          byTier,
          validDetectionsLost,
          falsePositivesDropped,
          corpusSize,
          sampleMatches,
          warning,
          oldestCreatedAt,
          newestCreatedAt,
          archiveTotal,
        ]

    HandwavyPhraseBatchRemoveDryRunResponse:
      type: object
      description: |
        Task #145 — preview response returned when DELETE
        /feedback/calibration/handwavy-phrases is called with `dryRun: true`
        on the batch path. Mirrors the post-mutation per-phrase result
        shape but does NOT mutate the active list, history, or cache.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [true]
        wouldRemove:
          type: integer
          description: Count of phrases that WOULD be removed if the batch were applied.
        notFound:
          type: integer
        duplicateInBatch:
          type: integer
        total:
          type: integer
          description: Active list size BEFORE the batch (no mutation occurred).
        projectedTotal:
          type: integer
          description: Projected active list size AFTER the batch would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
        dryRunImpact:
          type: object
          properties:
            corpus:
              $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
            production:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
                - type: "null"
            productionError:
              oneOf:
                - type: string
                - type: "null"
            productionLimit:
              type: integer
          required: [corpus, productionError, productionLimit]
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
      required:
        [
          dryRun,
          batch,
          wouldRemove,
          notFound,
          duplicateInBatch,
          total,
          projectedTotal,
          results,
          dryRunImpact,
          phrases,
        ]

    HandwavyPhraseSingleRemoveDryRunResponse:
      type: object
      description: |
        Task #155 — preview response returned when DELETE
        /feedback/calibration/handwavy-phrases is called with `dryRun: true`
        on the SINGLE-phrase path. Mirrors the batch dry-run shape (with
        `batch: false`) so the in-UI Trash flow can show the same corpus +
        production removal-impact warning before a one-click removal,
        without mutating the active list, history, or cache.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [false]
        wouldRemove:
          type: integer
          description: 0 if the phrase is not on the active list, 1 otherwise.
        notFound:
          type: integer
        duplicateInBatch:
          type: integer
        phrase:
          type: string
          description: Normalized form actually compared against the active list.
        raw:
          type: string
          description: Original (raw) phrase as supplied by the client.
        removed:
          type: boolean
          description: Whether the phrase WOULD be removed if the call were not a dry run.
        reason:
          oneOf:
            - type: string
              enum: [not-found, duplicate-in-batch]
            - type: "null"
        total:
          type: integer
          description: Active list size BEFORE the removal (no mutation occurred).
        projectedTotal:
          type: integer
          description: Projected active list size AFTER the removal would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
          description: Single-element array mirroring the batch dry-run results shape.
        dryRunImpact:
          type: object
          properties:
            corpus:
              $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
            production:
              oneOf:
                - $ref: "#/components/schemas/HandwavyPhraseBatchRemoveDryRunImpact"
                - type: "null"
            productionError:
              oneOf:
                - type: string
                - type: "null"
            productionLimit:
              type: integer
          required: [corpus, productionError, productionLimit]
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
      required:
        [
          dryRun,
          batch,
          wouldRemove,
          notFound,
          duplicateInBatch,
          phrase,
          raw,
          removed,
          total,
          projectedTotal,
          results,
          dryRunImpact,
          phrases,
        ]

    HandwavyPhraseBatchRemoveResultEntry:
      type: object
      description: |
        Per-phrase outcome from a Task #135 batch removal. `phrase` is the
        normalized form actually compared against the active list. `reason`
        is omitted on successful removals.
      properties:
        raw:
          type: string
          description: Original (raw) phrase as supplied by the client.
        phrase:
          type: string
          description: Normalized form actually compared against the active list.
        removed:
          type: boolean
        reason:
          type: string
          enum: [not-found, duplicate-in-batch]
      required: [raw, phrase, removed]

    HandwavyPhraseBatchRemoveResponse:
      type: object
      description: |
        Task #135 — response from a batch DELETE call. The shape is
        intentionally distinct from `HandwavyPhraseMutationResponse` so
        clients can disambiguate by checking `batch === true`.
      properties:
        batch:
          type: boolean
          enum: [true]
        removed:
          type: integer
          description: Count of phrases that actually came off the active list.
        notFound:
          type: integer
          description: Count of phrases that were not in the active list at lookup time.
        total:
          type: integer
          description: Number of active phrases AFTER the batch.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseBatchRemoveResultEntry"
        historyEntry:
          oneOf:
            - $ref: "#/components/schemas/HandwavyHistoryEntry"
            - type: "null"
          description: The single batch history entry, or null if nothing was removed.
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Full active list after the batch.
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Full removal audit log after the batch.
      required: [batch, removed, notFound, total, results, phrases, history]

    HandwavyPhraseReinstateBody:
      type: object
      description: |
        Task #121 — body for POST /feedback/calibration/handwavy-phrases/reinstate.
        The history row is matched by `phrase` + `removedAt`.
      properties:
        phrase:
          type: string
          description: The (already-normalized) phrase from the matching history entry.
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the matching history entry's `removedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `addedBy`/`reinstatedBy` in the audit trail. Optional.
      required: [phrase, removedAt]

    HandwavyPhraseReinstateBatchBody:
      type: object
      description: |
        Task #144 — body for POST /feedback/calibration/handwavy-phrases/reinstate-batch.
        The batch history entry is matched by `removedAt`; every inner phrase
        that has not already been reinstated and is not currently active is
        re-added in one round-trip.

        Task #159 — when `dryRun: true` the server returns
        `HandwavyPhraseReinstateBatchDryRunResponse` with the same per-phrase
        outcome shape, and does NOT mutate the active marker list, the
        removal-history log, or the cache. Both the mutating and dry-run
        paths return HTTP 200; callers discriminate on the `dryRun` flag
        in the response body.

        Task #360 — when `phrases` is provided the server only considers
        inner phrases of the matched batch whose phrase appears in the
        allow-list (normalized: lowercase + collapsed whitespace). Inner
        phrases NOT in the list are omitted from `results` entirely and
        stay on the removal-history list as removed. A PROVIDED list —
        including `[]` — is treated as an explicit allow-list, so an
        empty array reinstates nothing. Allow-list values that don't
        match any inner phrase of the batch are reported as
        `not-in-batch` skip results.
      properties:
        removedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the matching batch removal entry's `removedAt` field.
        reviewer:
          type: string
          description: Reviewer name or email recorded as `addedBy`/`reinstatedBy` on every reinstated phrase. Optional.
        dryRun:
          type: boolean
          description: When true, return a per-phrase reinstate preview without mutating the active list or removal-history log.
        phrases:
          type: array
          description: |
            Task #360 — optional allow-list of inner phrases to reinstate
            from the matched batch (normalized: lowercase + collapsed
            whitespace). When omitted, every not-yet-reinstated inner
            phrase is processed (legacy behaviour). When present, only
            inner phrases whose normalized value appears in this list
            are considered; the rest stay on the removal-history list as
            removed. An empty array is therefore a no-op. Allow-list
            values that don't match any inner phrase of the batch are
            reported as `not-in-batch` in the per-phrase results.
          items:
            type: string
      required: [removedAt]

    HandwavyPhraseReinstateBatchResponse:
      type: object
      description: |
        Task #144 — response from POST /feedback/calibration/handwavy-phrases/reinstate-batch.
      properties:
        reinstated:
          type: boolean
          description: Always true on a successful mutating response (the batch was processed).
        batch:
          type: boolean
          description: Always true — distinguishes this response from a single-phrase /reinstate.
        removedAt:
          type: string
          format: date-time
        reinstatedCount:
          type: integer
          description: Number of inner phrases actually re-added in this round-trip.
        skipped:
          type: integer
          description: Number of inner phrases skipped (already reinstated or already active).
        total:
          type: integer
          description: Number of active phrases after the batch reinstate.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseReinstateBatchEntryResult"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
      required:
        [
          reinstated,
          batch,
          removedAt,
          reinstatedCount,
          skipped,
          total,
          results,
          historyEntry,
          phrases,
          history,
        ]

    HandwavyPhraseReinstateBatchEntryResult:
      type: object
      description: |
        Task #144 — outcome of attempting to reinstate one inner phrase as
        part of a /reinstate-batch round-trip.
      properties:
        phrase:
          type: string
        reinstated:
          type: boolean
        reason:
          type: string
          enum: [already-reinstated, already-active, not-in-batch]
          description: |
            Present only when `reinstated` is false. `not-in-batch` is only
            returned by Task #360 allow-list calls when a caller-supplied
            phrase is not part of the matched batch.
      required: [phrase, reinstated]

    HandwavyPhraseReinstateBatchDryRunResponse:
      type: object
      description: |
        Task #159 — dry-run preview returned when POST
        /feedback/calibration/handwavy-phrases/reinstate-batch is called with
        `dryRun: true`. Mirrors the per-phrase outcome shape of
        `HandwavyPhraseReinstateBatchResponse` so callers can reuse the same
        renderer, but does NOT mutate the active marker list, the
        removal-history log, or the cache. Both the mutating and dry-run
        paths return HTTP 200; callers discriminate on the `dryRun` flag
        in the response body.
      properties:
        dryRun:
          type: boolean
          enum: [true]
        batch:
          type: boolean
          enum: [true]
        removedAt:
          type: string
          format: date-time
        reinstatedCount:
          type: integer
          description: Number of inner phrases that WOULD be re-added if the batch were applied.
        skipped:
          type: integer
          description: Number of inner phrases that would be skipped (already reinstated or already active).
        total:
          type: integer
          description: Projected number of active phrases after the batch reinstate would be applied.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyPhraseReinstateBatchEntryResult"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Active list (unchanged because this is a dry run).
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Removal-history log (unchanged because this is a dry run).
      required:
        [
          dryRun,
          batch,
          removedAt,
          reinstatedCount,
          skipped,
          total,
          results,
          historyEntry,
          phrases,
          history,
        ]

    HandwavyPhraseDryRunMatches:
      type: object
      description: |
        Task #114 — preview of how a candidate FLAT hand-wavy phrase would have flagged
        the curated benchmark corpus. `falsePositives` is the count of T1 LEGIT (GREEN)
        and T2 BORDERLINE (YELLOW) fixtures the substring would have matched — a high
        value is a strong signal that the phrase will crater AVRI for legitimate reports.
      properties:
        total:
          type: integer
          description: Total number of corpus fixtures the candidate phrase matched.
        byTier:
          type: object
          properties:
            t1Legit:
              type: integer
              description: Matches in T1 LEGIT fixtures (GREEN — legitimate, well-evidenced).
            t2Borderline:
              type: integer
              description: Matches in T2 BORDERLINE fixtures (YELLOW — debatable signal).
            t3Slop:
              type: integer
              description: Matches in T3 SLOP fixtures (RED — known slop archetypes).
            t4Hallucinated:
              type: integer
              description: Matches in T4 HALLUCINATED fixtures (RED — fabricated/hallucinated).
          required: [t1Legit, t2Borderline, t3Slop, t4Hallucinated]
        falsePositives:
          type: integer
          description: T1 + T2 hits — the count of GREEN/YELLOW corpus reports that would have been flagged.
        corpusSize:
          type: integer
          description: Total number of corpus fixtures evaluated.
        sampleMatches:
          type: array
          maxItems: 12
          items:
            type: object
            properties:
              id:
                type: string
              tier:
                type: string
                enum: [T1_LEGIT, T2_BORDERLINE, T3_SLOP, T4_HALLUCINATED]
              snippet:
                nullable: true
                description: |
                  Task #495 — A short context snippet (~80 chars centered on the
                  matched phrase) cut from the row's original text so a reviewer
                  evaluating a NEW candidate phrase can judge each sample match
                  in place without opening /verify/:id (or, for curated cohorts,
                  cross-referencing the fixture file). Returned as a structured
                  `{ before, match, after }` triple so the UI can highlight the
                  matched phrase while the rest stays plain text. All three
                  fields are raw text — the client is responsible for escaping
                  them when rendering (React's text-node rendering already does
                  this). Null when the matched phrase could not be located in
                  the original text (defensive fallback; should not happen for
                  the flow that produced the match). Mirrors the per-row
                  removal preview's `snippet` field added in Task #345.
                type: object
                properties:
                  before: { type: string }
                  match: { type: string }
                  after: { type: string }
                required: [before, match, after]
            required: [id, tier, snippet]
          description: Up to 12 sample matched fixtures (id + tier + nullable snippet) for reviewer review.
        warning:
          type: string
          nullable: true
          description: |
            Reviewer-facing warning string when the phrase would flag legitimate reports
            (`falsePositives > 0`). Null when there are no GREEN/YELLOW hits.
        oldestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #124 — For production scans, the earliest `createdAt` among the rows
            actually included in the scanned sample (i.e. survived the label/content
            filter, so the same population reflected in `corpusSize`). Reported so
            reviewers can tell whether the false-positive signal reflects current
            reporter behavior or a long-stale archive (e.g. "scanned 2000 reports
            from 2026-02-01 to 2026-04-22"). Null on the curated benchmark block
            (fixtures have no wall-clock timestamp) and when the scan was empty.
        newestCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #124 — For production scans, the most recent `createdAt` among the
            rows actually included in the scanned sample. See `oldestCreatedAt` for
            details. Null on the curated benchmark block and when the scan was empty.
      required:
        [
          total,
          byTier,
          falsePositives,
          corpusSize,
          sampleMatches,
          oldestCreatedAt,
          newestCreatedAt,
        ]

    HandwavyPhraseDryRunOverlaps:
      type: object
      description: |
        Task #123 — overlap signal between a candidate FLAT hand-wavy phrase and the
        already-curated active list. A non-empty `matches` array means adding the
        candidate would be redundant (or partially redundant) with an existing entry,
        which the reviewer should see BEFORE confirming the add. The relation tells
        the reviewer whether the candidate is an exact duplicate, a broader phrase
        that would supersede an existing one, or a narrower phrase already covered
        by an existing entry.
      properties:
        total:
          type: integer
          description: Number of curated entries the candidate overlaps with.
        matches:
          type: array
          items:
            type: object
            properties:
              phrase:
                type: string
                description: The existing curated phrase that the candidate overlaps with.
              category:
                $ref: "#/components/schemas/HandwavyCategory"
              relation:
                type: string
                enum:
                  [
                    equal,
                    candidate-contains-existing,
                    existing-contains-candidate,
                  ]
                description: |
                  How the candidate relates to the existing curated phrase:
                  - `equal`: identical normalized text (exact duplicate).
                  - `candidate-contains-existing`: candidate is broader; it would
                    supersede the existing entry (anything matching the existing
                    phrase would also match the candidate).
                  - `existing-contains-candidate`: candidate is narrower; the
                    existing phrase already covers everything the candidate would.
            required: [phrase, category, relation]
      required: [total, matches]

    HandwavyPhraseMutationResponse:
      type: object
      properties:
        added:
          type: boolean
          description: True when POST appended the phrase. Omitted on PATCH/DELETE responses.
        edited:
          type: boolean
          description: True when PATCH actually changed the marker; false when the supplied updates matched the existing values. Omitted on POST/DELETE responses.
        editEntry:
          $ref: "#/components/schemas/HandwavyEditEntry"
        removed:
          type: boolean
          description: True when DELETE removed the phrase. Omitted on POST responses.
        reinstated:
          type: boolean
          description: |
            Task #121 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/reinstate. Omitted on plain
            POST/DELETE responses.
        undone:
          type: boolean
          description: |
            Task #130 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/undo. Omitted on plain
            POST/DELETE/reinstate responses.
        reverted:
          type: boolean
          description: |
            Task #132 — true when the response is from POST
            /feedback/calibration/handwavy-phrases/revert-edit. Inspect
            `edited` to tell whether the revert actually changed anything.
            Omitted on other endpoints.
        revertedEntry:
          $ref: "#/components/schemas/HandwavyEditEntry"
        phrase:
          type: string
          description: The normalized phrase that was added/removed.
        category:
          $ref: "#/components/schemas/HandwavyCategory"
        total:
          type: integer
          description: Number of active phrases after the mutation.
        marker:
          $ref: "#/components/schemas/HandwavyMarker"
        historyEntry:
          $ref: "#/components/schemas/HandwavyHistoryEntry"
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyMarker"
          description: Full active list after the mutation.
        dryRun:
          type: boolean
          description: |
            Task #114 — true when the response is a preview only and the phrase was NOT
            persisted. When dryRun is true, `dryRunMatches` is populated and the existing
            active phrase list (unchanged) is returned in `phrases`.
        dryRunMatches:
          $ref: "#/components/schemas/HandwavyPhraseDryRunMatches"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HandwavyHistoryEntry"
          description: Full removal audit log after the mutation (only included on DELETE).
        dryRunMatchesProduction:
          allOf:
            - $ref: "#/components/schemas/HandwavyPhraseDryRunMatches"
          nullable: true
          description: |
            Task #119 — Same shape as `dryRunMatches`, but scored against the most
            recent N production reports (capped by `dryRunMatchesProductionLimit`)
            instead of the curated benchmark cohorts. Production rows are bucketed
            into the same T1/T2/T3/T4 tiers as the curated corpus by mapping the
            persisted vulnrap composite label (STRONG/PROMISING -> T1, REASONABLE/
            NEEDS REVIEW -> T2, LIKELY INVALID -> T3, HIGH RISK -> T4). `corpusSize`
            on this block is the number of production reports actually scanned
            after dropping rows with no usable label / content. `null` when the
            production scan failed (see `dryRunMatchesProductionError`).
        dryRunMatchesProductionError:
          type: string
          nullable: true
          description: |
            Task #119 — Reviewer-facing notice when the production-archive scan
            could not run (e.g. DB unavailable). Null on success. The curated
            `dryRunMatches` block is still returned regardless.
        dryRunMatchesProductionLimit:
          type: integer
          description: |
            Task #119 — Upper bound on the number of most-recent production reports
            the dry-run scan considered. Reported so reviewers know the depth of
            the second signal (e.g. "scanned the last 2000 reports").
        dryRunOverlaps:
          $ref: "#/components/schemas/HandwavyPhraseDryRunOverlaps"
      required: [phrase, total, phrases]

    VisitRecorded:
      type: object
      properties:
        recorded:
          type: boolean
      required: [recorded]

    VisitorStats:
      type: object
      properties:
        totalUniqueVisitors:
          type: integer
        totalVisits:
          type: integer
      required: [totalUniqueVisitors, totalVisits]

    TrendsDailyTiers:
      type: object
      properties:
        clean:
          type: integer
        likelyHuman:
          type: integer
        questionable:
          type: integer
        likelySlop:
          type: integer
        slop:
          type: integer
      required: [clean, likelyHuman, questionable, likelySlop, slop]

    TrendsDailyReport:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
        avgScore:
          type: number
        tiers:
          $ref: "#/components/schemas/TrendsDailyTiers"
      required: [date, count, avgScore, tiers]

    TrendsFeedbackItem:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
        avgRating:
          type: number
        agreementRate:
          type: integer
      required: [date, count, avgRating, agreementRate]

    LatencyHistogramBin:
      type: object
      properties:
        ltMs:
          type: integer
          description: Upper bound (exclusive) of this bin in milliseconds. The last bin is open-ended (count of samples >= the previous bin's ltMs); ltMs is set to its lower bound for charting.
        count:
          type: integer
      required: [ltMs, count]

    LatencyPercentiles:
      type: object
      properties:
        p50:
          type: number
        p95:
          type: number
        p99:
          type: number
        sampleCount:
          type: integer
      required: [p50, p95, p99, sampleCount]

    LatencyEngineEntry:
      type: object
      properties:
        engine:
          type: string
        percentiles:
          $ref: "#/components/schemas/LatencyPercentiles"
        bins:
          type: array
          items:
            $ref: "#/components/schemas/LatencyHistogramBin"
      required: [engine, percentiles, bins]

    LatencyWorstEngine:
      type: object
      properties:
        engine:
          type: string
        p95:
          type: number
        pipelineP95:
          type: number
        ratio:
          type: number
          description: engine p95 divided by the median engine p95
      required: [engine, p95, pipelineP95, ratio]

    LatencySnapshot:
      type: object
      properties:
        windowHours:
          type: integer
        generatedAt:
          type: string
          format: date-time
        sampleCount:
          type: integer
        pipeline:
          type: object
          properties:
            percentiles:
              $ref: "#/components/schemas/LatencyPercentiles"
            bins:
              type: array
              items:
                $ref: "#/components/schemas/LatencyHistogramBin"
          required: [percentiles, bins]
        engines:
          type: array
          items:
            $ref: "#/components/schemas/LatencyEngineEntry"
        worstEngine:
          oneOf:
            - $ref: "#/components/schemas/LatencyWorstEngine"
            - type: "null"
      required:
        [windowHours, generatedAt, sampleCount, pipeline, engines, worstEngine]

    LatencyHistory:
      type: object
      properties:
        days:
          type: integer
        generatedAt:
          type: string
          format: date-time
        daily:
          type: array
          items:
            $ref: "#/components/schemas/LatencyHistoryDay"
      required: [days, generatedAt, daily]

    LatencyHistoryDay:
      type: object
      properties:
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        sampleCount:
          type: integer
        pipeline:
          $ref: "#/components/schemas/LatencyPercentiles"
        engines:
          type: array
          items:
            $ref: "#/components/schemas/LatencyHistoryEngine"
      required: [date, sampleCount, pipeline, engines]

    LatencyHistoryEngine:
      type: object
      properties:
        engine:
          type: string
        percentiles:
          $ref: "#/components/schemas/LatencyPercentiles"
      required: [engine, percentiles]

    PublicStatusEngine:
      type: object
      description: |
        Health snapshot for one scoring subsystem. `status` is derived from
        when the corresponding pipeline stage was last seen successfully —
        operational (≤1h), degraded (≤6h), down (older than 6h but seen in
        the last 30 days), unknown (never observed).
      properties:
        id:
          type: string
          description: Stable machine id (linguistic, substance, cwe, avri, llm_gate).
        label:
          type: string
          description: Human-readable engine name.
        status:
          type: string
          enum: [operational, degraded, down, unknown]
        recentSampleCount:
          type: integer
          description: Number of traces in the last hour that included this stage.
        lastSeenAt:
          oneOf:
            - type: "null"
            - type: string
              format: date-time
          description: Most recent trace timestamp that included this stage, or null if never seen.
      required: [id, label, status, recentSampleCount, lastSeenAt]

    PublicStatusUptime:
      type: object
      properties:
        windowDays:
          type: integer
        daysWithTraffic:
          type: integer
        uptimePercentage:
          type: number
          description: Fraction of windowDays with at least one successful trace, 0–100.
      required: [windowDays, daysWithTraffic, uptimePercentage]

    PublicStatusLatency:
      type: object
      properties:
        windowHours:
          type: integer
        sampleCount:
          type: integer
        p50Ms:
          type: number
        p95Ms:
          type: number
      required: [windowHours, sampleCount, p50Ms, p95Ms]

    PublicStatusSnapshot:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        overallStatus:
          type: string
          enum: [operational, degraded, down]
        uptime:
          $ref: "#/components/schemas/PublicStatusUptime"
        latency:
          $ref: "#/components/schemas/PublicStatusLatency"
        engines:
          type: array
          items:
            $ref: "#/components/schemas/PublicStatusEngine"
      required: [generatedAt, overallStatus, uptime, latency, engines]

    TrendsData:
      type: object
      properties:
        days:
          type: integer
        totalReports:
          type: integer
        totalFeedback:
          type: integer
        dailyReports:
          type: array
          items:
            $ref: "#/components/schemas/TrendsDailyReport"
        feedbackTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendsFeedbackItem"
      required: [days, totalReports, totalFeedback, dailyReports, feedbackTrend]

    PresetEngineWeights:
      type: object
      description: |
        Per-engine emphasis weights in the [0, 2] range. 1.0 means "use the
        platform default weighting"; lower values de-emphasise that engine,
        higher values emphasise it. Currently informational on /check (the
        page applies sensitivity + slop thresholds locally) but surfaced on
        /presets so reviewers can compare profiles at a glance.
      properties:
        linguistic:
          type: number
          minimum: 0
          maximum: 2
        factual:
          type: number
          minimum: 0
          maximum: 2
        template:
          type: number
          minimum: 0
          maximum: 2
        llm:
          type: number
          minimum: 0
          maximum: 2
      required: [linguistic, factual, template, llm]

    PresetEntry:
      type: object
      description: A single curated preset profile.
      properties:
        id:
          type: string
          description: Opaque slug used in `/check?preset=<id>` deep-links.
        name:
          type: string
        description:
          type: string
        audience:
          type: string
          description: Who this preset is calibrated for (free text).
        sensitivity:
          type: string
          enum: [lenient, balanced, strict]
        slopThresholdLow:
          type: integer
          minimum: 0
          maximum: 100
        slopThresholdHigh:
          type: integer
          minimum: 0
          maximum: 100
        engineWeights:
          $ref: "#/components/schemas/PresetEngineWeights"
      required:
        - id
        - name
        - description
        - audience
        - sensitivity
        - slopThresholdLow
        - slopThresholdHigh
        - engineWeights

    RoadmapItem:
      type: object
      description: A single public roadmap entry shown on `/roadmap`.
      properties:
        id:
          type: string
          description: Opaque slug for the roadmap item (stable across curator edits).
        column:
          type: string
          enum: [now, next, later]
          description: Which roadmap column the card renders in.
        status:
          type: string
          enum: [in_progress, shipping_soon, planned, research]
          description: Status badge shown on the card.
        title:
          type: string
          description: Card title.
        description:
          type: string
          description: One-line description of the item.
        eta:
          type: string
          description: Optional fuzzy ETA (e.g. "Q2 2026"). Illustrative only.
      required: [id, column, status, title, description]

    RoadmapResponse:
      type: object
      description: |
        Public roadmap returned by `GET /api/roadmap`. The `version`
        string lets clients cache-bust when curators ship a new
        revision of `roadmap.json`. `updatedAt` is a free-form ISO
        date string surfaced in the page footer.
      properties:
        version:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapItem"
      required: [version, items]

    GallerySample:
      type: object
      description: A single curated sample report shown on `/gallery`.
      properties:
        id:
          type: string
          description: Opaque slug for the gallery entry (stable across curator edits).
        label:
          type: string
          enum: [obvious_slop, subtle_slop, borderline, clean]
          description: Curator-assigned bucket the sample illustrates.
        title:
          type: string
          description: Card title.
        snippet:
          type: string
          description: ~150 char preview of the report content.
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Final composite slop score for the sample (0 clean → 100 slop).
        topSignals:
          type: array
          minItems: 1
          maxItems: 3
          items:
            type: string
          description: Top fired signals, in display order.
        reportId:
          type: integer
          minimum: 1
          description: Seed report id; click-through opens `/results/<reportId>`.
      required: [id, label, title, snippet, score, topSignals, reportId]

    IncidentEntry:
      type: object
      description: |
        Task #707 — One public incident postmortem. Severity uses a
        plain four-tier scale; `changelogAnchor` (when present) is the
        anchor fragment of the related `/changelog#anchor` entry so the
        UI can link the remediation to the shipped release notes.
      properties:
        id:
          type: string
          description: Opaque slug for the incident (stable across curator edits).
        date:
          type: string
          format: date
          description: ISO date the incident started (YYYY-MM-DD).
        duration:
          type: string
          description: Human-readable incident duration (e.g. "42 minutes", "3 hours").
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: Curator-assigned severity tier.
        summary:
          type: string
          description: One-sentence description of what happened.
        rootCause:
          type: string
          description: Plain-language root cause analysis.
        remediation:
          type: string
          description: What we changed to prevent recurrence.
        changelogAnchor:
          type: string
          description: Optional `/changelog#anchor` fragment linking to the related release notes.
      required: [id, date, duration, severity, summary, rootCause, remediation]

    IncidentLog:
      type: object
      description: |
        Public incident log returned by `GET /api/incidents`. The
        `version` string lets clients cache-bust when curators ship a
        new revision of `incidents.json`. `incidents` is empty when no
        public incidents have been recorded.
      properties:
        version:
          type: string
        incidents:
          type: array
          items:
            $ref: "#/components/schemas/IncidentEntry"
      required: [version, incidents]

    GalleryResponse:
      type: object
      description: |
        Curated sample-report gallery returned by `GET /api/gallery`. The
        `version` string lets clients cache-bust when curators ship a new
        revision of `gallery.json`.
      properties:
        version:
          type: string
        samples:
          type: array
          items:
            $ref: "#/components/schemas/GallerySample"
      required: [version, samples]

    ShowcaseEntry:
      type: object
      description: A single curator-picked interesting report shown on `/showcase`.
      properties:
        id:
          type: string
          description: Opaque slug for the showcase entry (stable across curator edits).
        title:
          type: string
          description: Card title.
        category:
          type: string
          enum: [high_confidence, edge_case, surprising_agreement]
          description: Curator-assigned bucket the entry illustrates.
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Final composite slop score for the report (0 clean → 100 slop).
        tier:
          type: string
          enum: [clean, borderline, subtle_slop, obvious_slop]
          description: Slop tier label that goes with the score.
        excerpt:
          type: string
          description: Short redacted excerpt from the report content.
        whyInteresting:
          type: string
          description: One-paragraph curator note explaining why this report was picked.
        reportId:
          type: integer
          minimum: 1
          description: Seed report id; click-through opens `/results/<reportId>`.
      required:
        [id, title, category, score, tier, excerpt, whyInteresting, reportId]

    ShowcaseResponse:
      type: object
      description: |
        Curated showcase entries returned by `GET /api/showcase`. The
        `version` string lets clients cache-bust when curators ship a
        new revision of `showcase.json`.
      properties:
        version:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ShowcaseEntry"
      required: [version, entries]

    PresetLibrary:
      type: object
      description: |
        Curated public preset library returned by `GET /api/presets`. The
        `version` string lets clients cache-bust when curators ship a new
        revision of `presets.json`.
      properties:
        version:
          type: string
        presets:
          type: array
          items:
            $ref: "#/components/schemas/PresetEntry"
      required: [version, presets]

    PhraseSuggestionSubmitBody:
      type: object
      description: |
        Task #634 — Public submission body. `text` is normalized
        (lowercase + collapsed whitespace) on the server before storage.
      properties:
        text:
          type: string
          minLength: 3
          maxLength: 240
          description: The proposed phrase.
        category:
          type: string
          enum: [handwavy, ai-self-disclosure]
          description: Which curated list the suggestion targets.
        context:
          type: string
          maxLength: 1000
          description: Optional reviewer-facing note (where the user saw it, why it matters).
      required: [text, category]

    PhraseSuggestionSubmitResponse:
      type: object
      properties:
        ok:
          type: boolean
        duplicate:
          type: boolean
          description: True when the same submitter already proposed this exact text in the last 24h.
        id:
          type: integer
          description: Newly assigned suggestion id (omitted on duplicate responses).
        message:
          type: string
      required: [ok, duplicate, message]

    PhraseSuggestionRateLimited:
      type: object
      properties:
        error:
          type: string
        dailyLimit:
          type: integer
        retryAfterHours:
          type: integer
      required: [error]

    PhraseSuggestion:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        category:
          type: string
          enum: [handwavy, ai-self-disclosure]
        context:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required: [id, text, category, context, status, createdAt]

    PhraseSuggestionList:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/PhraseSuggestion"
        total:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
      required: [suggestions, total, status]

    PhraseSuggestionPatchBody:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
      required: [status]

    PhraseSuggestionPatchResponse:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: integer
        status:
          type: string
          enum: [approved, rejected]
      required: [ok, id, status]

    Webhook:
      type: object
      description: |
        A reviewer-registered webhook subscription. The plaintext signing
        secret is never returned by this schema — it is shown exactly
        once on the WebhookCreateResponse at registration time.
      properties:
        id:
          type: integer
        url:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [report.scored]
        createdAt:
          type: string
          format: date-time
        lastDeliveredAt:
          type: string
          format: date-time
          nullable: true
        failureCount:
          type: integer
      required: [id, url, eventTypes, createdAt, lastDeliveredAt, failureCount]

    WebhookList:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/Webhook"
      required: [webhooks]

    WebhookCreateBody:
      type: object
      properties:
        url:
          type: string
          description: Destination URL (http or https) up to 1000 characters.
        eventTypes:
          type: array
          description: |
            Subset of supported events to subscribe to. Defaults to
            `[report.scored]` when omitted. v1 only supports
            `report.scored`.
          items:
            type: string
            enum: [report.scored]
      required: [url]

    WebhookCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Webhook"
        - type: object
          properties:
            secret:
              type: string
              description: |
                Per-webhook HMAC SHA-256 signing secret. Returned exactly
                once at registration time — only the SHA-256 hash is
                persisted server-side, so the caller must capture this
                value to verify incoming `X-VulnRap-Signature` headers.
                Re-register the webhook to receive a new secret.
          required: [secret]

    WebhookDeleteResponse:
      type: object
      properties:
        id:
          type: integer
      required: [id]

    TestYourselfLabel:
      type: string
      enum: [valid, invalid]
      description: |
        Binary label used by the bring-your-own fixture battery. `valid`
        means a real, well-substantiated vulnerability report; `invalid`
        means slop, fabrication, paraphrased CVE, or otherwise noise.
        The `valid` class is the positive class for precision / recall.

    TestYourselfRow:
      type: object
      properties:
        text:
          type: string
          description: Raw report text (1..50_000 characters).
          minLength: 1
          maxLength: 50000
        label:
          $ref: "#/components/schemas/TestYourselfLabel"
      required: [text, label]

    TestYourselfRunBody:
      type: object
      properties:
        rows:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/TestYourselfRow"
      required: [rows]

    TestYourselfPerRow:
      type: object
      properties:
        index:
          type: integer
          description: Zero-based row index in the submitted battery.
        textPreview:
          type: string
          description: First 240 chars of the row's text, for display.
        expectedLabel:
          $ref: "#/components/schemas/TestYourselfLabel"
        predictedLabel:
          $ref: "#/components/schemas/TestYourselfLabel"
        compositeScore:
          type: integer
          description: Composite score 0..100 (higher = stronger evidence of a real vulnerability).
        compositeLabel:
          type: string
          description: Engine's raw composite label (e.g. `LIKELY INVALID`, `STRONG`).
        correct:
          type: boolean
          description: True when predictedLabel === expectedLabel.
      required:
        - index
        - textPreview
        - expectedLabel
        - predictedLabel
        - compositeScore
        - compositeLabel
        - correct

    TestYourselfConfusionMatrix:
      type: object
      properties:
        truePositive:
          type: integer
          description: Predicted `valid` and actually `valid`.
        falsePositive:
          type: integer
          description: Predicted `valid` but actually `invalid`.
        trueNegative:
          type: integer
          description: Predicted `invalid` and actually `invalid`.
        falseNegative:
          type: integer
          description: Predicted `invalid` but actually `valid`.
      required: [truePositive, falsePositive, trueNegative, falseNegative]

    TestYourselfAggregate:
      type: object
      properties:
        total:
          type: integer
        accuracy:
          type: number
          format: float
          description: Fraction of rows where predictedLabel === expectedLabel.
        precision:
          type: number
          format: float
          description: TP / (TP + FP). 0 when TP+FP == 0.
        recall:
          type: number
          format: float
          description: TP / (TP + FN). 0 when TP+FN == 0.
        f1:
          type: number
          format: float
          description: Harmonic mean of precision and recall. 0 when both are 0.
        confusionMatrix:
          $ref: "#/components/schemas/TestYourselfConfusionMatrix"
      required: [total, accuracy, precision, recall, f1, confusionMatrix]

    TestYourselfRunResponse:
      type: object
      properties:
        aggregate:
          $ref: "#/components/schemas/TestYourselfAggregate"
        perRow:
          type: array
          items:
            $ref: "#/components/schemas/TestYourselfPerRow"
        rateLimit:
          type: object
          properties:
            limit:
              type: integer
              description: Maximum runs allowed per IP per day.
            remaining:
              type: integer
              description: Runs remaining for this IP in the current 24h window.
          required: [limit, remaining]
      required: [aggregate, perRow, rateLimit]
