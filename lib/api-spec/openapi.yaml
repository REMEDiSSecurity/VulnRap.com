          enum: [cpu, server, network, iot, storage, peripheral, embedded, gpu]
        vendor:
          type: string
        model:
          oneOf:
            - type: string
            - type: "null"
        productUrl:
          oneOf:
            - type: string
            - type: "null"
          description: URL to the product page for quick reference
        emulationOptions:
          type: array
          items:
            type: string
          description: Suggested emulation or virtual testing approaches
        notes:
          type: array
          items:
            type: string
