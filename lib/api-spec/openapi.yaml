        topSignals:
          type: array
          description: Top 10 most-fired evidence signal types across the corpus.
          items:
            type: object
            properties:
              signal:
                type: string
              count:
                type: integer
            required:
              - signal
              - count
        topCweFamilies:
          type: array
          description: |
            Top 10 AVRI rubric CWE families across reports (e.g. INJECTION,
            MEMORY_CORRUPTION). Reports with no cached family are omitted.
          items:
            type: object
            properties:
              family:
                type: string
              count:
                type: integer
            required:
