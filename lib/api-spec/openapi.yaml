          description: Composite score 0..100, higher = better.
        engine2Score:
          type: number
          description: Engine 2 (Technical Substance Analyzer) score 0..100.
        verificationRatio:
          type: number
          description: Verified / (verified + not_found) ratio over referenced_in_report checks (0..1).
        strongEvidenceCount:
