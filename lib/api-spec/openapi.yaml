components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SimilarityMatch:
      type: object
      properties:
        reportId:
          type: integer
        similarity:
          type: integer
          description: Similarity percentage (0-100)
        matchType:
          type: string
          enum: [near-duplicate, high-similarity, structural, semantic]
      required:
        - reportId
        - similarity
        - matchType

    SectionMatchItem:
      type: object
      properties:
        sectionTitle:
          type: string
        matchedReportId:
          type: integer
        matchedSectionTitle:
          type: string
        similarity:
          type: integer
      required:
        - sectionTitle
        - matchedReportId
        - matchedSectionTitle
        - similarity

    RedactionSummary:
      type: object
      properties:
        totalRedactions:
          type: integer
        categories:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalRedactions
        - categories

    DeleteReportBody:
      type: object
      properties:
        deleteToken:
          type: string
          description: The delete token returned when the report was submitted
      required:
        - deleteToken

    DeleteReportResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ReportAnalysis:
      type: object
      properties:
        id:
          type: integer
        deleteToken:
          type: string
          description: Secret token for deleting this report. Only returned on initial submission. Store it — it cannot be recovered.
        contentHash:
          type: string
        contentMode:
          type: string
          enum: [full, similarity_only]
        slopScore:
          type: integer
          description: AI slop likelihood score 0-100 (higher = more likely AI-generated)
        slopTier:
          type: string
          description: Human-readable sloppiness tier
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100 (higher = better quality). Separate from slopScore — a terse real report can have low quality but also low slop.
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0). Low confidence means limited signals were available.
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
          description: Specific signals found during analysis with their weights
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
          description: SHA-256 hashes of each report section for granular similarity
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
          description: Sections that match existing reports
        redactedText:
          type: ["string", "null"]
          description: Auto-redacted version of the report (PII/secrets removed)
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings — specific issues flagged by the rule-based engine
        llmSlopScore:
          type: ["integer", "null"]
          description: LLM analysis slop score (0–100), weighted from 5 dimensions (specificity, originality, voice, coherence, hallucination). Null when LLM is unavailable. Contributes to the fused slopScore via multi-axis Noisy-OR combination.
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
          description: Semantic observations from the LLM scorer. Null when LLM analysis is unavailable.
        llmBreakdown:
          type: ["object", "null"]
          properties:
            claimSpecificity:
              type: integer
              description: Claim specificity score (0-25)
            evidenceQuality:
              type: integer
              description: Evidence quality score (0-25)
            internalConsistency:
              type: integer
              description: Internal consistency score (0-25)
            hallucinationSignals:
              type: integer
              description: Hallucination signals score (0-25, higher = fewer hallucinations)
            validityScore:
              type: integer
              description: Overall validity score (0-100)
            redFlags:
              type: array
              items:
                type: string
            greenFlags:
              type: array
              items:
                type: string
            verdict:
              type: string
              description: "LIKELY_VALID | UNCERTAIN | LIKELY_FABRICATED"
            specificity:
              type: integer
              description: Legacy V1 field (deprecated)
            originality:
              type: integer
              description: Legacy V1 field (deprecated)
            voice:
              type: integer
              description: Legacy V1 field (deprecated)
            coherence:
              type: integer
              description: Legacy V1 field (deprecated)
            hallucination:
              type: integer
              description: Legacy V1 field (deprecated)
          description: Per-criterion LLM validity scores. Null when LLM analysis is unavailable. May contain legacy V1 fields for older records.
        humanIndicators:
          type: array
          items:
            $ref: "#/components/schemas/HumanIndicator"
          description: Detected human-writing signals that reduced the slop score
        authenticityScore:
          type: integer
          description: AI-authorship likelihood score 0-100 (higher = more likely AI-generated). Measures writing style, spectral patterns, template usage.
        validityScore:
          type: integer
          description: Technical substance/validity score 0-100 (higher = stronger evidence of a real vulnerability). Measures evidence quality, claim specificity, internal consistency.
        quadrant:
          type: string
          enum: ["AI_SLOP", "AI_ASSISTED", "WEAK_HUMAN", "STRONG_HUMAN"]
          description: Two-axis classification quadrant. AI_SLOP=high auth/low valid, AI_ASSISTED=high auth/high valid, WEAK_HUMAN=low auth/low valid, STRONG_HUMAN=low auth/high valid.
        archetype:
          type: string
          enum: ["AUTO_CLOSE", "PRIORITIZE_REVIEW", "REQUEST_DETAILS", "ACCEPT"]
          description: Recommended triage action derived from quadrant classification.
        analysisMode:
          type: string
          enum: ["heuristic_only", "llm_enhanced"]
          description: Whether the analysis ran in heuristic-only mode or with LLM enhancement.
        confidenceNote:
          type: ["string", "null"]
          description: Human-readable note explaining confidence adjustments (e.g. LLM-free mode reduces confidence by 15%).
        configNotices:
          type: array
          items:
            type: object
            properties:
              setting:
                type: string
              severity:
                type: string
                enum: ["info", "warning", "critical"]
              title:
                type: string
              summary:
                type: string
              impact:
                type: object
                additionalProperties:
                  type: string
              recommendation:
                type: string
          description: Configuration impact notices explaining how current settings affect analysis accuracy, latency, and privacy.
        diagnostics:
          type: ["object", "null"]
          properties:
            inputStats:
              type: object
              properties:
                charCount:
                  type: integer
                lineCount:
                  type: integer
                wordCount:
                  type: integer
                maxLineLength:
                  type: integer
                containsPlaceholders:
                  type: boolean
            stages:
              type: object
              additionalProperties:
                type: object
                properties:
                  status:
                    type: string
                  durationMs:
                    type: integer
                  error:
                    type: string
            parseWarnings:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  detail:
                    type: string
            totalDurationMs:
              type: integer
            crashInfo:
              type: ["object", "null"]
              properties:
                message:
                  type: string
                stage:
                  type: string
                inputLength:
                  type: integer
          description: Pipeline diagnostics showing which analysis stages ran, their durations, and any warnings. crashInfo is non-null when the pipeline ran in degraded mode.
        adjustedScore:
          type: ["integer", "null"]
          description: Client-adjusted slop score based on sensitivity profile. Null when no adjustment applied (balanced preset).
        sensitivityProfile:
          type: ["string", "null"]
          enum: ["lenient", "balanced", "strict", null]
          description: Active sensitivity preset used for score adjustment. Null when default (balanced).
        llmEnhanced:
          type: boolean
          description: True when LLM analysis contributed to the final slopScore. False means the score is purely heuristic.
        llmFailed:
          type: boolean
          description: True when LLM analysis was attempted but failed (timeout, parse error, API error). False when LLM succeeded or was not attempted.
        llmUsed:
          type: boolean
          description: Whether LLM analysis was attempted (not skipped by user). When false, the user explicitly opted out of AI analysis.
        redactionApplied:
          type: boolean
          description: Whether PII auto-redaction was applied. When false, the user explicitly disabled redaction.
        verification:
          oneOf:
            - $ref: "#/components/schemas/Verification"
            - type: "null"
          description: Active content verification results (GitHub, NVD, PoC checks). Null when verification was not performed.
        triageRecommendation:
          oneOf:
            - $ref: "#/components/schemas/TriageRecommendation"
            - type: "null"
          description: Automated triage action recommendation with challenge questions and behavioral signals. Null when not computed.
        triageAssistant:
          oneOf:
            - $ref: "#/components/schemas/TriageAssistant"
            - type: "null"
          description: AI triage assistant with reproduction guidance, gap analysis, don't-miss warnings, and reporter feedback. Null when not computed.
        claims:
          oneOf:
            - $ref: "#/components/schemas/LLMClaims"
            - type: "null"
          description: Extracted claims from the report (project, files, functions, PoC presence, etc.). Null when LLM analysis was not performed.
        substance:
          oneOf:
            - $ref: "#/components/schemas/LLMSubstanceScores"
            - type: "null"
          description: Substance-based scoring (PoC validity, claim specificity, domain coherence). Null when LLM analysis was not performed.
        vulnrap:
          oneOf:
            - $ref: "#/components/schemas/VulnrapComposite"
            - type: "null"
          description: Sprint 9 multi-engine consensus score (3 engines). Null when not computed (e.g., legacy reports).
        avriFamily:
          type: ["string", "null"]
          description: Cached AVRI rubric family id for this report (e.g. INJECTION, MEMORY_CORRUPTION). Sourced from the persisted reports.avri_family column; null for legacy rows submitted before the family was persisted.
        fileName:
          type: ["string", "null"]
        fileSize:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contentHash
        - contentMode
        - slopScore
        - slopTier
        - qualityScore
        - confidence
        - breakdown
        - evidence
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - fileSize
        - createdAt

    VulnrapComposite:
      type: object
      description: VulnRap multi-engine consensus score with per-engine breakdowns.
      properties:
        compositeScore:
          type: integer
          description: Composite score 0-100, where higher = stronger evidence of a real, reproducible vulnerability.
        label:
          type: string
          enum: ["LIKELY INVALID", "HIGH RISK", "NEEDS REVIEW", "REASONABLE", "PROMISING", "STRONG"]
        engines:
          type: array
          items:
            $ref: "#/components/schemas/VulnrapEngineResult"
        compositeBreakdown:
          type: object
          properties:
            weightedSum:
              type: number
            totalWeight:
              type: number
            beforeOverride:
              type: integer
            afterOverride:
              type: integer
        overridesApplied:
          type: array
          items:
            type: string
          description: Composite-level override rules that fired (e.g. CONVERGENT_NEGATIVE, CWE_TYPE_SWAP).
        warnings:
          type: array
          items:
            type: string
        engineCount:
          type: integer
        reconstructed:
          type: boolean
          description: True when the composite was rebuilt by backfill-vulnrap from cached v3.5.0 signals (legacy reports stored without raw text). Reviewers should treat the score as approximate — CWE coherence is neutralized, no perplexity is available, and per-engine scores derive from cached slop / validity / quality / evidence values rather than a fresh pipeline run.
      required:
        - compositeScore
        - label
        - engines
        - overridesApplied

    VulnrapEngineResult:
      type: object
      properties:
        engine:
          type: string
          description: Human-readable engine name.
        score:
          type: integer
        verdict:
          type: string
          enum: ["GREEN", "YELLOW", "RED", "GREY"]
        confidence:
          type: string
          enum: ["HIGH", "MEDIUM", "LOW"]
        triggeredIndicators:
          type: array
          items:
            type: object
            properties:
              signal:
                type: string
              value:
                description: Indicator value; may be string, number, or boolean.
              threshold:
                type: number
              strength:
                type: string
                enum: ["HIGH", "MEDIUM", "LOW"]
              explanation:
                type: string
        signalBreakdown:
          type: object
          additionalProperties: true
        note:
          type: string
      required:
        - engine
        - score
        - verdict
        - confidence

    VerificationBadge:
      type: object
      properties:
        id:
          type: integer
        reportCode:
          type: string
          description: Human-readable report code (e.g. VR-000B)
        slopScore:
          type: integer
        slopTier:
          type: string
        similarityMatchCount:
          type: integer
        sectionMatchCount:
          type: integer
        contentHash:
          type: string
        verifyUrl:
          type: string
          description: Public URL to verify this report
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportCode
        - slopScore
        - slopTier
        - similarityMatchCount
        - sectionMatchCount
        - contentHash
        - verifyUrl
        - createdAt

    CheckResult:
      type: object
      properties:
        slopScore:
          type: integer
        slopTier:
          type: string
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0)
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings
        llmSlopScore:
          type: ["integer", "null"]
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
        llmBreakdown:
          type: ["object", "null"]
          properties:
            claimSpecificity:
              type: integer
            evidenceQuality:
              type: integer
            internalConsistency:
              type: integer
            hallucinationSignals:
              type: integer
            validityScore:
              type: integer
            redFlags:
              type: array
              items:
                type: string
            greenFlags:
              type: array
              items:
                type: string
            verdict:
              type: string
            specificity:
              type: integer
            originality:
              type: integer
            voice:
              type: integer
            coherence:
              type: integer
            hallucination:
              type: integer
        humanIndicators:
          type: array
          items:
            $ref: "#/components/schemas/HumanIndicator"
          description: Detected human-writing signals that reduced the slop score
        authenticityScore:
          type: integer
          description: AI-authorship likelihood score 0-100.
        validityScore:
          type: integer
          description: Technical substance/validity score 0-100.
        quadrant:
          type: string
          enum: ["AI_SLOP", "AI_ASSISTED", "WEAK_HUMAN", "STRONG_HUMAN"]
          description: Two-axis classification quadrant.
        archetype:
          type: string
          enum: ["AUTO_CLOSE", "PRIORITIZE_REVIEW", "REQUEST_DETAILS", "ACCEPT"]
          description: Recommended triage action derived from quadrant.
        analysisMode:
          type: string
          enum: ["heuristic_only", "llm_enhanced"]
          description: Whether the analysis ran in heuristic-only mode or with LLM enhancement.
        confidenceNote:
          type: ["string", "null"]
          description: Human-readable note explaining confidence adjustments.
        configNotices:
          type: array
          items:
            type: object
            properties:
              setting:
                type: string
              severity:
                type: string
                enum: ["info", "warning", "critical"]
              title:
                type: string
              summary:
                type: string
              impact:
                type: object
                additionalProperties:
                  type: string
              recommendation:
                type: string
          description: Configuration impact notices explaining how current settings affect analysis.
        diagnostics:
          type: ["object", "null"]
          properties:
            inputStats:
              type: object
              properties:
                charCount:
                  type: integer
                lineCount:
                  type: integer
                wordCount:
                  type: integer
                maxLineLength:
                  type: integer
                containsPlaceholders:
                  type: boolean
            stages:
              type: object
              additionalProperties:
                type: object
                properties:
                  status:
                    type: string
                  durationMs:
                    type: integer
                  error:
                    type: string
            parseWarnings:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  detail:
                    type: string
            totalDurationMs:
              type: integer
            crashInfo:
              type: ["object", "null"]
              properties:
                message:
                  type: string
                stage:
                  type: string
                inputLength:
                  type: integer
          description: Pipeline diagnostics showing which analysis stages ran, their durations, and any warnings. crashInfo is non-null when the pipeline ran in degraded mode.
        adjustedScore:
          type: ["integer", "null"]
          description: Client-adjusted slop score based on sensitivity profile. Null when no adjustment applied.
        sensitivityProfile:
          type: ["string", "null"]
          enum: ["lenient", "balanced", "strict", null]
          description: Active sensitivity preset used for score adjustment. Null when default.
        llmEnhanced:
          type: boolean
        llmFailed:
          type: boolean
          description: True when LLM analysis was attempted but failed.
        llmUsed:
          type: boolean
          description: Whether LLM analysis was attempted (not skipped by user).
        redactionApplied:
          type: boolean
          description: Whether PII auto-redaction was applied.
        verification:
          oneOf:
            - $ref: "#/components/schemas/Verification"
            - type: "null"
          description: Active content verification results. Null when verification was not performed.
        triageRecommendation:
          oneOf:
            - $ref: "#/components/schemas/TriageRecommendation"
            - type: "null"
          description: Automated triage action recommendation with challenge questions and behavioral signals. Null when not computed.
        triageAssistant:
          oneOf:
            - $ref: "#/components/schemas/TriageAssistant"
            - type: "null"
          description: AI triage assistant with reproduction guidance, gap analysis, don't-miss warnings, and reporter feedback. Null when not computed.
        claims:
          oneOf:
            - $ref: "#/components/schemas/LLMClaims"
            - type: "null"
          description: Extracted claims from the report. Null when LLM analysis was not performed.
        substance:
          oneOf:
            - $ref: "#/components/schemas/LLMSubstanceScores"
            - type: "null"
          description: Substance-based scoring. Null when LLM analysis was not performed.
        previouslySubmitted:
          type: boolean
          description: Whether this exact report was found in the database
        existingReportId:
          type: ["integer", "null"]
          description: If previously submitted, the existing report ID
      required:
        - slopScore
        - slopTier
        - qualityScore
        - confidence
        - breakdown
        - evidence
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - previouslySubmitted

    HashLookupResult:
      type: object
