        minBucketSize:
          type: integer
      required: [gapWarn, familyShiftWarn, minBucketSize]

    AvriDriftReport:
      type: object
      properties:
        generatedAt:
          type: string
        weeksRequested:
          type: integer
        totalReportsScanned:
          type: integer
        cohort:
          type: string
