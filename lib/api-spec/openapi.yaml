        slopScore:
          type: ["integer", "null"]
        slopTier:
          type: ["string", "null"]
        matchCount:
          type: integer
          description: Number of similar reports found
        firstSeen:
          type: ["string", "null"]
          format: date-time
      required:
        - found
        - matchCount

    PlatformStats:
      type: object
      properties:
        totalReports:
          type: integer
        duplicatesDetected:
          type: integer
        avgSlopScore:
          type: number
        reportsByMode:
          type: object
          properties:
            full:
              type: integer
            similarity_only:
              type: integer
          required:
            - full
            - similarity_only
        reportsToday:
          type: integer
        reportsThisWeek:
          type: integer
      required:
        - totalReports
        - duplicatesDetected
        - avgSlopScore
        - reportsByMode
        - reportsToday
        - reportsThisWeek

    RecentActivity:
      type: object
      properties:
        recentReports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - slopScore
              - slopTier
              - matchCount
              - createdAt
      required:
        - recentReports

    ReportFeed:
      type: object
      properties:
        reports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              reportCode:
                type: string
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              contentMode:
                type: string
                enum: [full, similarity_only]
              createdAt:
                type: string
                format: date-time
              avriFamily:
                type: ["string", "null"]
                description: Cached AVRI rubric family id for this report (e.g. INJECTION, MEMORY_CORRUPTION). Null for legacy rows submitted before the family was persisted.
              fakeRawHttp:
                type: boolean
                default: false
                description: |
                  True when AVRI Engine 2 flagged the report's raw HTTP request bytes as fabricated
                  (signalBreakdown.avri.rawHttp.isFake = true). Lets the reports feed display a
                  FAKE_RAW_HTTP indicator on the row so reviewers triaging the queue can spot
                  fabricated-raw-HTTP REQUEST_SMUGGLING reports without opening each one.
              strippedCrashTrace:
                type: boolean
                default: false
                description: |
                  True when AVRI Engine 2 flagged the report's crash/race trace as stripped
                  (signalBreakdown.avri.crashTrace.isStripped = true). Paired with fakeRawHttp so
                  the two block types stay symmetric in the feed UI.
            required:
              - id
              - reportCode
              - slopScore
              - slopTier
              - matchCount
              - contentMode
              - createdAt
              - fakeRawHttp
              - strippedCrashTrace
        total:
          type: integer
        hasMore:
          type: boolean
        summary:
          type: object
          properties:
            totalPublic:
              type: integer
            avgScore:
              type: number
            tierCounts:
              type: object
              additionalProperties:
                type: integer
            familyCounts:
              type: object
              additionalProperties:
                type: integer
              description: Per-AVRI-family counts of public reports (mirrors tierCounts). Keys are AVRI family ids (e.g. INJECTION, MEMORY_CORRUPTION); rows with null avri_family are bucketed under "FLAT".
          required:
            - totalPublic
            - avgScore
            - tierCounts
            - familyCounts
      required:
        - reports
        - total
        - hasMore
        - summary

