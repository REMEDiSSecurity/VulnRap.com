      properties:
        currentConfig:
          $ref: "#/components/schemas/ScoringConfigItem"
        totalFeedbackAnalyzed:
          type: integer
        bucketAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/BucketAnalysis"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CalibrationSuggestion"
        overallHealth:
          type: string
          enum: [good, needs-attention, needs-tuning]
        minFeedbackThreshold:
          type: integer
      required: [currentConfig, totalFeedbackAnalyzed, bucketAnalysis, suggestions, overallHealth, minFeedbackThreshold]

    ApplyCalibrationBody:
      type: object
      properties:
        changes:
          type: object
          description: Object with scoring config changes (prior, floor, ceiling, axisThresholds, tierThresholds, fabricationBoost)
        description:
          type: string
          description: Description of why this change is being made
      required: [changes, description]

    ApplyCalibrationResponse:
      type: object
      properties:
        message:
          type: string
        config:
          $ref: "#/components/schemas/ScoringConfigItem"
      required: [message, config]
