    ReportFeed:
      type: object
      properties:
        reports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              reportCode:
                type: string
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              contentMode:
                type: string
                enum: [full, similarity_only]
              createdAt:
                type: string
                format: date-time
              avriFamily:
                type: ["string", "null"]
                description: Cached AVRI rubric family id for this report (e.g. INJECTION, MEMORY_CORRUPTION). Null for legacy rows submitted before the family was persisted.
              fakeRawHttp:
                type: boolean
                default: false
                description: |
                  True when AVRI Engine 2 flagged the report's raw HTTP request bytes as fabricated
                  (signalBreakdown.avri.rawHttp.isFake = true). Lets the reports feed display a
                  FAKE_RAW_HTTP indicator on the row so reviewers triaging the queue can spot
                  fabricated-raw-HTTP REQUEST_SMUGGLING reports without opening each one.
              strippedCrashTrace:
                type: boolean
                default: false
                description: |
                  True when AVRI Engine 2 flagged the report's crash/race trace as stripped
                  (signalBreakdown.avri.crashTrace.isStripped = true). Paired with fakeRawHttp so
                  the two block types stay symmetric in the feed UI.
              inferredCwe:
                type: ["string", "null"]
                description: |
                  Soft-citation inferred CWE (e.g. "CWE-79") for reports where the engine
                  recognised a vulnerability class name but no explicit CWE token was cited.
                  Sourced from signalBreakdown.avri.softCitation.inferredCwe (preferred) or
                  signalBreakdown.softCitation.inferredCwe (legacy) on the CWE Coherence
                  Checker engine — same field the triage report panel already consumes.
                  Null when no soft citation fired for the report.
              inferredCweName:
                type: ["string", "null"]
                description: |
                  Friendly name of the soft-citation match (e.g. "XSS", "Open Redirect")
                  paired with inferredCwe. Null when inferredCwe is null. Used as a tooltip
                  on the row badge so reviewers can see the matched class without opening
                  the diagnostics panel.
            required:
              - id
              - reportCode
              - slopScore
              - slopTier
              - matchCount
              - contentMode
              - createdAt
              - fakeRawHttp
              - strippedCrashTrace
        total:
          type: integer
        hasMore:
          type: boolean
        summary:
          type: object
          properties:
            totalPublic:
              type: integer
            avgScore:
              type: number
            tierCounts:
              type: object
              additionalProperties:
                type: integer
            familyCounts:
              type: object
              additionalProperties:
                type: integer
              description: Per-AVRI-family counts of public reports (mirrors tierCounts). Keys are AVRI family ids (e.g. INJECTION, MEMORY_CORRUPTION); rows with null avri_family are bucketed under "FLAT".
          required:
            - totalPublic
            - avgScore
            - tierCounts
            - familyCounts
      required:
        - reports
        - total
        - hasMore
        - summary

    FeedEngineVersions:
      type: object
      properties:
        versions:
          type: array
          items:
            type: string
          description: Distinct fusion engine version strings present in the public feed, sorted in descending semver order.
      required:
        - versions

    CohortBaseline:
      type: object
      description: |
        Last-7d VulnRap composite-score distribution + median for a cohort,
        plus the optional CWE family used to scope the cohort. The 10
        histogram bins partition the score range 0-100 into equal-width
        [min, max) intervals (the last bucket is inclusive of 100). Composite
        score is the metric shown in the big number on the results page
        header, so the percentile rank derived from these bins applies to
        that displayed score.
      properties:
        cwe:
          type: ["string", "null"]
          description: |
            Cohort scope. Null when the cohort is the full platform-wide
            distribution; otherwise the AVRI rubric family id (e.g. INJECTION).
            When the caller passed an unknown value this is null and the
            platform cohort is returned instead.
        windowDays:
          type: integer
          description: Width of the rolling window the baseline was computed over (always 7 for v1).
        totalReports:
          type: integer
          description: Number of reports in the cohort (sum of bucket counts).
        median:
          type: ["integer", "null"]
          description: Median composite score for the cohort. Null when totalReports is 0.
        percentile:
          type: ["number", "null"]
          description: |
            Exact percentile rank for the queried `score` against the
            underlying cohort rows (not the bucketed histogram), computed
            with the mid-rank convention so ties contribute half their
            count. Present only when the request supplied a `score` query
            parameter and the cohort is non-empty; null otherwise. The
            value is a 0..100 number rounded to one decimal place — the
            UI prefers this over the bucket-derived percentile when
            present.
        queriedScore:
          type: ["number", "null"]
          description: |
            Echo of the `score` query parameter the percentile was computed
            against, clamped to 0..100. Null when no `score` was supplied.
        bins:
          type: array
          description: 10-bucket histogram of composite scores in the cohort.
          items:
            type: object
            properties:
              min:
                type: integer
                description: Inclusive lower bound of the bucket (0-100).
              max:
                type: integer
                description: Exclusive upper bound of the bucket (inclusive on the final bucket).
              count:
                type: integer
                description: Number of reports whose composite score falls in this bucket.
            required:
              - min
              - max
              - count
        engineMedians:
          type: object
          nullable: true
          description: |
            Median per-axis sub-scores across the same cohort, used by the
            per-engine radar overlay on the results page. Each value is
            0..100 and uses the same orientation as the on-page radar
            (engine1 = AI Authorship raw score; the UI inverts it to plot
            "humanness"). Null when totalReports is 0 or when the request
            specified metric=slop (engine medians are only meaningful for
            the composite cohort).
          properties:
            engine1:
              type: integer
              nullable: true
              description: Median raw score for Engine 1 (AI Authorship Detector). Null if no rows in the cohort had this engine.
            engine2:
              type: integer
              nullable: true
              description: Median score for Engine 2 (Technical Substance Analyzer).
            engine3:
              type: integer
              nullable: true
              description: Median score for Engine 3 (CWE Coherence Checker).
            avri:
              type: integer
              nullable: true
              description: Median raw AVRI sub-score (from Engine 2's signalBreakdown.avri.rawAvriScore).
            quality:
              type: integer
              nullable: true
              description: Median structural quality_score for the cohort.
          required:
            - engine1
            - engine2
            - engine3
            - avri
            - quality
      required:
        - cwe
        - windowDays
        - totalReports
        - median
        - bins
        - engineMedians

    CorpusStats:
      type: object
      description: |
        Already-aggregated corpus statistics for the public stats page.
        Contains no individual report content — only counts and totals over
        the full scoring corpus.
      properties:
        totalReports:
          type: integer
          description: Total number of reports scored to date.
        generatedAt:
          type: string
          format: date-time
          description: Timestamp when these aggregates were computed.
        tierBreakdown:
          type: array
          description: Count of reports per slop tier label.
          items:
