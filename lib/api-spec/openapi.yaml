    VerificationCheck:
      type: object
      properties:
        type:
          type: string
          description: Check type identifier (e.g. github_file_verified, cve_not_in_nvd, poc_placeholder_textbook)
        target:
          type: string
          description: The reference being verified (e.g. repo:filepath, CVE-ID)
        result:
          type: string
          enum: [verified, not_found, warning, error, skipped, info]
        detail:
          type: string
          description: Human-readable explanation of the check result
        weight:
          type: integer
          description: Score weight (negative = human signal, positive = slop signal)
        source:
          type: string
          enum: [referenced_in_report, search_fallback]
          description: Whether the check was performed against a repo/resource explicitly cited in the report (referenced_in_report) or one we guessed via keyword fallback (search_fallback). Absent when not applicable (e.g. CVE/PoC checks).
      required:
        - type
        - target
        - result
        - detail
        - weight

    VerificationSummary:
      type: object
      properties:
        verified:
          type: integer
        notFound:
          type: integer
        warnings:
          type: integer
        errors:
          type: integer
      required:
        - verified
        - notFound
        - warnings
        - errors

    DetectedProject:
      type: object
      properties:
        name:
          type: string
        repoSlug:
          type: string
        source:
          type: string
          description: How the project was detected (github_url, gitlab_url, known_project)
      required:
        - name
        - repoSlug
        - source

    Verification:
      type: object
      properties:
        checks:
          type: array
          items:
            $ref: "#/components/schemas/VerificationCheck"
        summary:
          $ref: "#/components/schemas/VerificationSummary"
        triageNotes:
          type: array
          items:
            type: string
          description: Actionable notes for PSIRT triage based on verification results
        score:
          type: integer
          description: Verification axis score (0-100, 50=neutral, above=slop signals, below=human signals)
        detectedProjects:
          type: array
          items:
            $ref: "#/components/schemas/DetectedProject"
        mode:
          type: string
          enum:
            - SOURCE_CODE
            - ENDPOINT
            - MANUAL_ONLY
            - GENERIC
          description: |
            Active-verification routing decision. SOURCE_CODE probes detected
            GitHub repos for cited file paths/symbols; ENDPOINT runs PoC
            plausibility checks; MANUAL_ONLY short-circuits automated probes
            (race conditions, request smuggling) and only verifies CVE
            existence; GENERIC runs both source-code and endpoint probes.
        familyName:
          type: string
          description: Human-readable AVRI family name that drove the verification mode (e.g. "Web client (XSS / CSRF / clickjacking / open redirect)").
      required:
        - checks
        - summary
        - triageNotes
        - score
        - detectedProjects

    ScoreBreakdown:
      type: object
      properties:
        linguistic:
          type: integer
          description: Linguistic AI fingerprinting score (0-100)
        factual:
          type: integer
          description: Factual verification score (0-100)
        template:
          type: integer
          description: Template/mass-submission pattern score (0-100)
        llm:
          type: ["integer", "null"]
          description: LLM analysis score (0-100), null if LLM unavailable
        verification:
          type: ["integer", "null"]
          description: Active content verification score (0-100, 50=neutral). Null when no verifiable references found.
        quality:
          type: integer
          description: Report quality score (0-100)
        substanceScore:
          type: ["integer", "null"]
          description: LLM substance score (0-100). Null when LLM not used.
        coherenceScore:
          type: ["integer", "null"]
          description: LLM coherence score (0-100). Null when LLM not used.
        pocValidity:
          type: ["integer", "null"]
          description: LLM PoC validity score (0-100). Null when LLM not used.
        domainCoherence:
          type: ["integer", "null"]
          description: LLM domain coherence score (0-100). Null when LLM not used.
      required:
        - linguistic
        - factual
        - template
        - quality

    HumanIndicator:
      type: object
      properties:
        type:
          type: string
          description: Human indicator type (e.g. human_contractions, human_terse_style)
        description:
          type: string
          description: Human-readable description of the human signal
        weight:
          type: integer
          description: Negative weight (reduces slop score)
        matched:
          type: ["string", "null"]
          description: The specific text that triggered this indicator
      required:
        - type
        - description
        - weight

    EvidenceItem:
      type: object
      properties:
        type:
          type: string
          description: Evidence type identifier (e.g. ai_phrase, placeholder_url, severity_inflation)
