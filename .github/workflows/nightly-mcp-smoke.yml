name: Nightly MCP live smoke test

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mcp-live-smoke:
    name: MCP server live e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP server
        run: pnpm --filter @workspace/mcp-server build

      - name: Run live MCP smoke test
        run: pnpm --filter @workspace/mcp-server test:live

      - name: Open / update tracking issue on failure
        if: failure()
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          update_existing: true
          search_existing: open
          filename: .github/ISSUE_TEMPLATE/nightly-mcp-smoke-failure.md
