name: Build (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build vulnrap + api-server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all artifacts
        # `pnpm run build` runs the workspace typecheck first, then fans out
        # to every package's `build` script via `pnpm -r --if-present`.
        run: pnpm run build

      - name: Upload vulnrap dist
        uses: actions/upload-artifact@v4
        with:
          name: vulnrap-dist
          path: artifacts/vulnrap/dist
          if-no-files-found: error
          retention-days: 14

      - name: Upload api-server dist
        uses: actions/upload-artifact@v4
        with:
          name: api-server-dist
          path: artifacts/api-server/dist
          if-no-files-found: error
          retention-days: 14
