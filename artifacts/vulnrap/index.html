<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />

    <title>
      VulnRap — VirusTotal for Bug Reports | Free Vulnerability Report
      Validation
    </title>
    <meta
      name="description"
      content="Validate incoming vulnerability reports instantly. VulnRap verifies factual claims against live sources, detects AI-generated slop, catches duplicates, and scores report integrity. Free, anonymous, no account required. Built for PSIRT teams."
    />
    <meta name="theme-color" content="#0D1117" />
    <meta
      name="keywords"
      content="vulnerability report validation, PSIRT, bug bounty, AI slop detection, CVE verification, duplicate detection, report scoring, security triage"
    />
    <meta name="author" content="REMEDiS Security" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vulnrap.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook / LinkedIn / Discord / Slack -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vulnrap.com/" />
    <meta property="og:title" content="VulnRap — VirusTotal for Bug Reports" />
    <meta
      property="og:description"
      content="Validate vulnerability reports instantly. Verify factual claims, detect AI slop, catch duplicates, and score report integrity. Free, anonymous, no account needed."
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta
      property="og:image:alt"
      content="VulnRap — VirusTotal for Bug Reports. Validate claims, detect duplicates, score report integrity. Free and anonymous."
    />
    <meta property="og:site_name" content="VulnRap" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VulnRap — VirusTotal for Bug Reports" />
    <meta
      name="twitter:description"
      content="Validate vulnerability reports instantly. Verify factual claims, detect AI slop, catch duplicates, and score report integrity. Free and anonymous."
    />
    <meta name="twitter:image" content="https://vulnrap.com/opengraph.jpg" />
    <meta
      name="twitter:image:alt"
      content="VulnRap — VirusTotal for Bug Reports. Validate claims, detect duplicates, score report integrity."
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "VulnRap",
        "url": "https://vulnrap.com",
        "description": "Vulnerability report validation platform for PSIRT teams. Verifies factual claims, detects AI-generated content, catches duplicates, and scores report integrity.",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Organization",
          "name": "REMEDiS Security",
          "url": "https://github.com/REMEDiSSecurity"
        },
        "featureList": [
          "Factual claim verification against live CVE/NVD databases",
          "AI-generated report detection (slop scoring)",
          "Near-duplicate and exact-match detection",
          "Automatic PII and credential redaction",
          "Multi-axis scoring engine",
          "PSIRT triage recommendations",
          "Hardware-aware reproduction recipes",
          "Anonymous — no account required"
        ]
      }
    </script>

    <!-- Task #1310 — The previous Google Fonts <link rel="stylesheet">
         loaded a UA-variant CSS body for which a stable Subresource
         Integrity hash cannot be computed (the response changes per
         user-agent). Rather than ship the SPA with an external script-
         class resource that can't be SRI-pinned, we drop the external
         link entirely and fall back to the system font stack already
         configured in src/index.css (`system-ui, sans-serif` / etc.).
         Follow-up #1311 will re-introduce the brand fonts as
         self-hosted assets so they ship from /assets/ with subresource
         integrity intact. -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Task #1310 — Bootstrap theme class loaded as a same-origin
         classic script so the production CSP can drop 'unsafe-inline'
         from script-src. The script blocks parsing (no async/defer) so
         the no-flash behaviour is preserved. Source lives in
         artifacts/vulnrap/public/bootstrap-theme.js. -->
    <script src="/bootstrap-theme.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
