<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="630" fill="#0D1117"/>

<rect x="0" y="0" width="1200" height="630" fill="url(#bg-gradient)" opacity="0.6"/>
<defs>
<radialGradient id="bg-gradient" cx="0.3" cy="0.4" r="0.8">
<stop offset="0%" stop-color="#0a2a2a"/>
<stop offset="60%" stop-color="#0D1117"/>
<stop offset="100%" stop-color="#0D1117"/>
</radialGradient>
<radialGradient id="glow-accent" cx="0.7" cy="0.6" r="0.5">
<stop offset="0%" stop-color="#C832FF" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#C832FF" stop-opacity="0"/>
</radialGradient>
<linearGradient id="title-grad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00FFD1"/>
<stop offset="100%" stop-color="#00FFFF"/>
</linearGradient>
<linearGradient id="line-grad" x1="80" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00FFD1" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#00FFD1" stop-opacity="0"/>
</linearGradient>
<linearGradient id="line-grad-r" x1="700" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#C832FF" stop-opacity="0"/>
<stop offset="100%" stop-color="#C832FF" stop-opacity="0.6"/>
</linearGradient>
<linearGradient id="badge-grad" x1="0" y1="0" x2="0" y2="36" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00FFD1" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#00FFD1" stop-opacity="0.05"/>
</linearGradient>
<filter id="glow-filter">
<feGaussianBlur stdDeviation="8" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<filter id="text-glow">
<feGaussianBlur stdDeviation="3" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>

<rect x="0" y="0" width="1200" height="630" fill="url(#glow-accent)"/>

<line x1="0" y1="1" x2="1200" y2="1" stroke="#00FFD1" stroke-width="2" opacity="0.5"/>
<line x1="0" y1="629" x2="1200" y2="629" stroke="#C832FF" stroke-width="2" opacity="0.4"/>

<line x1="80" y1="290" x2="500" y2="290" stroke="url(#line-grad)" stroke-width="1"/>
<line x1="700" y1="290" x2="1120" y2="290" stroke="url(#line-grad-r)" stroke-width="1"/>

<g opacity="0.06">
