<line x1="22" y1="22" x2="65" y2="65" stroke="#00FFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.5" filter="url(#glow-filter)"/>
<line x1="22" y1="-22" x2="65" y2="-65" stroke="#C832FF" stroke-width="2" stroke-linecap="round" opacity="0.55" filter="url(#glow-filter)"/>
